  - id: provefl
    name: PRoVeFL
    title: "PRoVeFL: Private Robust and Verifiable Aggregation in Federated Learning"
    url: https://arxiv.org/abs/2607.06612
    pdf: https://arxiv.org/html/2607.06612v1
    venue: arXiv:2607.06612
    date: 2026-07-07
    year: 2026
    authors: [Harsh Kasyap, Anil Kumar Pradhan, Ugur Ilker Atmaca, Graham Cormode, Carsten Maple]
    authors_verified: true
    uses_zk: false
    uses_zk_note: >-
      VERIFIED: the strings "zero-knowledge", "ZKP", "SNARK" and "proof of training" do not
      appear anywhere in the paper. Do not file this under zkML.
    primitive: Multi-key FHE (Ring-LWE) + discrete-log commitments; bilinear pairwise checks
    what_is_proven: >-
      That a server performed the aggregation rule's arithmetic correctly (distances for Krum,
      differences for Trimmed-Mean, inner products for FLTrust). Verified BY ANOTHER SERVER,
      assuming >=1 server is honest. Not publicly verifiable, not succinct, not zero-knowledge.
    hardware: Intel Xeon E5-4650 v4 @ 2.20 GHz, 112 CPUs, 256 GB RAM
    numbers_source: primary
    benchmarks:
      - model: LeNet5 (CIFAR-10 S)
        params: 62000
      - model: ResNet-18 (CIFAR-10 L)
        params: 273000
        params_note: "As reported. Standard ResNet-18 is ~11M params, so this must be a reduced variant -- worth checking."
      - model: LSTM (Shakespeare)
        params: 818000
      - aggregation_rule: Krum
        clients: 200
        wallclock_s: 2000
      - aggregation_rule: Trimmed-Mean
        clients: 200
        wallclock_s: 400
      - aggregation_rule: FLTrust
        clients: 200
        wallclock_s: 20
    communication_gb: [0.001, 26]
    notes: >-
      These wallclock numbers are per-round aggregation cost, NOT proving time. Plotting them
      against zkPoT proving times would be a category error.

private_training_no_proofs:
  - id: prift
    name: PriFT
    title: "PriFT: Private Fine-Tuning using off-the-shelf MPC and HE libraries"
    url: https://eprint.iacr.org/2026/1381
    venue: IACR ePrint 2026/1381
    date: 2026-07-06
    year: 2026
    authors: [Qiuxuan Ma, Eleftheria Makri, Nusa Zisaric]
    authors_verified: true
    affiliation: LIACS, Leiden University
    uses_zk: false
    uses_zk_note: >-
      No proofs of any kind. PriFT provides PRIVACY (the data stays encrypted), not
      VERIFIABILITY (nobody proves the computation was correct). Orthogonal axis to this
      repo's other entries -- included to mark the boundary, not to compare.
    primitive: MPC (Crypten) and HE (TenSEAL), benchmarked head-to-head
    open_source: true
    numbers_source: primary
    notes: >-
      Uses a transformer as a frozen feature extractor, then trains a small NN on the
      privacy-protected features. Two modes: fully-private (encrypted end-to-end) and
      semi-private (labels decrypted during training for speed). Findings: MPC beats HE,
      especially semi-private; MPC semi-private is ~3x faster than fully-private; accuracy
      close to plaintext. Its value here is as a clean MPC-vs-HE comparison on one real task.
      PDF is behind Cloudflare -- reference list NOT extracted; do that before trusting the
      adjacent-literature list below.
    benchmarks:
      - mode: MPC semi-private
        speedup_vs_fully_private: 3.0
        accuracy_retention: "close to plaintext (no metric extracted)"

  # Adjacent private-fine-tuning literature. NOT confirmed to be cited by PriFT -- surfaced
  # by search alongside it. Verify before treating as PriFT's references.
  - id: privtuner
    name: PrivTuner
    title: "PrivTuner with Homomorphic Encryption and LoRA: A P3EFT Scheme for Privacy-Preserving Parameter-Efficient Fine-Tuning"
    url: https://arxiv.org/abs/2410.00433
    year: 2024
    uses_zk: false
    authors_verified: false
  - id: private-lora-he
    name: Private LoRA Fine-tuning with HE
    title: "Private LoRA Fine-tuning of Open-Source LLMs with Homomorphic Encryption"
    url: https://arxiv.org/abs/2505.07329
    year: 2025
    uses_zk: false
    authors_verified: false
    notes: "The HE counterpart to VeriLoRA's ZK approach -- same workload, opposite guarantee. Good contrast pair."
  - id: cryptpeft
    name: CryptPEFT
    title: "CryptPEFT: Efficient and Private Neural Network Inference via Parameter-Efficient Fine-Tuning"
    url: https://arxiv.org/abs/2508.12264
    year: 2025
    uses_zk: false
    authors_verified: false
  - id: encryption-friendly-llm
    name: Encryption-Friendly LLM Architecture
    title: "Encryption-Friendly LLM Architecture"
    url: https://arxiv.org/abs/2410.02486
    year: 2024
    uses_zk: false
    authors_verified: false

# ============================================================================
# SECURE / PRIVATE INFERENCE ON TRANSFORMERS (2PC / MPC / HE) -- NOT verifiability
#
# A whole separate line from the zkML atlas. These systems let a CLIENT (holds the input)
# and a SERVER (holds the model weights) jointly run inference so that neither learns the
# other's secret -- the client's prompt stays hidden from the server, the weights stay hidden
# from the client. The guarantee is PRIVACY DURING COMPUTATION, achieved with homomorphic
# encryption + secret sharing + oblivious transfer. It is the INFERENCE analog of
# private_training_no_proofs (PriFT).
#
# Orthogonal to everything else in this file, and easy to confuse:
#   uses_zk: false               -- no proof is produced.
#   verifiable: false            -- almost all are SEMI-HONEST (honest-but-curious). A
#                                   malicious party can still compute the WRONG function; you
#                                   get privacy, not correctness. (zkML gives correctness, not
#                                   privacy-from-a-counterparty.)
#   bottleneck: COMMUNICATION    -- the defining cost. Two parties exchange hundreds of GB over
#                                   many interactive rounds. Iron needs 280.99 GB and 216 min
#                                   for ONE BERT-base inference (per BOLT). Opposite profile to
#                                   zkML (compute/memory-bound prover, cheap non-interactive
#                                   verify).
#   scale: BERT-class (~110M)    -- encoder models, not 8-13B. 2PC comm cost caps model size
#                                   far below what zkML reaches. (CipherGPT does GPT-2-scale.)
#
# The genuinely useful cross-paradigm parallel: the HARD OPERATORS ARE THE SAME. Softmax,
# GELU, LayerNorm are the expensive non-linears in BOTH worlds -- costly lookups/range-checks
# in zkML, costly OT / polynomial-approximation protocols here. Matmul is "easy" in both.
#
# DO NOT plot these next to zkML: different guarantee (privacy vs correctness), different cost
# axis (communication vs prover time), different threat model (semi-honest counterparty vs
# malicious prover).
# ============================================================================

secure_inference_2pc:
  - id: sigma
    name: Sigma
    title: "Sigma: Secure GPT Inference with Function Secret Sharing"
    url: https://doi.org/10.56553/popets-2024-0107
    pdf: https://petsymposium.org/popets/2024/popets-2024-0107.pdf
    venue: "PoPETs 2024(4), pp. 61-79"
    date: 2024-07-01
    year: 2024
    authors:
      - Kanav Gupta
      - Neha Jawalkar
      - Ananta Mukherjee
      - Nishanth Chandran
      - Divya Gupta
      - Ashish Panwar
      - Rahul Sharma
    authors_verified: true
    affiliation: Microsoft Research / University of Maryland / IISc
    approach: Function secret sharing (FSS) in the preprocessing model, GPU-accelerated
    threat_model: >-
      2PC, SEMI-HONEST, static, IN THE PREPROCESSING MODEL WITH A TRUSTED DEALER -- and that last
      clause is the one that matters. The online phase is genuinely two-party and dishonest-majority;
      but the correlated randomness (the FSS keys) is generated by a trusted third party, which
      Sigma chooses out of three options it lists. So it is not a peer of iron/bolt/cheetah, which
      need no dealer, and it is not a peer of puma/mosformer, whose third party is untrusted-but-one-
      of-three. It is its own trust model and this SoK previously had no slot for it.
      Malicious security is explicitly future work.
    open_source: true
    repo: https://github.com/mpc-msri/EzPC/tree/master/GPU-MPC/experiments/sigma
    numbers_source: primary
    hardware: >-
      2 machines, LAN 9.4 Gbps / 0.05 ms ping. Each: NVIDIA A6000 (46 GB), AMD EPYC 7742, 1 TB RAM.
      All models at sequence length 128. Precision f = 12.
    notes: >-
      THE PAPER THAT BREAKS THE "PRIVACY CAPS AT BERT" CLAIM FROM INSIDE 2PC. Sigma runs
      Llama2-13B -- the same scale zkLLM proves in the verifiability column -- with a 37.59 s
      online phase and 18.90 GB of online communication. Iron, which this SoK uses as the anchor
      for the whole privacy column, needs 280.99 GB and 216 minutes for one BERT-base. Sigma does
      BERT-base in 1.72 s and 0.99 GB.

      The mechanism is a different branch of the field that our corpus contained NONE of: function
      secret sharing, moved onto a GPU. Its two ideas are worth having. First, faithful (non-local)
      truncation protocols in FSS -- it explicitly rejects CrypTen's local truncations as known-
      insecure. Second, LUT-shrinking by domain knowledge: rather than Pika's 2^50 table, it
      observes that delta(x) = ReLU(x) - GeLU(x) is zero outside (-4, 4), so a 256-ENTRY table
      suffices for GeLU over 50-bit values. SiLU gets 1024 entries. That is the same "exploit the
      operator's actual range" move the zkML lookup papers make, arrived at independently.

      WHAT TO DISTRUST, AND IT IS THE HEADLINE. THE ADVERTISED NUMBERS ARE ONLINE-ONLY AND THE
      PREPROCESSING IS ENORMOUS. Llama2-13B needs 419.01 GB OF FSS KEYS, 40.57 s to generate them,
      and 356.61 s just to TRANSFER them over the same 9.4 Gbps LAN -- against the 37.59 s online
      figure on the cover. Real wall-clock is roughly 435 s, about 11x the advertised number.
      Llama2-7B: 255.41 GB of keys, 217.37 s of transfer, 23.09 s online. The keys are one-shot and
      shape-specific; there is no amortization story for a second query.

      Also: CrypTen OOMs on 7B and 13B, so the models the title is about have NO BASELINE AT ALL --
      the 12-19x speedup range is measured on the models nobody cares about. And Table 4 reports
      BERT-base/MRPC at 87.25% secure vs 84.31% plaintext, i.e. the encrypted version scores THREE
      POINTS BETTER than the model it is emulating, on a 408-example validation set. That is noise,
      and it is in the table that is supposed to demonstrate faithfulness.

      Single forward pass only. The strings "KV cache", "autoregressive" and "decoding" do not
      appear. Generating N tokens means N full runs, each with a fresh key set -- so at 419 GB of
      keys per run, generation is not a thing this system does.
    quantization:
      bits: null
      bits_note: >-
        Not a single bit width: Sigma runs each model at a bespoke ring size chosen per model
        (37 bits for BERT-tiny, 50 for BERT-base/large and GPT2, 51 for GPT-Neo, 48 for Llama2),
        with fixed-point precision f = 12. The "effective bitwidth" analysis is one of its
        contributions.
      accuracy_retention: >-
        Measured as task accuracy vs 32-bit float PyTorch. Llama2-7B Lambada 69.92% vs 70.17%;
        Llama2-13B 72.99% vs 73.14%; GPT-Neo 57.81% vs 57.46%; BERT-base QNLI 91.63% vs 91.60%.
        No perplexity is reported anywhere. BERT-base/MRPC comes out 2.94 points ABOVE plaintext,
        which is a 408-sample artifact and is reported without comment.
    benchmarks:
      - model: Llama2-13B
        params: 13000000000
        context_window: 128
        proving_time_s: 37.59      # ONLINE ONLY. 419 GB of keys and 356.61 s of transfer excluded.
        communication_mb: 18900
        accuracy: "72.99% Lambada (vs 73.14% fp32)"
        note: >-
          Online phase only. Preprocessing: 419.01 GB of FSS keys, 40.57 s to generate, 356.61 s to
          transfer. True wall clock ~435 s. This is the largest model in the privacy column and it
          is the same size as the largest model in the verifiability column (zkLLM's LLaMA-2-13B).
      - model: Llama2-7B
        params: 7000000000
        context_window: 128
        proving_time_s: 23.09
        communication_mb: 12070
        accuracy: "69.92% Lambada (vs 70.17% fp32)"
        note: "Online only. 255.41 GB of keys; 217.37 s to transfer them. CrypTen cannot run this model."
      - model: GPT-Neo
        params: 1300000000
        context_window: 128
        proving_time_s: 7.19
        communication_mb: 4030
      - model: GPT-2
        params: 124000000
        context_window: 128
        proving_time_s: 1.51
        communication_mb: 820
      - model: BERT-base
        params: 110000000
        context_window: 128
        proving_time_s: 1.72
        communication_mb: 990
        note: >-
          Compare the anchor this SoK has been quoting for three years: Iron, BERT-base, 280.99 GB
          and 216 minutes. Sigma: 0.99 GB and 1.72 seconds online (16.84 GB of keys, 14.33 s to
          transfer). Same model, same threat-model family, four years apart.
      - model: BERT-large
        params: 330000000
        context_window: 128
        proving_time_s: 4.44
        communication_mb: 2640

  - id: cheetah
    name: Cheetah
    title: "Cheetah: Lean and Fast Secure Two-Party Deep Neural Network Inference"
    url: https://eprint.iacr.org/2022/207
    pdf: https://www.usenix.org/system/files/sec22-huang-zhicong.pdf
    venue: USENIX Security 2022
    date: 2022-08-10
    year: 2022
    authors: [Zhicong Huang, Wen-jie Lu, Cheng Hong, Jiansheng Ding]
    authors_verified: true
    affiliation: Alibaba Group
    approach: 2PC -- rotation-free coefficient-encoded HE for linear layers + silent OT (Ferret) for non-linear
    threat_model: >-
      2PC, SEMI-HONEST, dishonest majority (one of two corrupted). The client learns the network
      ARCHITECTURE and the inference result, nothing else. No malicious security.
    open_source: true
    repo: https://github.com/Alibaba-Gemini-Lab/OpenCheetah
    numbers_source: primary
    hardware: "Alibaba Cloud, 2.70 GHz, 16 GB RAM. LAN ~384 MB/s, 0.3 ms RTT. WAN ~44 MB/s, 40 ms RTT."
    objectives: [inference]
    notes: >-
      PROMOTED FROM AN `external:` GRAPH STUB TO A REAL PAPER, 2026-07-13, and that promotion is the
      point. Cheetah is one of the THREE NODES this SoK's headline bridge finding rests on -- "the
      only three papers cited by both columns are SIRNN, Cheetah and SecFloat" -- and we had never
      read it. It was a name in a graph.

      Its lasting contribution, and what every later paper in this section builds on: a ROTATION-FREE
      homomorphic linear layer. By coefficient-encoding the convolution rather than using SIMD/CRT
      packing, a whole CONV or FC becomes a SINGLE homomorphic polynomial multiplication -- no HE
      rotations at all, which lets it drop the lattice dimension from 8192 to 4096 and accept secret
      shares from Z_{2^l} for free. Iron, BOLT, BumbleBee and Nimbus all inherit this encoding.
      Its second half is VOLE-style silent OT (Ferret) for comparison and truncation.

      AND ITS TRUNCATION IS APPROXIMATE, ON PURPOSE. Cheetah keeps a 1-bit error with probability
      1/2 and eliminates only the "harsh" error -- 13l bits of communication against CrypTFlow2's
      faithful lambda(l+f+2) + 19l + 14f. This is the MPC bargain the numerics page is about, made
      explicitly: accept a bounded, benign error and pay far less. In ZK the same trade is
      unavailable, because the prover chooses the input. Cheetah is the cleanest primary source for
      that contrast and we have been making the argument without it.
    quantization:
      bits: null
      scheme: >-
        Fixed-point over Z_{2^l}, f = 12 (f = 11 for the CIFAR nets). Truncation is deliberately
        APPROXIMATE: a 1-bit error (probability 1/2) is retained, the harsh error is removed.
      accuracy_retention: >-
        No numeric delta reported. The paper says only that on ~1000 ImageNet images Cheetah
        "outputs the same classification label as SCI_HE" for all of them.
    benchmarks:
      - model: ResNet50 (ImageNet)
        params: 23000000
        proving_time_s: 80.3     # LAN
        communication_mb: 2300
        note: "WAN: 134.7 s. Against CrypTFlow2's 295.7 s LAN / 29.2 GB -- 5.6x and 12.9x."
      - model: DenseNet121
        params: null
        proving_time_s: 79.3
        communication_mb: 2400
      - model: SqueezeNet
        params: null
        proving_time_s: 16.0
        communication_mb: 500

  - id: delphi
    name: Delphi
    title: "Delphi: A Cryptographic Inference Service for Neural Networks"
    url: https://eprint.iacr.org/2020/050
    pdf: https://www.usenix.org/system/files/sec20-mishra_0.pdf
    venue: USENIX Security 2020
    date: 2020-08-12
    year: 2020
    authors:
      - Pratyush Mishra
      - Ryan Lehmkuhl
      - Akshayaram Srinivasan
      - Wenting Zheng
      - Raluca Ada Popa
    authors_verified: true
    affiliation: UC Berkeley
    approach: 2PC -- offline/online split, HE preprocessing for linear layers, GC + quadratic approximations for ReLU
    threat_model: >-
      2PC, SEMI-HONEST, dishonest majority. Client learns the architecture and the result. The
      paper is unusually candid about a SECOND leak: because the NAS planner uses training data to
      decide where quadratics go, "revealing the network architecture reveals some information
      about the data ... at most l bits" (l = 32 for ResNet-32).
    open_source: true
    numbers_source: primary
    hardware: >-
      AWS c5.2xlarge, Intel Xeon 3.0 GHz, 16 GB RAM, 4 threads, client and server in us-west-1 and
      us-west-2 (a cross-region WAN). BANDWIDTH AND LATENCY ARE NEVER STATED -- only the AWS
      regions. For a paper whose whole cost model is communication, that is a real hole.
    objectives: [inference]
    notes: >-
      THE LARGEST BIBLIOGRAPHY HOLE THIS SOK HAD: cited by NINE of the thirty PDFs we hold, and
      absent from papers.yml entirely until 2026-07-13.

      Two ideas, both of which the whole section still runs on. First, the OFFLINE/ONLINE SPLIT:
      the server's weights are known before the client's input arrives, so all the homomorphic
      encryption can be pushed into preprocessing and the online linear layer becomes plain
      secret-shared arithmetic. Every offline/online accounting table in this section descends from
      this paper. Second, the RELU BUDGET: use neural architecture search to decide WHICH ReLUs to
      replace with quadratic approximations, because a quadratic costs 192x less online
      communication and 10000x less online compute than a garbled circuit.

      AND NOW THE REASON THIS PAPER MATTERS TO THE NUMERICS SECTION, WHICH IS NOT WHY IT IS FAMOUS.
      Delphi is the ONE privacy-column paper that cites a verifiability-column paper. It cites
      SafetyNets -- twice, in the body -- and NOT for verifiability. It cites it as prior evidence
      about whether QUADRATIC ACTIVATIONS TRAIN WELL. Delphi's body contains ZERO occurrences of
      "verifiable", "integrity", "zero-knowledge", "proof of correctness" or "malicious server".
      It does not know it is citing a verifiability paper.

      And its answer to the question is the one the SafetyNets-vs-Bionetta debate on the numerics
      page needs: quadratic activations DO NOT TRAIN. "the quadratic activations cause the
      underlying gradient descent algorithm to diverge, resulting in poor accuracy." Delphi had to
      invent gradient clipping, ReLU6 and a "gradual activation exchange" annealing schedule just to
      make them converge at all -- and even then it uses NAS to keep MOST activations as ReLUs.
      SafetyNets' famous ~5% overhead comes from an all-quadratic network. Delphi is the paper that
      tried to scale that idea and reported what happened.
    quantization:
      bits: null
      scheme: "Fixed-point; online phase in a 32-bit prime field (chosen to fit a GPU)."
      accuracy_retention: >-
        NOT TABULATED -- reported only as curves (Figs. 7-9). Qualitatively: planner-produced
        networks are "comparable to" the all-ReLU baselines (CIFAR-10 ~85-86%, CIFAR-100 ResNet-32
        ~65-68% vs a ~68% baseline). Do not invent a delta from the figures.
    benchmarks:
      - model: ResNet-32 (CIFAR-100)
        params: null
        proving_time_s: 3.8       # ONLINE phase only
        communication_mb: 60
        note: >-
          Online phase. Against GAZELLE's ~82 s and >560 MB: 22x and 9x. Preprocessing is a further
          cost and on ReLU-heavy networks Delphi's preprocessing is WORSE than GAZELLE's, which the
          paper says outright.

  - id: iron
    name: Iron
    title: "Iron: Private Inference on Transformers"
    url: https://proceedings.neurips.cc/paper_files/paper/2022/hash/64e2449d74f84e5b1a5c96ba7b3d308e-Abstract-Conference.html
    pdf: https://proceedings.neurips.cc/paper_files/paper/2022/file/64e2449d74f84e5b1a5c96ba7b3d308e-Paper-Conference.pdf
    venue: NeurIPS 2022
    date: 2022-11
    year: 2022
    authors: [Meng Hao, Hongwei Li, Hanxiao Chen, Pengzhi Xing, Guowen Xu, Tianwei Zhang]
    authors_verified: true
    affiliation: UESTC / Nanyang Technological University
    uses_zk: false
    verifiable: false
    security_model: semi-honest 2PC (client-server)
    approach: >-
      Hybrid HE/MPC. Custom HE-based matmul with a compact packing technique (sqrt(m)x less
      communication than Cheetah's matrix-vector approach, ~8x for transformers). Non-linear
      Softmax / GELU / LayerNorm via SIRNN-based OT protocols with bespoke optimizations.
    numbers_source: primary  # read the NeurIPS PDF, 2026-07-11
    pdf_available: true  # NeurIPS proceedings mirror (eprint would be blocked)
    benchmarks:
      - models: [BERT-Tiny, BERT-Medium, BERT-Base, BERT-Large]
        task: GLUE
        vs_prior: "3-14x less communication, 3-11x less runtime vs SIRNN; up to 2 orders of magnitude vs MP-SPDZ"
        accuracy: "<=0.3% loss vs plaintext on BERT-Tiny (GLUE); +0.85% on MNLI"
        accuracy_note: >-
          MEASURED (Sec 5.3, Fig 6) -- and ONLY on BERT-TINY. There is no accuracy data for
          BERT-Medium / Base / Large, which are the models everything downstream quotes. Verbatim:
          "the accuracy loss does not exceed 0.3% over all datasets, and surprisingly, Iron
          exceeds the plaintext baseline on MNLI by 0.85%." Fig 6's printed per-dataset deltas are
          0.85% (MNLI), 0% and 0.27%. The frequently repeated "exactly" is SCALE-CONDITIONAL and
          SINGLE-DATASET: "Iron with the scale of 12 exactly matches the accuracy of the plaintext
          model [MRPC]. The accuracy loss is lower than 1% when the scale >= 6."
          CORRECTED 2026-07-13: this field previously held only the ABSTRACT's claim ("all
          protocols are numerically precise, which preserve the model accuracy of plaintext"),
          which is a claim, not data -- and it is what licensed a page to assert that Iron
          preserves accuracy "exactly" while reporting no accuracy data.
        network: "LAN ONLY -- simulated, 377 MBps (~3 Gbps), 0.8 ms echo latency; AWS c5.9xlarge, Intel Xeon 8000 @ 3.6 GHz"
    notes: >-
      The paper that initiated private transformer inference. Hides intermediate results of ALL
      layers (unlike THE-X, which leaks non-linear-layer inputs to the client).
      THE ANCHOR EVERYONE QUOTES IS NOT IRON'S. "Iron at 280.99 GB / 216 min for BERT-base" is
      BOLT'S RE-IMPLEMENTATION of Iron, measured under a WAN ({100 Mbps, 80 ms}) that Iron's own
      authors never ran -- Iron measured a LAN only (Sec 5.1: "we simulate a LAN network setting,
      where the bandwidth is 377 MBps and the echo latency is 0.8ms"), and Iron's paper prints no
      numeric end-to-end communication figure anywhere. Attribute the number to BOLT, not to Iron.

  - id: ciphergpt
    name: CipherGPT
    title: "CipherGPT: Secure Two-Party GPT Inference"
    url: https://eprint.iacr.org/2023/1147
    pdf: https://eprint.iacr.org/2023/1147.pdf
    venue: IACR ePrint 2023/1147
    date: 2023-07
    year: 2023
    authors: [Xiaoyang Hou, Jian Liu, Jingyu Li, Yuhan Li, Wen-jie Lu, Cheng Hong, Kui Ren]
    authors_verified: true  # read from the PDF (user-provided), 2026-07-11
    affiliation: Zhejiang University / Ant Group
    uses_zk: false
    verifiable: false
    security_model: semi-honest 2PC
    approach: >-
      First secure 2PC GPT inference. Three custom protocols: (1) sVOLE-based (subfield VOLE)
      matrix multiplication customized for GPT's autoregressive generation -- each response
      word is one inference producing an UNBALANCED matmul, and they combine these into a
      single unbalanced matmul over sVOLE (efficient when n >> k); (2) SPLINE-based GELU --
      split the GELU curve into intervals, one LUT to find the interval, then a per-interval
      linear function y=ax+d via multiply-then-truncate, avoiding the error accumulation of
      multi-step (SIRNN/Iron) and high-degree-polynomial (BOLT) approaches; (3) shuffling-based
      top-K selection + the FIRST secure top-K SAMPLING protocol.
    numbers_source: primary  # read the PDF
    pdf_available: true  # references/privacy-inference/ciphergpt.pdf
    model: GPT-2
    benchmarks:
      # RESTRUCTURED 2026-07-13. These rows previously carried only `component` and `vs_sota`,
      # neither of which is in build.py's DEFAULT_COLS, and the entry had no top-level `model` --
      # so CipherGPT rendered in the 2PC table as two entirely blank rows, and the paper's OWN
      # headline number was nowhere in this file.
      - model: GPT-2 (end-to-end, per generated token)
        params: 117000000
        inference_latency_s: 1180.9
        inference_latency_note: >-
          Table V Total: 1,180,933 ms (~20 min) to produce ONE token. "A comprehensive benchmark
          for CipherGPT in generating a single response word; these are amortized results for the
          generation of 256 response words; the input is a vector of 256 words." 12 transformer
          decoders, embedding size 768. The paper's own verdict (Sec IX): "CipherGPT requires a
          latency of 20 minutes and a bandwidth of 15 GB to produce a token. This level of cost is
          currently impractical."
        communication_mb: 15096.82
        communication_note: "Table V Total = 15,096.82 MB (~15 GB) PER TOKEN, amortized over a 256-word response."
        accuracy: "99.22% of outputs identical to plaintext GPT-2 (10,000 WikiText-103 sentences)"
        accuracy_note: >-
          Sec VIII-D: "99.22% of the outputs generated by CipherGPT are identical to the outputs
          produced by GPT-original ... Even for the outputs that are different (78 out of 10 000),
          each of these 'wrong' outputs still falls within the top-5 outputs." Top-K sampling was
          disabled (K=1) for this comparison.
        network: "LAN ONLY (3000 Mbps, 0.8 ms RTT), SINGLE THREAD; AWS c5.9xlarge, Xeon 8000 @ 3.6 GHz"
      - model: GPT-2 (component -- matrix multiplication, sVOLE)
        component: matrix multiplication
        vs_sota: "vs BumbleBee: 5.8x runtime / 1.4x comm at t=256 words; 6.2x / 4.1x only at t=1024"
        vs_sota_note: >-
          The abstract's "up to 6.2x speedup and 4.1x bandwidth reduction" is the t=1024 figure --
          "up to" is doing the work. At t=256, the paper's own "reasonable number of iterations",
          Sec VIII-D gives: "the amortized runtime for our protocol is 1 462ms, 2.3x speedup over
          Iron, 6.4x speedup over Bolt and 5.8x speedup over BumbleBee; the amortized
          communication for our protocol is 8.2MB, 3.7x reduction over Iron, 3.0x reduction over
          Bolt and 1.4x reduction over BumbleBee." The gain is a function of how many response
          words are preprocessed together.
        network: "LAN only (3000 Mbps, 0.8 ms RTT), single thread"
      - model: GPT-2 (component -- GELU, spline)
        component: GELU (spline-based)
        vs_sota: "vs BOLT: 1.8x runtime, 2.5x comm, 7.4x precision. But communication REGRESSES vs Bolt+/BumbleBee."
        vs_sota_note: >-
          Table IV, GELU over a 2^20-length vector of 37-bit elements: Iron 694 s / 12,225 MB;
          Bolt 55.61 s / 1,962.23 MB; Bolt+ (Bolt with BOLE) 52.22 s / 559.28 MB; BumbleBee
          73.52 s / 641.02 MB; CipherGPT 30.56 s / 764.96 MB. The headline "2.5x less
          communication" is measured against PLAIN BOLT ONLY -- against Bolt+ (559.28 MB) and
          BumbleBee (641.02 MB), CipherGPT's GELU uses MORE communication, and the runtime win
          falls to 1.7x ("Compared with Bolt+, we still achieves a 1.7x speedup"). The PRECISION
          win is unambiguous and is the real result: maximal ULP error 5, vs Bolt's 37 (7.4x) and
          BumbleBee's 73 (14.6x).
        network: "LAN only (3000 Mbps, 0.8 ms RTT), single thread"
      - model: GPT-2 (component -- top-K selection)
        component: top-K (K=100 from a 50,257-entry vocabulary vector)
        inference_latency_s: 3.281
        communication_mb: 136.1
        vs_sota: "8.8x speedup, 14.8x less communication vs a Bitonic sorting network"
        network: "LAN only (3000 Mbps, 0.8 ms RTT), single thread"
    notes: >-
      The GPT-focused member of the line -- and uniquely, the one that handles AUTOREGRESSION
      and SAMPLING. Its secure top-K sampling is the first of its kind. This is the exact
      capability the zkML side (Jolt Atlas) lacks: recall Jolt Atlas proves a single forward
      pass with no decode/sampling, whereas CipherGPT builds bespoke 2PC protocols for
      word-by-word generation and stochastic top-K decode. See the docs' certify/argmax pages.

  - id: bolt
    name: BOLT
    title: "BOLT: Privacy-Preserving, Accurate and Efficient Inference for Transformers"
    url: https://eprint.iacr.org/2023/1893
    pdf: https://encrypto.de/papers/PZMZS24.pdf  # open mirror; eprint PDF is blocked
    venue: IEEE S&P 2024
    date: 2024-05
    year: 2024
    authors: [Qi Pang, Jinhao Zhu, Helen Möllering, Wenting Zheng, Thomas Schneider]
    authors_verified: true
