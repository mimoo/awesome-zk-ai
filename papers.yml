# zkAI paper benchmark data
#
# Field conventions:
#   - `null` means the paper does not report the value (or we could not access it).
#     Never fill a null with a guess -- the point of this file is to be plottable.
#   - `tokens_per_minute.source: reported` = printed in the paper as a throughput figure.
#     `tokens_per_minute_source: derived`  = computed by us as 60 / seconds_per_token.
#     Derived numbers are NOT comparable to reported ones without care: a single
#     forward-pass proving time is not the same thing as sustained decode throughput.
#   - `context_window` is the sequence length actually used in the benchmark, not the
#     model's architectural maximum.
#   - `numbers_source: primary`  = read out of the paper itself.
#     `numbers_source: survey`   = taken from Tables IV/V/VI of the ZKP-VML survey
#                                  (arXiv:2502.18535). Secondhand. Where the survey and the
#                                  primary paper disagree, both are recorded and flagged.
#   - `authors_verified: false`  = author list not yet confirmed against the paper. Do not
#                                  cite these without checking.
#   - `quantization` is a CONFOUNDER, not a footnote. Proving cost depends on the bit width
#     of the quantized model, and papers do not agree on a bit width. A system reporting
#     great throughput at 8 bits is not comparable to one reporting throughput at 16 bits.
#     `quantization.bits: null` means the paper does not state it -- which is itself a
#     finding. Always plot bit width alongside throughput, or note it in the caption.
#     `accuracy_retention` records what the quantization cost in model quality; a throughput
#     number with no accuracy claim attached is not a meaningful data point.
#
#   - `claim_kind` is THE most important field in this file, and the one the literature
#     is sloppiest about. Two systems both reporting "tokens/minute" may be proving
#     completely different things. Set it per paper, or per benchmark row when a paper's
#     rows differ. Vocabulary:
#       pass  -- a single forward pass. The commonest claim, and the weakest.
#       token -- cost of proving one generated token, in isolation.
#       seq   -- amortised over a full multi-token generation, with the sequence
#                certified end to end. The strongest claim; only DeepProve makes it.
#       full  -- "the whole inference", token count NOT stated by the paper. This is
#                not a claim, it is an ambiguity, and it is recorded as one.
#     A throughput number without a claim_kind beside it is not comparable to anything.
#     Curation ported from the SCALE table of the hand-built Operator Atlas
#     (site/legacy/operator-atlas.html), which was assembled by reading each paper.
#
# Categories follow the survey's three verification objectives:
#   inference -- the model ran correctly on this input
#   testing   -- this model achieves claimed accuracy on this dataset
#   training  -- this model is the result of correctly training on this data

inference:
  - id: deepprove
    name: DeepProve
    claim_kind: seq  # full sequence certified end-to-end across all generated tokens
    title: "DeepProve: Verifiable End-to-End Large Language Model Inference"
    url: https://eprint.iacr.org/2026/1112
    pdf: https://eprint.iacr.org/2026/1112.pdf
    venue: IACR ePrint 2026/1112
    date: 2026-05-30
    year: 2026
    authors:
      - Nicolas Gailly
      - Ismael Hishon-Rezaizadeh
      - Tianyi Liu
      - Nicholas Mainardi
      - Dimitrios Papadopoulos
      - Charalampos Papamanthou
      - Christodoulos Pappas
      - Shravan Srinivasan
      - Zack Youell
      - Yupeng Zhang
    authors_verified: true
    affiliation: Lagrange Labs / HKUST / Yale / UIUC
    proof_system: Sum-check + lookup arguments
    commitment_scheme: [HyperKZG, BaseFold]
    hardware: "primary: AMD EPYC 9254, 24 cores @ 2.9 GHz, 504 GB RAM (48 threads); secondary: AMD Ryzen 9 7950X3D, 16 cores @ 4.2 GHz, 128 GB RAM (32 threads)"
    hardware_note: >-
      The headline 174/86 TPM figures are from the SECONDARY machine (faster clock, fewer
      cores). The primary machine peaks at 127 TPM (GPT-2) and 64 TPM (Gemma 3). Gemma 3 at
      seq 512 with HyperKZG OOMs on the secondary machine.
    open_source: true
    repo: https://github.com/Lagrange-Labs/deep-prove
    numbers_source: primary
    quantization:
      bits: 12  # all reported benchmarks; the system is parameterizable over 8/10/12
      bits_note: >-
        "We run inference on the GPT-2 and Gemma 3 models using DeepProve using 12-bit
        quantization level" (Sec. 5, Experiments). Accuracy is also reported at 8 and 10 bits.
        Going 8 -> 12 bits costs only 0.8% extra prover time, because the number of lookup
        tables barely changes -- so the 12-bit accuracy is bought almost for free.
      scheme: >-
        Symmetric affine quantization centered at zero (zero-point vanishes), for both weights
        and activations. Post-training static quantization with a calibration dataset;
        s = a / (2^(b-1) - 1) with a = max(|x_max|, |x_min|); activations clamped to [-a, a].
        Mixed precision: residual layers use a larger bit length. Outlier smoothing via
        orthonormal rotation X*W = (X*M)(M^T*W), with M absorbed into the previous layer's
        weights. Unlike zkGPT/zkTorch, scale factors are NOT restricted to powers of two.
      rescale_mechanism: >-
        PRIMARY, Sec 4.3.2. y = floor( (Quant(2^f * eps) * x + 2^(f+delta-1)) / 2^(f+delta) )
        - 2^(q-1). The arbitrary float scale eps is fixed-point-encoded as the integer
        Quant(2^f * eps), so the MULTIPLIER is arbitrary but the DIVISOR is a power of two --
        i.e. a right shift, which the paper notes is "easier to prove". The shift is proven with
        a lookup argument over decomposable tables (Lasso/Shout-style): decompose x' into k-bit
        chunks, range-check each chunk, keep the q/k most significant. The +2^(f+delta-1) term
        is round-to-nearest (add a half before flooring).
        DeepProve's real novelty here is Case 2: it also proves requantization when the input is
        OUT of the expected range, via tables that emit -1/0/+1 to flag and correct overflowing
        elements. It states that the in-range case is "the only scenario considered by prior
        works [SLZ24 = zkLLM, QSL+25 = zkGPT]" -- i.e. those two ASSUME in-range inputs, which is
        accurate.
        CORRECTION, do not overclaim: DeepProve is the only PAPER with an explicit out-of-range
        protocol, NOT the only SYSTEM with out-of-range handling. Jolt Atlas does it too -- a
        saturating clamp (SatClamp: i64 accumulator clamped to i32) discharged by a prefix-suffix
        Shout sumcheck and FUSED INTO THE SAME REBASE SEAM as the rescale -- but only its SOURCE
        CODE says so; the paper never mentions it. The mechanisms differ: DeepProve DETECTS
        out-of-range with a proven predicate (zero-detector + sign-extractor tables blended to
        +/-2^(q-1)); Jolt SATURATES unconditionally with one clamp lookup. Proven predicate vs
        proven function. Jolt's coverage is partial where it matters: in ZK mode Add/Sub/Sum are
        proved UNCLAMPED, the ONNX Clamp op is an unproven passthrough (// TODO: Clamp), and the
        tanh/erf/sigmoid clamps are prover-side assert!s over unconstrained advice.
      conflict_flag: >-
        UNRESOLVED. DeepProve asserts that zkGPT/zkTorch restrict scale factors to powers of two.
        zkGPT's own text does NOT support this: zkGPT Sec 2.1/4.1 computes
        qz = round((C1/C2) * qx * qy) where C1, C2 are Q-bit integers "obtained by searching",
        approximating the arbitrary float ratio Sx*Sy/Sz -- an arbitrary rational, not a power of
        two. Both systems in fact support arbitrary float scales; they differ in HOW (DeepProve:
        integer multiplier + power-of-two shift; zkGPT: rational C1/C2 enforced by a double
        inequality, no division at all). Treat DeepProve's characterization of prior work with
        care. See docs/numerics.md.
      accuracy_retention:
        metric: [cosine_similarity, perplexity]
        dataset: Wikitext-2  # first 256 tokens of 25 documents; perplexity over first 255 logit rows
        gpt2:
          fp32_perplexity: 49.2198
          by_bits:
            8:  {cosine: 0.9967, perplexity: 60.9273}
            10: {cosine: 0.9993, perplexity: 50.0806}
            12: {cosine: 0.9966, perplexity: 49.4863}
        gemma3:
          fp32_perplexity: 515.46
          by_bits:
            8:  {cosine: 0.2035, perplexity: null}  # paper prints "> 1150"
            10: {cosine: 0.6998, perplexity: 1150.43}
            12: {cosine: 0.9587, perplexity: 454.72}
        summary: "GPT-2 at 12 bits is within 0.54% of the fp32 perplexity baseline."
      note: >-
        Gemma 3 collapses below 12 bits (cosine 0.20 at 8 bits). The paper attributes this to
        extremely large outlier activations plus extra RMSNorm layers in the transformer
        blocks, which block the orthonormal-rotation smoothing that works for GPT-2. Two
        oddities as printed: GPT-2's cosine similarity is slightly WORSE at 12 bits (0.9966)
        than at 10 (0.9993), and Gemma 3's 12-bit perplexity (454.72) is BETTER than its own
        fp32 baseline (515.46). Both reproduced verbatim from Table 4; neither is explained.
    notes: >-
      First system to prove full end-to-end LLM inference across all generated tokens of a
      prompt, rather than a single forward pass. Also reports a distributed prover reaching
      1855 tokens/min. Bit width now confirmed at 12 (see quantization.bits): the 174 TPM is
      therefore at 12 bits vs zkGPT's 2.75 TPM at 16 bits, so the ~63x gap is NOT
      bit-width-normalized -- and the two also differ in context (512 vs 32) and in what is
      proven (full sequence certification vs a single token).
    benchmarks:
      - model: GPT-2
        params: 124000000
        context_window: 512
        proving_time_s: null
        tokens_per_minute: 174
        tokens_per_minute_source: reported
        tokens_per_minute_note: "BaseFold, secondary machine. HyperKZG on the same machine: 146 TPM; primary machine: 127 TPM."
        proof_size_mb: [7, 27]
        verification_time_s: 1.2
        verification_time_note: >-
          Sec. 1.2 says "around 1.2 seconds for GPT-2"; the abstract says "1 to 3.7 seconds"
          across both models; Table 2 (secondary, BaseFold, seq 512) prints 1.65 s and Table 1
          (primary, HyperKZG, seq 512) prints 3.22 s. The paper is internally inconsistent.
        peak_ram_gb: 41.85  # BaseFold, primary machine, seq 512
      - model: Gemma 3
        params: 270000000  # "Gemma 3 (270 million parameters)" -- Sec. 1.2
        context_window: 512
        proving_time_s: null
        tokens_per_minute: 86
        tokens_per_minute_source: reported
        proof_size_mb: [16, 54]
        verification_time_s: 3.7
        verification_time_note: "Sec. 1.2 says ~4 s; abstract's range tops out at 3.7 s."
        peak_ram_gb: 96.27  # BaseFold, primary machine, seq 512; HyperKZG needs 147 GB
      - model: GPT-2 (distributed prover)
        params: 124000000
        context_window: 512
        proving_time_s: null
        tokens_per_minute: 1855
        tokens_per_minute_source: reported
        proof_size_mb: null
        verification_time_s: null

  - id: jolt-atlas
    name: Jolt Atlas
    claim_kind: pass  # single forward pass
    title: "Jolt Atlas: Verifiable Inference via Lookup Arguments in Zero Knowledge"
    url: https://arxiv.org/abs/2602.17452
    pdf: https://arxiv.org/pdf/2602.17452
    venue: arXiv:2602.17452
    date: 2026-02-19
    year: 2026
    authors: [Wyatt Benno, Alberto Centelles, Antoine Douchet, Khalil Gibran]
    authors_verified: true
    affiliation: ICME Labs
    proof_system: Jolt-style lookup arguments over sum-check, applied to ONNX tensor ops
    commitment_scheme: [HyperKZG]
    hardware: MacBook Pro (Apple M3), 16 GB RAM
    open_source: true
    repo: https://github.com/ICME-Lab/jolt-atlas
    numbers_source: primary
    quantization:
      bits: null  # still not stated as a model-wide quantization choice
      widths_from_source: >-
        NOT IN THE PAPER -- read from the code. Accumulator is i64, saturating-clamped to i32
        (lookup_tables/sat_clamp.rs: `64 => (index as i64).clamp(i32::MIN as i64, i32::MAX as i64)`,
        plus a 16->8 variant). The often-quoted "16-bit" figure is the ACTIVATION width only; the
        accumulator width is i64 and was never stated. Fixed-point scale = 128 = 2^7 (paper Sec 4.2,
        "128-scale fixed-point representation"). Lookup tables: 2^16 (tanh/erf/sigmoid), 2^12
        (sin/cos), ~401 entries for the softmax exp via a two-table e^(a+b) = e^a * e^b split.
        Teleportation tau = 4 in the paper but tau = 2 in the code.
      bits_note: >-
        Two incidental mentions only, both in Sec. 4.2 and both about the ACTIVATION LOOKUP
        TABLE rather than the model: the tau=4 table is "sufficient for 16-bit fixed-point
        activations", and the teleportation error bound is quoted "on a 128-scale fixed-point
        representation". No calibration procedure, scale-factor derivation, zero-point
        discussion, or bit-width sensitivity study appears anywhere in the paper.
      scheme: "Neural teleportation to compress lookup table sizes"
      accuracy_retention: "\"while preserving model accuracy\" (no metric given)"
      note: >-
        Lookup-table size is the dominant cost here, and table size grows exponentially in
        the bit width of the lookup input -- so bit width matters more for this design than
        for pure sum-check systems. That it is unstated is a real gap.
        Separately, teleportation is by the authors' own admission LOSSY ("y' != y in
        general"), and its error is bounded only in raw output units (< 55 units on a
        128-scale fixed-point representation at tau=4) -- never in model-level accuracy.
        There is NO perplexity or task-accuracy number for any model in this paper.
    notes: >-
      Proves ONNX tensor operations directly instead of emulating a CPU, so there is no
      RISC-V trace. Zero-knowledge via the BlindFold technique -- the only system here that
      actually hides the witness. Targets memory-constrained / on-device proving: prefix-suffix
      decomposition of lookup tables cuts peak prover memory from O(|T|) to ~O(|T|^(1/C)),
      which is how a 125M-parameter model proves inside 16 GB.
      CORRECTION (2026-07-10): a previous note here said Sec. 6.2 "contains no measurements".
      It does -- Table 3 carries the full GPT-2 stage breakdown, but LaTeX floated the table
      onto p.19, past the Sec. 7 heading, so it does not appear under the 6.2 header in a
      linear text scan. The GPT-2 row below is now populated.
    benchmarks:
      - model: nanoGPT
        params: 250000
        layers: 4
        context_window: null
        proving_time_s: 14.0
        setup_time_s: 0.492  # verifying key 0.246s + proving key 0.246s
        tokens_per_minute: 4.3
        tokens_per_minute_source: derived
        tokens_per_minute_note: "60 / 14s single proof. Paper does not frame this as decode throughput; order-of-magnitude only."
        proof_size_mb: null
        verification_time_s: 0.517
        baseline_comparison: "ezkl on the same model: 237s proof time (+ >400s key gen), 0.34s verify => ~17x speedup on proving alone."
      - model: GPT-2
        params: 125000000
        context_window: null  # NOT STATED -- see notes; this is what makes the number uncomparable
        proving_time_s: 38.0
        proving_time_note: "\"End-to-end total ~38 s\" (Table 3). Component stages are printed with a tilde, i.e. approximate."
        setup_time_s: 0.872  # "Proving/verifying key generation"
        proving_breakdown_s:
          witness_generation: 7.5
          commitment: 3.5
          sum_check_proving: 16.0
          reduction_opening_proof: 7.0
          hyperkzg_prove: 3.0
        tokens_per_minute: null
        tokens_per_minute_note: >-
          NOT derivable. The paper never states how many tokens the 38 s covers, nor the
          sequence length. Unlike DeepProve, it never discusses autoregression or KV caching,
          so it is unknown whether this is one forward pass or a full generation. Do not
          plot this against DeepProve's TPM.
        proof_size_mb: null
        verification_time_s: null  # reported for nanoGPT (0.517 s) but not for GPT-2
        notes: >-
          Table 3, p.19. Hardware is a MacBook Pro M3 / 16 GB -- far weaker than any other
          system in this table, which cuts the other way from the missing context window.

  - id: zkgpt
    name: zkGPT
    claim_kind: pass  # single forward pass, context 32
    title: "zkGPT: An Efficient Non-interactive Zero-knowledge Proof Framework for LLM Inference"
    url: https://eprint.iacr.org/2025/1184
    pdf: https://www.usenix.org/system/files/usenixsecurity25-qu-zkgpt.pdf
    venue: USENIX Security 2025
    date: 2025-08-13
    year: 2025
    authors: [Wenjie Qu, Yijun Sun, Xuanming Liu, Tao Lu, Yanpei Guo, Kai Chen, Jiaheng Zhang]
    authors_verified: true
    affiliation: National University of Singapore / HKUST
    proof_system: GKR + sum-check (non-interactive via Fiat-Shamir)
    commitment_scheme: [Hyrax]
    curve: BN254 (~100-bit security)
    hardware: Intel Xeon 6126 2.60GHz 16-core CPU, 200 GB RAM, 32 threads
    open_source: null
    numbers_source: primary
    quantization:
      bits: 16
      scheme: "Affine, x = S(q - z), inherited from zkCNN. All params and intermediates are Q-bit ints, q in [0, 65536]. Scale S and zero-point z shared per layer/tensor."
      accuracy_retention:
        metric: perplexity
        fp32:  {wikitext2: 29.3, ptb: 41.3, lambada: 48.4}
        quant: {wikitext2: 29.5, ptb: 41.7, lambada: 48.7}
        summary: "PPL increase <0.5 on all three datasets"
      note: >-
        The clearest quantization accounting of any paper here: it states the bit width, the
        scheme, and the accuracy cost. Use zkGPT as the reference point when normalizing
        others. Its Q=16 is on the HIGH end -- a system at 8 bits would have a materially
        easier job on the lookup/range-check side.
    notes: >-
      Constraint fusion (merging rounding constraints across operators) and circuit squeeze
      (flattening the GKR circuit for parallelism). Result-as-witness paradigm for Softmax,
      LayerNorm and GeLU. Also demonstrates the exponential blowup directly: merging the
      length-32 vector of 16-bit values q_E into one lookup would need a table of
      2^(16*32) = 2^512 entries, which is why aggressive constraint merging is rejected.
    benchmarks:
      - model: GPT-2
        params: 124000000
        context_window: 32
        context_window_source: inferred  # from the (32 x 768)*(768 x 3072) matmul shape in Table 2
        proving_time_s: 21.8
        proving_time_note: "32 threads, all optimizations. Single thread, all opt: 319.6s."
        tokens_per_minute: 2.75
        tokens_per_minute_source: derived
        tokens_per_minute_note: "60 / 21.8s for one forward pass. Not an end-to-end multi-token decode number."
        proof_size_mb: 0.101
        verification_time_s: 0.35
        baseline_comparison: "185x faster than ZKML (4026s); 5.1x faster than Lu et al. VOLE-based (112.3s) with 23000x less communication."

  - id: zkpytorch
    name: zkPyTorch
    claim_kind: token  # per generated token
    title: "zkPyTorch: A Hierarchical Optimized Compiler for Zero-Knowledge Machine Learning"
    url: https://eprint.iacr.org/2025/535
    pdf: https://eprint.iacr.org/2025/535.pdf
    venue: IACR ePrint 2025/535
    date: 2025-03-22
    year: 2025
    authors: [Tiancheng Xie, Tao Lu, Zhiyong Fang, Siqi Wang, Zhenfei Zhang, Yongzheng Jia, Dawn Song, Jiaheng Zhang]
    authors_verified: true
    affiliation: Polyhedra Network / UC Berkeley / NUS
    proof_system: Expander (open-source GKR prover, github.com/PolyhedraZK/Expander)
    field: M61 (Mersenne-61) -- deliberately NOT BN254, to keep the field small
    hardware: single CPU core (Table 1 is explicitly "Single-Core Performance"); multi-core CPU/GPU is a circuit-level optimization, not the reported numbers
    open_source: true
    numbers_source: primary  # read from the PDF (eprint 2025/535), 2026-07-10
    architecture:
      summary: >-
        A COMPILER, not a new protocol. Three modules: (1) a ZKP preprocessor that lowers a
        PyTorch model to an ONNX DAG and inserts auxiliary nodes for non-arithmetic ops;
        (2) ZKP-friendly static integer quantization sized to fit M61; (3) a hierarchical
        circuit optimizer at model / operation / circuit levels.
      preprocessor: >-
        Uses a DAG (not ZENO's 1-D layer list), so it handles residuals / non-sequential
        connections. Inserts auxiliary witnesses: division proven as quotient + a proof that
        remainder < divisor; softmax exp and RMSNorm sqrt handled by piecewise LOOKUP TABLES
        rather than Taylor expansion.
      reuses: >-
        IMPORTANT for comparison: the primitive-operation level explicitly REUSES existing
        techniques -- zkCNN's FFT-based linear-time convolution and zkLLM's table-lookup
        non-linears (softmax, GELU) -- rather than inventing new per-operator PIOPs. "rather
        than introducing new optimization approaches, ZKPyTorch integrates existing techniques
        for primitive operations." So it is not a source of novel per-operator protocols.
      model_level: >-
        Batches the inference: because a ZKP only VERIFIES (not computes) the output, the
        autoregressive token-by-token dependency is decoupled and all tokens are proven in one
        batched circuit. Batched transformer matmul is O(WH + LH) gates vs O(LHW) for L
        sequential matmuls.
      circuit_level: >-
        Parallelizes across multi-core CPU/GPU (batch execution of e.g. hundreds of images;
        parallel element-wise tensor ops), broadcasting per-tensor quantization scales to each
        sub-circuit to avoid synchronization. This is the only place GPUs enter -- the reported
        Table 1 numbers are single-core.
    quantization:
      bits: 4  # integer-4 weights & activations, integer-8 intermediates (Figure 4d)
      bits_detail: "Symmetric per-tensor STATIC quantization. Figure 4d: integer-4 weights and activations, integer-8 matmul intermediates, re-quantized back to integer-4 after a table lookup. Temporary bit-width adjustments + piecewise lookup tables for the softmax exp and RMSNorm sqrt."
      scheme: >-
        Integer-based static quantization tailored to fit a SMALL field (M61) instead of the
        large BN254 the paper says fixed-point approaches force. Calibration phase estimates
        value ranges and verifies the chosen bit width avoids overflow in intermediates.
      accuracy_retention:
        cifar10_top1:   # Table 2: original -> quantized
          vgg16:     [94.13, 94.11]
          resnet50:  [93.96, 93.94]
          resnet101: [93.83, 93.80]
        llama3_cosine_similarity: 0.9932  # vs original float outputs
        summary: "CNNs lose <0.03% CIFAR-10 accuracy; Llama-3 keeps 99.32% cosine similarity."
      note: >-
        Cosine similarity is a weaker accuracy claim than perplexity -- 99.32% can still shift
        argmax on some tokens; not directly comparable to zkGPT's PPL delta. The paper concedes
        transformers "have more complex non-linear operations and thus require further
        optimization" than CNNs -- the CNN accuracy is tighter than the LLM one.
    notes: >-
      A compiler, not a protocol: lowers PyTorch models into Expander/GKR circuits via
      preprocessing, static integer quantization, and hierarchical optimization. Targets
      verifiable MLaaS and verifiable model valuation. Reuses zkCNN/zkLLM primitives, so its
      novelty is the pipeline + quantization + batching, not per-operator arguments.
    benchmarks:
      - model: VGG-16
        params: 15200000  # paper Table 1 says 15.2M (a reduced/CIFAR variant; NOT standard ~138M VGG-16)
        params_note: "Table 1 states 15.2M parameters -- corrected from the earlier 138M guess; this is a CIFAR-sized VGG-16, matching zkCNN's 15M VGG16."
        task: CIFAR-10 image classification
        proving_time_s: 2.2
        proving_time_note: "per image, SINGLE CPU CORE"
        tokens_per_minute: null
      - model: Llama-3 8B
        params: 8000000000
        context_window: null
        proving_time_s: 150.0
        proving_time_note: "per token, SINGLE CPU CORE"
        tokens_per_minute: 0.4
        tokens_per_minute_source: derived
      - model: ResNet-50
        params: null
        task: CIFAR-10 (accuracy only, no timing reported)
        proving_time_s: null
      - model: ResNet-101
        params: null
        task: CIFAR-10 (accuracy only, no timing reported)
        proving_time_s: null

  - id: zkllm
    name: zkLLM
    claim_kind: full  # whole inference; the paper does not state a token count
    title: "zkLLM: Zero Knowledge Proofs for Large Language Models"
    url: https://arxiv.org/abs/2404.16109
    pdf: https://arxiv.org/pdf/2404.16109
    venue: ACM CCS 2024
    date: 2024-04-24
    year: 2024
    authors: [Haochen Sun, Jason Li, Hongyang Zhang]
    authors_verified: true
    affiliation: University of Waterloo
    proof_system: Sum-check + tlookup (parallelized lookup argument) + zkAttn
    hardware: NVIDIA A100 (40GB), 124GB RAM; fully parallelized CUDA
    open_source: true
    repo: https://github.com/jvhs0706/zkllm-ccs2024
    numbers_source: primary
    quantization:
      bits: null  # fixed-point; exact width not confirmed
      scheme: "Fixed-point. zkAttn explicitly avoids bit-decomposition and polynomial approximation of softmax."
      accuracy_retention: null
      note: >-
        zkLLM's own framing is the cleanest statement of the tradeoff: to match float accuracy,
        fixed-point methods need LARGE bit widths, which force operations over LARGE finite
        fields. zkAttn exists precisely to dodge the accuracy degradation that bit-decomposition
        approaches suffer. Bit width is the hidden variable behind the field choice.
    notes: >-
      The GPU baseline everyone compares against. tlookup handles non-arithmetic tensor ops
      without asymptotic overhead; zkAttn is a bespoke argument for attention. CONFLICT: the
      paper states proof size <200 kB; the ZKP-VML survey's Table VI reports <10 kB for the
      same system. Trust the paper.
    benchmarks:
      - model: LLaMA-2 13B
        params: 13000000000
        context_window: null
        proving_time_s: 900.0
        proving_time_note: "under 15 minutes for the entire inference process"
        tokens_per_minute: null
