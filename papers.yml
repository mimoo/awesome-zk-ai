  - id: zen
    name: ZEN
    title: "ZEN: An Optimizing Compiler for Verifiable, Zero-Knowledge Neural Network Inferences"
    url: https://eprint.iacr.org/2021/087
    date: 2021-05-01
    year: 2021
    authors: [Boyuan Feng, Lianke Qin, Zhenfei Zhang, Yufei Ding, Shumo Chu]
    authors_verified: true  # read from the PDF, 2026-07-11. UCSB / Manta Network.
    proof_system: R1CS / Groth16 (arkworks) over BLS12-381, with proof-friendly quantization and stranded encoding
    hardware: Azure M32ls -- 32-core Intel Xeon Platinum 8280M @ 2.70GHz, 256 GiB DRAM
    numbers_source: primary  # read the PDF 2026-07-11 (was: survey)
    pdf_available: true  # references/proving-inference/zen.pdf
    objectives: [inference, testing]
    quantization:
      bits: 8
      bits_note: >-
        uint8 weights/activations packed into a ~254-bit BLS12-381 field element -- that packing
        IS stranded encoding, so 8 bits is structural, not incidental. The paper never writes
        "we use 8 bits" in a single sentence, which is presumably why this was recorded as null.
      scheme: "Full integer quantization (Jacob et al.) + sign-bit grouping + remainder-based verification + stranded encoding"
      speedup_from_quantization: [5.43, 22.19]
      speedup_note: >-
        5.43x-22.19x fewer R1CS constraints (avg 15.35x) vs ZEN-vanilla. CAVEAT: that ratio is
        Table 3's `vanilla / ZEN-infer` column, which counts the NEURAL-NETWORK constraints only
        and excludes the in-circuit model commitment sitting in the column beside it -- even
        though Commitment + ZEN-infer reproduces Table 1's total proved-circuit size on every
        row. Recomputed over the whole proved circuit, the end-to-end saving is a low
        single-digit factor, and on ShallowNet it rounds to nothing. See content/papers/zen.md.
      accuracy_retention: >-
        Table 7 gives FP vs quantized accuracy for all six models; deltas are small but non-zero,
        and non-monotone (the largest model's quantized accuracy comes out ABOVE its FP accuracy).
        Note the abstract's "no accuracy loss" is relative to ZEN-vanilla, not to floating point.
      note: "The other direct measurement of what quantization buys, independent of SpaGKR."
    notes: >-
      One of the first optimizing compilers for verifiable NNs, and the first to argue that the
      NETWORK, not the prover, is the thing to optimize -- its backend is off-the-shelf Groth16.
      Ships ZENacc (prove accuracy on a verifier-supplied test set) and ZENinfer (prove one
      inference). Its remainder-based verification is the ancestor of zkPyTorch's auxiliary
      witnesses and zkGPT's result-as-witness. Its Table 3 is also the earliest measurement of
      the in-circuit commitment bottleneck Artemis later attacks -- ZEN does not notice it.
    benchmarks:
      - model: ShallowNet / LeNet
        proving_time_s: [147, 4710]
        proving_time_note: >-
          ZENinfer, MEASURED rows only. The largest model (LeNet-Face-large) carries an asterisk in
          Tables 1 and 2 -- "indicates an estimated value" -- and is excluded. Separately, ZENacc's
          reported runtime covers model commitment + inference on ONE image (footnote 6) while the
          constraint count in the same table is priced for 100 images: the two columns of Table 2
          describe different circuits.
        verification_time_s: [0.023, 0.47]
        proof_size_mb: 0.000192  # 192 bytes, constant (Groth16). The CRS is GBs, per-circuit.

