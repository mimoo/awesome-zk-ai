# zkAI paper benchmark data
#
# Field conventions:
#   - `null` means the paper does not report the value (or we could not access it).
#     Never fill a null with a guess -- the point of this file is to be plottable.
#   - `tokens_per_minute.source: reported` = printed in the paper as a throughput figure.
#     `tokens_per_minute_source: derived`  = computed by us as 60 / seconds_per_token.
#     `tokens_per_minute_source: simulated` = the paper MODELS or extrapolates the number
#                                  instead of measuring a running system. Never plot it beside
#                                  measured rows; the charts in site/build.py skip it.
#     Derived numbers are NOT comparable to reported ones without care: a single
#     forward-pass proving time is not the same thing as sustained decode throughput.
#   - `context_window` is the sequence length actually used in the benchmark, not the
#     model's architectural maximum.
#   - `numbers_source: primary`  = read out of the paper itself.
#     `numbers_source: survey`   = taken from Tables IV/V/VI of the ZKP-VML survey
#                                  (arXiv:2502.18535). Secondhand. Where the survey and the
#                                  primary paper disagree, both are recorded and flagged.
#     THIRD-PARTY MEASUREMENTS are the awkward case, and `ezkl` is the first one. A number we
#     read in a PDF we hold is `primary` by this file's definition -- but when the PDF belongs to
#     a COMPETITOR who chose the models and the hardware, "primary" flatters it. Rule: keep the
#     tag `primary` (we did read it), and carry a mandatory `numbers_note` naming who measured it.
#     A system's benchmarks are not the same object as a system's *self-reported* benchmarks, and
#     the difference has to survive into the prose. Never write "X reports" for a number Y took.
#   - `authors_verified: false`  = author list not yet confirmed against the paper. Do not
#                                  cite these without checking.
#   - `quantization` is a CONFOUNDER, not a footnote. Proving cost depends on the bit width
#     of the quantized model, and papers do not agree on a bit width. A system reporting
#     great throughput at 8 bits is not comparable to one reporting throughput at 16 bits.
#     `quantization.bits: null` means the paper does not state it -- which is itself a
#     finding. Always plot bit width alongside throughput, or note it in the caption.
#     `accuracy_retention` records what the quantization cost in model quality; a throughput
#     number with no accuracy claim attached is not a meaningful data point.
#
#   - `claim_kind` is THE most important field in this file, and the one the literature
#     is sloppiest about. Two systems both reporting "tokens/minute" may be proving
#     completely different things. Set it per paper, or per benchmark row when a paper's
#     rows differ. Vocabulary:
#       pass  -- a single forward pass. The commonest claim, and the weakest.
#       token -- cost of proving one generated token, in isolation.
#       seq   -- amortised over a full multi-token generation, with the sequence
#                certified end to end. The strongest claim; only DeepProve makes it.
#       full  -- "the whole inference", token count NOT stated by the paper. This is
#                not a claim, it is an ambiguity, and it is recorded as one.
#     A throughput number without a claim_kind beside it is not comparable to anything.
#     Curation ported from the SCALE table of the hand-built Operator Atlas
#     (site/legacy/operator-atlas.html), which was assembled by reading each paper.
#
# Categories follow the survey's three verification objectives:
#   inference -- the model ran correctly on this input
#   testing   -- this model achieves claimed accuracy on this dataset
#   training  -- this model is the result of correctly training on this data

inference:
  - id: deepprove
    name: DeepProve
    claim_kind: seq  # full sequence certified end-to-end across all generated tokens
    title: "DeepProve: Verifiable End-to-End Large Language Model Inference"
    url: https://eprint.iacr.org/2026/1112
    pdf: https://eprint.iacr.org/2026/1112.pdf
    venue: IACR ePrint 2026/1112
    date: 2026-05-30
    year: 2026
    authors:
      - Nicolas Gailly
      - Ismael Hishon-Rezaizadeh
      - Tianyi Liu
      - Nicholas Mainardi
      - Dimitrios Papadopoulos
      - Charalampos Papamanthou
      - Christodoulos Pappas
      - Shravan Srinivasan
      - Zack Youell
      - Yupeng Zhang
    authors_verified: true
    affiliation: Lagrange Labs / HKUST / Yale / UIUC
    proof_system: Sum-check + lookup arguments
    commitment_scheme: [HyperKZG, BaseFold]
    hardware: "primary: AMD EPYC 9254, 24 cores @ 2.9 GHz, 504 GB RAM (48 threads); secondary: AMD Ryzen 9 7950X3D, 16 cores @ 4.2 GHz, 128 GB RAM (32 threads)"
    hardware_note: >-
      The headline 174/86 TPM figures are from the SECONDARY machine (faster clock, fewer
      cores). The primary machine peaks at 127 TPM (GPT-2) and 64 TPM (Gemma 3). Gemma 3 at
      seq 512 with HyperKZG OOMs on the secondary machine.
    open_source: true
    repo: https://github.com/Lagrange-Labs/deep-prove
    numbers_source: primary
    quantization:
      bits: 12  # all reported benchmarks; the system is parameterizable over 8/10/12
      bits_note: >-
        "We run inference on the GPT-2 and Gemma 3 models using DeepProve using 12-bit
        quantization level" (Sec. 5, Experiments). Accuracy is also reported at 8 and 10 bits.
        Going 8 -> 12 bits costs only 0.8% extra prover time, because the number of lookup
        tables barely changes -- so the 12-bit accuracy is bought almost for free.
      scheme: >-
        Symmetric affine quantization centered at zero (zero-point vanishes), for both weights
        and activations. Post-training static quantization with a calibration dataset;
        s = a / (2^(b-1) - 1) with a = max(|x_max|, |x_min|); activations clamped to [-a, a].
        Mixed precision: residual layers use a larger bit length. Outlier smoothing via
        orthonormal rotation X*W = (X*M)(M^T*W), with M absorbed into the previous layer's
        weights. Scale factors are NOT restricted to powers of two -- a restriction DeepProve
        levels at zkTorch specifically, NOT at zkGPT. See conflict_flag.
      rescale_mechanism: >-
        PRIMARY, Sec 4.3.2. y = floor( (Quant(2^f * eps) * x + 2^(f+delta-1)) / 2^(f+delta) )
        - 2^(q-1). The arbitrary float scale eps is fixed-point-encoded as the integer
        Quant(2^f * eps), so the MULTIPLIER is arbitrary but the DIVISOR is a power of two --
        i.e. a right shift, which the paper notes is "easier to prove". The shift is proven with
        a lookup argument over decomposable tables (Lasso/Shout-style): decompose x' into k-bit
        chunks, range-check each chunk, keep the q/k most significant. The +2^(f+delta-1) term
        is round-to-nearest (add a half before flooring).
        DeepProve's real novelty here is Case 2: it also proves requantization when the input is
        OUT of the expected range, via tables that emit -1/0/+1 to flag and correct overflowing
        elements. It states that the in-range case is "the only scenario considered by prior
        works [SLZ24 = zkLLM, QSL+25 = zkGPT]" -- i.e. those two ASSUME in-range inputs, which is
        accurate.
        CORRECTION, do not overclaim: DeepProve is the only PAPER with an explicit out-of-range
        protocol, NOT the only SYSTEM with out-of-range handling. Jolt Atlas does it too -- a
        saturating clamp (SatClamp: i64 accumulator clamped to i32) discharged by a prefix-suffix
        Shout sumcheck and FUSED INTO THE SAME REBASE SEAM as the rescale -- but only its SOURCE
        CODE says so; the paper never mentions it. The mechanisms differ: DeepProve DETECTS
        out-of-range with a proven predicate (zero-detector + sign-extractor tables blended to
        +/-2^(q-1)); Jolt SATURATES unconditionally with one clamp lookup. Proven predicate vs
        proven function. Jolt's coverage is partial where it matters: in ZK mode Add/Sub/Sum are
        proved UNCLAMPED, the ONNX Clamp op is an unproven passthrough (// TODO: Clamp), and the
        tanh/erf/sigmoid clamps are prover-side assert!s over unconstrained advice.
      conflict_flag: >-
        UNRESOLVED -- and MIND THE ATTRIBUTION. DeepProve makes TWO DIFFERENT criticisms, one per
        system. They must not be merged, and this field previously merged them.
        (a) zkTorch gets the powers-of-two charge. DeepProve Sec 6, p.14: "the use of scaling
        factors is limited to powers-of-2, which incurs greater precision loss than the flexible
        quantization approach adopted in DeepProve." But zkTorch's OWN paper never says this --
        "powers-of-two" does not occur anywhere in it. zkTorch states only that "any layer that
        multiplies two numbers must have a rescaling at some point after that layer to correct for
        the scale factor" (Sec 5) and that it uses "the similar scaling techniques proposed in
        ZKML" (Sec 6). So DeepProve's characterisation of zkTorch is inherited from ZKML or read
        off zkTorch's code, and is UNVERIFIABLE from zkTorch's text. Recorded, not resolved.
        (b) zkGPT gets a DIFFERENT charge -- not powers of two. DeepProve Sec 6, p.14: "Similar to
        zkTorch, zkGPT uses fixed-point multiplication with scaling factors for quantization ...
        using a fixed scaling factor without clamping can lead to situations where the values
        generated during inference are too large to be looked up, thus forcing a larger lookup
        table to commit." The charge is FIXED SCALE + NO CLAMPING (lookup-table blowup). The
        "similar to zkTorch" clause asserts similarity in USING fixed-point scale factors, not in
        restricting them to powers of two. zkGPT's own text is consistent with an arbitrary scale:
        Sec 2.1/4.1 computes qz = round((C1/C2) * qx * qy) with C1, C2 Q-bit integers "obtained by
        searching", approximating the float ratio Sx*Sy/Sz -- an arbitrary rational. The systems
        differ in HOW (DeepProve: integer multiplier + power-of-two shift; zkGPT: rational C1/C2
        enforced by a double inequality, no division at all).
        CORRECTED 2026-07-13: this field previously said DeepProve accuses "zkGPT/zkTorch" jointly
        of powers-of-two. It does not. That merge propagated into content/numerics/index.md and
        content/zk-inference/quantization.md.
      accuracy_retention:
        metric: [cosine_similarity, perplexity]
        dataset: Wikitext-2  # first 256 tokens of 25 documents; perplexity over first 255 logit rows
        gpt2:
          fp32_perplexity: 49.2198
          by_bits:
            8:  {cosine: 0.9967, perplexity: 60.9273}
            10: {cosine: 0.9993, perplexity: 50.0806}
            12: {cosine: 0.9966, perplexity: 49.4863}
        gemma3:
          fp32_perplexity: 515.46
          by_bits:
            8:  {cosine: 0.2035, perplexity: null}  # paper prints "> 1150"
            10: {cosine: 0.6998, perplexity: 1150.43}
            12: {cosine: 0.9587, perplexity: 454.72}
        summary: "GPT-2 at 12 bits is within 0.54% of the fp32 perplexity baseline."
      note: >-
        Gemma 3 collapses below 12 bits (cosine 0.20 at 8 bits). The paper attributes this to
        extremely large outlier activations plus extra RMSNorm layers in the transformer
        blocks, which block the orthonormal-rotation smoothing that works for GPT-2. Two
        oddities as printed: GPT-2's cosine similarity is slightly WORSE at 12 bits (0.9966)
        than at 10 (0.9993), and Gemma 3's 12-bit perplexity (454.72) is BETTER than its own
        fp32 baseline (515.46). Both reproduced verbatim from Table 4; neither is explained.
    notes: >-
      First system to prove full end-to-end LLM inference across all generated tokens of a
      prompt, rather than a single forward pass. Also reports a distributed prover reaching
      1855 tokens/min. Bit width now confirmed at 12 (see quantization.bits): the 174 TPM is
      therefore at 12 bits vs zkGPT's 2.75 TPM at 16 bits, so the ~63x gap is NOT
      bit-width-normalized -- and the two also differ in context (512 vs 32) and in what is
      proven (full sequence certification vs a single token).
    benchmarks:
      - model: GPT-2
        params: 124000000
        context_window: 512
        proving_time_s: null
        tokens_per_minute: 174
        tokens_per_minute_source: reported
        tokens_per_minute_note: >-
          BaseFold, secondary machine. HyperKZG on the same machine: 146 TPM; primary machine:
          127 TPM.
          WHAT THE METRIC ACTUALLY MEANS -- the paper states no formula, but Table 2 fixes it:
          TPM = SEQUENCE LENGTH / prove-time-in-minutes (512/2.94 = 174; 256/1.46 = 175;
          128/0.85 = 151; 64/0.57 = 112). The numerator is the WHOLE sequence -- PROMPT tokens
          plus generated tokens -- because DeepProve proves ONE forward pass over the
          concatenated sequence (Sec 3.1: "It just feeds the entire sequence of input and output
          tokens into the model at once, essentially performing a single inference step").
          THIS IS NOT A DECODE RATE. DeepProve concedes it (Sec 1.2): plaintext GPT-2 does 71.4
          TPS "for prompts with 128 input and 128 output tokens (sequence length 256), compared
          to 3 TPS for our prover" -- 175 TPM / 60 = 2.9 TPS -- and adds that "for other queries
          with the same total sequence length but much smaller output token size, plaintext
          inference achieves more than 2K TPS", i.e. DeepProve's own TPM does not move when
          almost none of those 256 tokens are actually generated. The input/output split of the
          benchmarked sequences is NEVER STATED, so this figure cannot be renormalised to a
          per-generated-token rate, and it is not commensurable with a system that proves
          decoding.
        proof_size_mb: [7, 27]
        verification_time_s: 1.2
        verification_time_note: >-
          Sec. 1.2 says "around 1.2 seconds for GPT-2"; the abstract says "1 to 3.7 seconds"
          across both models; Table 2 (secondary, BaseFold, seq 512) prints 1.65 s and Table 1
          (primary, HyperKZG, seq 512) prints 3.22 s. The paper is internally inconsistent.
        peak_ram_gb: 41.85  # BaseFold, primary machine, seq 512
      - model: Gemma 3
        params: 270000000  # "Gemma 3 (270 million parameters)" -- Sec. 1.2
        context_window: 512
        proving_time_s: null
        tokens_per_minute: 86
        tokens_per_minute_source: reported
        proof_size_mb: [16, 54]
        verification_time_s: 3.7
        verification_time_note: "Sec. 1.2 says ~4 s; abstract's range tops out at 3.7 s."
        peak_ram_gb: 96.27  # BaseFold, primary machine, seq 512; HyperKZG needs 147 GB
      - model: GPT-2 (distributed prover, 16 workers)
        params: 124000000
        context_window: 512
        proving_time_s: null
        tokens_per_minute: 1855  # Table 6: 16 workers + 1 coordinator, seq 512, BaseFold
        tokens_per_minute_source: simulated
        tokens_per_minute_note: >-
          NOT MEASURED. The distributed prover is SIMULATED, not built. Sec 5: "We simulate the
          performance of distributed DeepProve on 8 and 16 workers and a coordinator using our
          secondary machine configuration as the engineering effort to set up a distributed
          environment is non-trivial. We measure the maximum time to prove any chunk and add the
          time to transfer each individual proof back to the coordinator, assuming a LAN
          connection at 1 Gb/s." Table 6 is captioned "Simulated performance of distributed
          DeepProve", and the subsection closes: "We leave the full-fledged implementation of
          distributed DeepProve as future work." The abstract's "17 machines" = 16 workers + 1
          coordinator. 10.64x over the 174.32 single-machine TPM at the same sequence length.
          Same sequence-length-not-decode-rate caveat as the rows above. DO NOT PLOT on the
          single-machine frontier.
          CORRECTED 2026-07-13: was tagged `reported`, which is what a measured number is called.
        proof_size_mb: 53.81  # stated in prose: "53.81MB for 16 workers" (43.2 MB for 8)
        verification_time_s: null

  - id: jolt-atlas
    name: Jolt Atlas
    claim_kind: full  # NOT STATED by the paper -- see claim_kind_note
    claim_kind_note: >-
      CORRECTED 2026-07-13 (was `pass  # single forward pass`). Verified against the PDF: the
      strings "forward pass", "token", "sequence length", "autoregressive" and "prompt" do not
      occur ANYWHERE in the paper. Sec 6.2 (GPT-2) is two sentences plus a table, and nothing in
      it says what the ~38 s covers. `pass` was a claim the paper does not make, and it
      contradicted this entry's own benchmarks[GPT-2].tokens_per_minute_note, which already
      admitted "it is unknown whether this is one forward pass or a full generation". Per the
      vocabulary at the top of this file, an unstated token count is `full` -- an ambiguity,
      recorded as one. (The claim that the PROVER only ever does one pass is separately
      supported, but by the SOURCE CODE, not the paper -- see content/zk-inference/
      jolt-atlas-from-source.md.)
    title: "Jolt Atlas: Verifiable Inference via Lookup Arguments in Zero Knowledge"
    url: https://arxiv.org/abs/2602.17452
    pdf: https://arxiv.org/pdf/2602.17452
    venue: arXiv:2602.17452
    date: 2026-02-19
    year: 2026
    authors: [Wyatt Benno, Alberto Centelles, Antoine Douchet, Khalil Gibran]
    authors_verified: true
    affiliation: ICME Labs
    proof_system: Jolt-style lookup arguments over sum-check, applied to ONNX tensor ops
    commitment_scheme: [HyperKZG]
    hardware: MacBook Pro (Apple M3), 16 GB RAM
    open_source: true
    repo: https://github.com/ICME-Lab/jolt-atlas
    numbers_source: primary
    quantization:
      bits: null  # still not stated as a model-wide quantization choice
      widths_from_source: >-
        NOT IN THE PAPER -- read from the code. Accumulator is i64, saturating-clamped to i32
        (lookup_tables/sat_clamp.rs: `64 => (index as i64).clamp(i32::MIN as i64, i32::MAX as i64)`,
        plus a 16->8 variant). The often-quoted "16-bit" figure is the ACTIVATION width only; the
        accumulator width is i64 and was never stated. Fixed-point scale = 128 = 2^7 (paper Sec 4.2,
        "128-scale fixed-point representation"). Lookup tables: 2^16 (tanh/erf/sigmoid), 2^12
        (sin/cos), ~401 entries for the softmax exp via a two-table e^(a+b) = e^a * e^b split.
        Teleportation tau = 4 in the paper but tau = 2 in the code.
      bits_note: >-
        Two incidental mentions only, both in Sec. 4.2 and both about the ACTIVATION LOOKUP
        TABLE rather than the model: the tau=4 table is "sufficient for 16-bit fixed-point
        activations", and the teleportation error bound is quoted "on a 128-scale fixed-point
        representation". No calibration procedure, scale-factor derivation, zero-point
        discussion, or bit-width sensitivity study appears anywhere in the paper.
      scheme: "Neural teleportation to compress lookup table sizes"
      accuracy_retention: "\"while preserving model accuracy\" (no metric given)"
      note: >-
        Lookup-table size is the dominant cost here, and table size grows exponentially in
        the bit width of the lookup input -- so bit width matters more for this design than
        for pure sum-check systems. That it is unstated is a real gap.
        Separately, teleportation is by the authors' own admission LOSSY ("y' != y in
        general"), and its error is bounded only in raw output units (< 55 units on a
        128-scale fixed-point representation at tau=4) -- never in model-level accuracy.
        There is NO perplexity or task-accuracy number for any model in this paper.
    notes: >-
      Proves ONNX tensor operations directly instead of emulating a CPU, so there is no
      RISC-V trace. Zero-knowledge via the BlindFold technique: Sec 2 organises the proof "using
      BlindFold to hide the witness", and Sec 3 gives the construction (Pedersen-hidden sumcheck
      messages + Nova-style folding with a random satisfying instance).
      CORRECTED 2026-07-13: this note previously called Jolt Atlas "the only system here that
      actually hides the witness". That is FALSE, and this file's own entries refute it. zkLLM
      proves zero-knowledge with a simulator (Theorem 7.4) and hides the model parameters; ZEN is
      Groth16 and its schemes "leak no information of either the neural network model or the
      sensitive user input"; zkml-kang inherits "all security properties of halo2, including
      zero-knowledge"; mystique and hao-et-al both carry uses_zk: true. If anything Jolt Atlas is
      the WEAKEST of these on paper -- the PDF contains no theorem, no simulator and no security
      proof, and Table 3's stage breakdown shows no BlindFold/folding line item, so it is not even
      clear the ~38 s includes the ZK overhead. The real contrast is zkGPT, which DEFERS
      zero-knowledge ("The zero-knowledge property can be incorporated into the protocol by using
      masking polynomials", Sec 4) -- so what zkGPT measures is not a ZK protocol.
      Targets memory-constrained / on-device proving: prefix-suffix
      decomposition of lookup tables cuts peak prover memory from O(|T|) to ~O(|T|^(1/C)),
      which is how a 125M-parameter model proves inside 16 GB.
      CORRECTION (2026-07-10): a previous note here said Sec. 6.2 "contains no measurements".
      It does -- Table 3 carries the full GPT-2 stage breakdown, but LaTeX floated the table
      onto p.19, past the Sec. 7 heading, so it does not appear under the 6.2 header in a
      linear text scan. The GPT-2 row below is now populated.
    benchmarks:
      - model: nanoGPT
        params: 250000
        layers: 4
        context_window: null
        proving_time_s: 14.0
        setup_time_s: 0.492  # verifying key 0.246s + proving key 0.246s
        tokens_per_minute: 4.3
        tokens_per_minute_source: derived
        tokens_per_minute_note: "60 / 14s single proof. Paper does not frame this as decode throughput; order-of-magnitude only."
        proof_size_mb: null
        verification_time_s: 0.517
        baseline_comparison: "ezkl on the same model: 237s proof time (+ >400s key gen), 0.34s verify => ~17x speedup on proving alone."
      - model: GPT-2
        params: 125000000
        context_window: null  # NOT STATED -- see notes; this is what makes the number uncomparable
        proving_time_s: 38.0
        proving_time_note: "\"End-to-end total ~38 s\" (Table 3). Component stages are printed with a tilde, i.e. approximate."
        setup_time_s: 0.872  # "Proving/verifying key generation"
        proving_breakdown_s:
          witness_generation: 7.5
          commitment: 3.5
          sum_check_proving: 16.0
          reduction_opening_proof: 7.0
          hyperkzg_prove: 3.0
        tokens_per_minute: null
        tokens_per_minute_note: >-
          NOT derivable. The paper never states how many tokens the 38 s covers, nor the
          sequence length. Unlike DeepProve, it never discusses autoregression or KV caching,
          so it is unknown whether this is one forward pass or a full generation. Do not
          plot this against DeepProve's TPM.
        proof_size_mb: null
        verification_time_s: null  # reported for nanoGPT (0.517 s) but not for GPT-2
        notes: >-
          Table 3, p.19. Hardware is a MacBook Pro M3 / 16 GB -- far weaker than any other
          system in this table, which cuts the other way from the missing context window.

  - id: zkgpt
    name: zkGPT
    claim_kind: pass  # single forward pass, context 32
    title: "zkGPT: An Efficient Non-interactive Zero-knowledge Proof Framework for LLM Inference"
    url: https://eprint.iacr.org/2025/1184
    pdf: https://www.usenix.org/system/files/usenixsecurity25-qu-zkgpt.pdf
    venue: USENIX Security 2025
    date: 2025-08-13
    year: 2025
    authors: [Wenjie Qu, Yijun Sun, Xuanming Liu, Tao Lu, Yanpei Guo, Kai Chen, Jiaheng Zhang]
    authors_verified: true
    affiliation: National University of Singapore / HKUST
    proof_system: GKR + sum-check (non-interactive via Fiat-Shamir)
    commitment_scheme: [Hyrax]
    curve: BN254 (~100-bit security)
    hardware: Intel Xeon 6126 2.60GHz 16-core CPU, 200 GB RAM, 32 threads
    open_source: null
    numbers_source: primary
    quantization:
      bits: 16
      scheme: "Affine, x = S(q - z), inherited from zkCNN. All params and intermediates are Q-bit ints, q in [0, 65536]. Scale S and zero-point z shared per layer/tensor."
      accuracy_retention:
        metric: perplexity
        fp32:  {wikitext2: 29.3, ptb: 41.3, lambada: 48.4}
        quant: {wikitext2: 29.5, ptb: 41.7, lambada: 48.7}
        summary: "PPL increase <0.5 on all three datasets"
      note: >-
        The clearest quantization accounting of any paper here: it states the bit width, the
        scheme, and the accuracy cost. Use zkGPT as the reference point when normalizing
        others. Its Q=16 is on the HIGH end -- a system at 8 bits would have a materially
        easier job on the lookup/range-check side.
    notes: >-
      Constraint fusion (merging rounding constraints across operators) and circuit squeeze
      (flattening the GKR circuit for parallelism). Result-as-witness paradigm for Softmax,
      LayerNorm and GeLU. Also demonstrates the exponential blowup directly: merging the
      length-32 vector of 16-bit values q_E into one lookup would need a table of
      2^(16*32) = 2^512 entries, which is why aggressive constraint merging is rejected.
    benchmarks:
      - model: GPT-2
        params: 124000000
        context_window: 32
        context_window_source: inferred  # from the (32 x 768)*(768 x 3072) matmul shape in Table 2
        proving_time_s: 21.8
        proving_time_note: "32 threads, all optimizations. Single thread, all opt: 319.6s."
        tokens_per_minute: 2.75
        tokens_per_minute_source: derived
        tokens_per_minute_note: "60 / 21.8s for one forward pass. Not an end-to-end multi-token decode number."
        proof_size_mb: 0.101
        verification_time_s: 0.35
        baseline_comparison: "185x faster than ZKML (4026s); 5.1x faster than Lu et al. VOLE-based (112.3s) with 23000x less communication."

  - id: zkpytorch
    name: zkPyTorch
    claim_kind: token  # per generated token
    title: "zkPyTorch: A Hierarchical Optimized Compiler for Zero-Knowledge Machine Learning"
    url: https://eprint.iacr.org/2025/535
    pdf: https://eprint.iacr.org/2025/535.pdf
    venue: IACR ePrint 2025/535
    date: 2025-03-22
    year: 2025
    authors: [Tiancheng Xie, Tao Lu, Zhiyong Fang, Siqi Wang, Zhenfei Zhang, Yongzheng Jia, Dawn Song, Jiaheng Zhang]
    authors_verified: true
    affiliation: Polyhedra Network / UC Berkeley / NUS
    proof_system: Expander (open-source GKR prover, github.com/PolyhedraZK/Expander)
    field: M61 (Mersenne-61) -- deliberately NOT BN254, to keep the field small
    hardware: single CPU core (Table 1 is explicitly "Single-Core Performance"); multi-core CPU/GPU is a circuit-level optimization, not the reported numbers
    open_source: true
    numbers_source: primary  # read from the PDF (eprint 2025/535), 2026-07-10
    architecture:
      summary: >-
        A COMPILER, not a new protocol. Three modules: (1) a ZKP preprocessor that lowers a
        PyTorch model to an ONNX DAG and inserts auxiliary nodes for non-arithmetic ops;
        (2) ZKP-friendly static integer quantization sized to fit M61; (3) a hierarchical
        circuit optimizer at model / operation / circuit levels.
      preprocessor: >-
        Uses a DAG (not ZENO's 1-D layer list), so it handles residuals / non-sequential
        connections. Inserts auxiliary witnesses: division proven as quotient + a proof that
        remainder < divisor; softmax exp and RMSNorm sqrt handled by piecewise LOOKUP TABLES
        rather than Taylor expansion.
      reuses: >-
        IMPORTANT for comparison: the primitive-operation level explicitly REUSES existing
        techniques -- zkCNN's FFT-based linear-time convolution and zkLLM's table-lookup
        non-linears (softmax, GELU) -- rather than inventing new per-operator PIOPs. "rather
        than introducing new optimization approaches, ZKPyTorch integrates existing techniques
        for primitive operations." So it is not a source of novel per-operator protocols.
      model_level: >-
        Batches the inference: because a ZKP only VERIFIES (not computes) the output, the
        autoregressive token-by-token dependency is decoupled and all tokens are proven in one
        batched circuit. Batched transformer matmul is O(WH + LH) gates vs O(LHW) for L
        sequential matmuls.
      circuit_level: >-
        Parallelizes across multi-core CPU/GPU (batch execution of e.g. hundreds of images;
        parallel element-wise tensor ops), broadcasting per-tensor quantization scales to each
        sub-circuit to avoid synchronization. This is the only place GPUs enter -- the reported
        Table 1 numbers are single-core.
    quantization:
      bits: 4  # integer-4 weights & activations, integer-8 intermediates (Figure 4d)
      bits_detail: "Symmetric per-tensor STATIC quantization. Figure 4d: integer-4 weights and activations, integer-8 matmul intermediates, re-quantized back to integer-4 after a table lookup. Temporary bit-width adjustments + piecewise lookup tables for the softmax exp and RMSNorm sqrt."
      scheme: >-
        Integer-based static quantization tailored to fit a SMALL field (M61) instead of the
        large BN254 the paper says fixed-point approaches force. Calibration phase estimates
        value ranges and verifies the chosen bit width avoids overflow in intermediates.
      accuracy_retention:
        cifar10_top1:   # Table 2: original -> quantized
          vgg16:     [94.13, 94.11]
          resnet50:  [93.96, 93.94]
          resnet101: [93.83, 93.80]
        llama3_cosine_similarity: 0.9932  # vs original float outputs
        summary: "CNNs lose <0.03% CIFAR-10 accuracy; Llama-3 keeps 99.32% cosine similarity."
      note: >-
        Cosine similarity is a weaker accuracy claim than perplexity -- 99.32% can still shift
        argmax on some tokens; not directly comparable to zkGPT's PPL delta. The paper concedes
        transformers "have more complex non-linear operations and thus require further
        optimization" than CNNs -- the CNN accuracy is tighter than the LLM one.
    notes: >-
      A compiler, not a protocol: lowers PyTorch models into Expander/GKR circuits via
      preprocessing, static integer quantization, and hierarchical optimization. Targets
      verifiable MLaaS and verifiable model valuation. Reuses zkCNN/zkLLM primitives, so its
      novelty is the pipeline + quantization + batching, not per-operator arguments.
    benchmarks:
      - model: VGG-16
        params: 15200000  # paper Table 1 says 15.2M (a reduced/CIFAR variant; NOT standard ~138M VGG-16)
        params_note: "Table 1 states 15.2M parameters -- corrected from the earlier 138M guess; this is a CIFAR-sized VGG-16, matching zkCNN's 15M VGG16."
        task: CIFAR-10 image classification
        proving_time_s: 2.2
        proving_time_note: "per image, SINGLE CPU CORE"
        tokens_per_minute: null
      - model: Llama-3 8B
        params: 8000000000
        context_window: null
        proving_time_s: 150.0
        proving_time_note: "per token, SINGLE CPU CORE"
        tokens_per_minute: 0.4
        tokens_per_minute_source: derived
      - model: ResNet-50
        params: null
        task: CIFAR-10 (accuracy only, no timing reported)
        proving_time_s: null
      - model: ResNet-101
        params: null
        task: CIFAR-10 (accuracy only, no timing reported)
        proving_time_s: null

  - id: zkllm
    name: zkLLM
    claim_kind: full  # whole inference; the paper does not state a token count
    title: "zkLLM: Zero Knowledge Proofs for Large Language Models"
    url: https://arxiv.org/abs/2404.16109
    pdf: https://arxiv.org/pdf/2404.16109
    venue: ACM CCS 2024
    date: 2024-04-24
    year: 2024
    authors: [Haochen Sun, Jason Li, Hongyang Zhang]
    authors_verified: true
    affiliation: University of Waterloo
    proof_system: Sum-check + tlookup (parallelized lookup argument) + zkAttn
    hardware: NVIDIA A100 (40GB), 124GB RAM; fully parallelized CUDA
    open_source: true
    repo: https://github.com/jvhs0706/zkllm-ccs2024
    numbers_source: primary
    quantization:
      bits: null  # genuinely not stated by the paper -- see bits_note
      bits_note: >-
        The paper never gives a bit width. What it gives (Sec 8) is a SCALING FACTOR: "we
        consistently set the scaling factor for both data embedding and model parameters at
        2^16", with K=5 tlookups of size 2^16 each for the zkAttn softmax input, whose cumulative
        scaling factor reaches 2^64. A scale factor is NOT a bit width; do not convert one into
        the other to fill this null.
      scheme: "Fixed-point. zkAttn explicitly avoids bit-decomposition and polynomial approximation of softmax."
      accuracy_retention: >-
        REPORTED -- and more completely than any other LLM prover in this file. Table 1 prints C4
        perplexity, floating-point vs quantized, for all eight models: OPT-125M 26.56 -> 26.65,
        OPT-350M 22.59 -> 22.66, OPT-1.3B 16.07 -> 16.12, OPT-2.7B 14.34 -> 14.37, OPT-6.7B
        12.71 -> 12.73, OPT-13B 12.06 -> 12.07, LLaMa-2-7B 7.036 -> 7.049, LLaMa-2-13B
        6.520 -> 6.528. The delta shrinks monotonically with model size. Sec 8 states it in
        prose: "the increase of perplexity is less than 0.1, and the impact diminishes to less
        than 0.01 as the sizes of the models scale to 13B." Separately, Sec 8 bounds the zkAttn
        approximation itself: "an approximate total L1 error of 10^-2 on the output, a level
        comparable to the rounding error induced by half-precision floating points used in
        state-of-the-art LLMs."
        CORRECTED 2026-07-13: this field said `null` -- which in this file means "the paper does
        not report this" -- and that was false. content/papers/zkllm.md had already flagged it.
      note: >-
        zkLLM's own framing is the cleanest statement of the tradeoff: to match float accuracy,
        fixed-point methods need LARGE bit widths, which force operations over LARGE finite
        fields. zkAttn exists precisely to dodge the accuracy degradation that bit-decomposition
        approaches suffer. Bit width is the hidden variable behind the field choice.
    notes: >-
      The GPU baseline everyone compares against. tlookup handles non-arithmetic tensor ops
      without asymptotic overhead; zkAttn is a bespoke argument for attention. CONFLICT: the
      paper states proof size <200 kB; the ZKP-VML survey's Table VI reports <10 kB for the
      same system. Trust the paper.
    benchmarks:
      - model: LLaMA-2 13B
        params: 13000000000
        context_window: null
        proving_time_s: 900.0
        proving_time_note: "under 15 minutes for the entire inference process"
        tokens_per_minute: null
        proof_size_mb: 0.2
        proof_size_note: "paper: <200 kB. Survey Table VI claims <10 kB -- discrepancy unresolved."
        verification_time_s: 3.0
        verification_time_note: "survey: <3s"

  - id: zkml-kang
    name: ZKML
    claim_kind: pass  # single forward pass
    title: "ZKML: An Optimizing System for ML Inference in Zero-Knowledge Proofs"
    url: https://dl.acm.org/doi/10.1145/3627703.3650088
    pdf: https://ddkang.github.io/papers/2024/zkml-eurosys.pdf
    venue: EuroSys 2024
    date: 2024-04-01
    year: 2024
    authors: [Bing-Jyue Chen, Suppakit Waiwitlikhit, Ion Stoica, Daniel Kang]
    authors_verified: false
    proof_system: halo2 (Plonkish)
    hardware: "AWS r6i.32xlarge for GPT-2 (128 vCPU, 1 TB RAM)"
    open_source: true
    # PROMOTED survey -> primary, 2026-07-11: we obtained the PDF and read Tables 5, 6 and 7.
    numbers_source: primary
    notes: >-
      Optimizing compiler from TensorFlow Lite graphs to halo2 circuits, and the standard
      non-interactive baseline that everyone else measures their speedup against.

      THE CONFOUNDER THAT INVALIDATES MOST OF THOSE SPEEDUPS: ZKML's "GPT-2" is a DISTILLED
      GPT-2 of 81.3M parameters (Table 5; "a distilled GPT-2 optimized for inference", Sec. 9),
      not the 124M GPT-2 that DeepProve, zkGPT and Jolt Atlas run. The paper is explicit -- its
      Limitations section says the largest model it can prove under 1 TB of RAM *is* the
      distilled GPT-2 -- but downstream comparisons drop the word "distilled" and the ~35%
      parameter gap with it. We ourselves recorded it as 124M until 2026-07-11. Any "Nx faster
      than ZKML on GPT-2" claim in this corpus is a comparison against a smaller network.

      THREE-WAY NUMBER CONFLICT on the same run, now resolved. ZKML's own Table 6 (KZG):
      3651.67 s prove / 18.70 s verify / 28128 B. The ZKP-VML survey's 3652 s / 18.7 s / 28 KB
      is just this row, rounded -- the survey is CORRECT here. ZKTorch Sec. 6.3 re-measures ZKML
      at 3601 s on its own hardware, and zkGPT Table 3 re-measures it at 4026 s / 12.1 s / 7.8 KB
      on 32 threads. The last of those is closer to ZKML's IPA backend (3949.60 s / 11.98 s /
      16512 B) than to its KZG one, so zkGPT may be benchmarking a different backend than it
      compares against. Do not mix these rows.

      A FOURTH RE-MEASUREMENT, on CNNs rather than GPT-2: Bionetta (Table 4) runs ddkang/zkml on
      five vision models on a 16-thread Xeon and reports 185 s (LeNet5), 1100 s (a 2M-param MNIST
      MLP), 1580 s (VGG11-mini), 1660 s (ResNet18) and 1135 s (MobileNetV2), with proving keys of
      2.4-19.3 GB and peak RAM of 6.9-52.3 GB. Verification is genuinely fast (12-23 ms) and the
      proofs are genuinely small (5-6.7 kB) -- so on the VERIFIER side ZKML behaves the way the
      Halo2 story says it should, which is exactly what ezkl, on the same hardware and the same
      models, does NOT. The two most-deployed PLONKish zkML toolchains do not have the same
      verifier profile, and the literature treats them as one row.
    quantization:
      bits: null  # the paper does not state a bit width for the GPT-2 run
      bits_note: "Not stated. ZKML discusses scale factors but does not print a bit width."
    benchmarks:
      - model: GPT-2 (distilled)
        params: 81300000  # Table 5. NOT 124M -- this is DistilGPT-2, not GPT-2.
        params_note: >-
          We carried 124000000 here until 2026-07-11. It was wrong, and it placed this system at
          the wrong x-coordinate on every throughput-vs-parameters chart in the corpus.
        claim_kind: pass
        backend: KZG
        proving_time_s: 3651.67  # Table 6
        tokens_per_minute: 0.016
        tokens_per_minute_source: derived  # 60 / 3651.67, a single-pass proxy -- not a decode rate
        proof_size_mb: 0.028128
        verification_time_s: 18.70
      - model: GPT-2 (distilled)
        params: 81300000
        claim_kind: pass
        backend: IPA
        proving_time_s: 3949.60  # Table 7
        proof_size_mb: 0.016512
        verification_time_s: 11.98
        proving_time_note: >-
          The IPA backend: slower to prove, but smaller proofs and faster verification. zkGPT's
          re-measurement of "ZKML" (4026 s / 12.1 s) tracks this row, not the KZG one.

  - id: bionetta
    name: Bionetta
    claim_kind: pass  # one forward pass of a CNN. There are no tokens here -- see threat_model.
    title: "Bionetta: Efficient Client-Side Zero-Knowledge Machine Learning Proving"
    url: https://arxiv.org/abs/2510.06784
    pdf: https://arxiv.org/pdf/2510.06784v2
    venue: "arXiv:2510.06784v2 (technical report, not peer-reviewed)"
    date: 2025-12-08  # v2. v1 is 2025-10-08.
    year: 2025
    authors:
      - Dmytro Zakharov
      - Oleksandr Kurbatov
      - Artem Sdobnov
      - Lev Soukhanov
      - Yevhenii Sekhin
      - Vitalii Volovyk
      - Mykhailo Velykodnyi
      - Mark Cherepovskyi
      - Kyrylo Baibula
      - Lasha Antadze
      - Pavlo Kravchenko
      - Volodymyr Dubinin
      - Yaroslav Panasenko
    authors_verified: true  # read off the Authors section, p. 28. The report has no byline on p.1.
    affiliation: Rarimo / Distributed Lab
    proof_system: "UltraGroth -- Groth16 with in-circuit lookup rounds -- over R1CS (Circom), BN254"
    commitment_scheme: [Groth16 pairing-based, per-circuit trusted setup]
    hardware: >-
      Intel Xeon E5-2665 (16 threads @ 3.10 GHz), 350 GB RAM. Mobile benchmarks on an
      iPhone 14 Pro (A16 Bionic), via a custom rapidsnark fork and Ingonyama's imp1.
    threat_model: >-
      INVERTED relative to every other system in this category, and this is the single most
      important fact about the paper. The rest of the verifiability column is MLaaS: the SERVER
      proves, the WEIGHTS are the secret, and the client is the verifier. Bionetta is the
      opposite -- the CLIENT proves, on their own phone, over a PRIVATE INPUT, against a model
      whose weights and architecture are PUBLIC. Its motivating applications are biometric
      proximity ("this face matches the enrolled template") and liveness, where the thing worth
      hiding is the user's face, not the network. The library's own README states the limit in a
      warning box -- "the library is not intended for private model weights + public input
      proving. The library is designed only for public model weights + private/public input
      proving!" -- which is a restriction the paper's abstract does not mention. Every claim it
      makes should be read inside that box. It is not competing with DeepProve or zkGPT; it is
      answering a different question, and it is the only system in this corpus that does.
    open_source: partial
    repo: https://github.com/Anonymous1725/Bionetta
    open_source_note: >-
      The TensorFlow SDK is public (constraint calculator, codegen, layer definitions, prover
      driver). The Circom templates that emit the actual constraints are NOT: `codegen/generator.py`
      clones a repo named `bionetta-circom`, and no such repository is public under rarimo/ or
      anywhere else we can find. So the range checks -- which, per the numerics section, ARE the
      proof -- are the one part you cannot read. There is also a public JS SDK
      (rarimo/bionetta-js-sdk) and a developer-docs repo, i.e. this is deployed, not a preprint
      artifact: it backs Rarimo's biometric identity app.
    numbers_source: primary  # we read the PDF (Tables 4, 5, 6) and cloned the SDK.
    objectives: [inference]
    quantization:
      bits: null
      bits_note: >-
        THE PAPER HAS NO "BIT WIDTH" IN THE SENSE THE REST OF THIS TABLE MEANS IT, and that is a
        finding rather than an omission. Bionetta does not quantize activations down to a narrow
        integer. It keeps every value as a full BN254 field element carrying `rho` fractional bits,
        and the cost of a non-linearity is set by the size of the FIELD (254 bits), not by the
        width of the value. Raising rho therefore does not change the constraint count at all.
        The shipped SDK's default is rho = 15 (`Groth16.DEFAULT_PRECISION`), which is the LEAST
        accurate of the four settings the paper measures.
      scheme: >-
        Fixed point with a precision parameter rho: Q(x) = F_p([2^rho x]), D(x) = 2^-rho Z(x).
        Sign is decided by the (b-1)-th bit -- the threshold for "negative" is 2^(b-1), NOT the
        conventional (p-1)/2, a deviation the paper flags as a convenience choice. Rescaling is
        the "precision cut": a right shift by `l * rho`, needed because a degree-n product
        accumulates precision n*rho and would otherwise exceed the field. Error bound proved in
        Appendix C: |D(C_f(x,y)) - f(x,y)| <= 2^-rho * beta + 2^-2rho, with beta = 2 max(|x|,|y|)
        "assumed to be relatively small" -- an ML assumption doing cryptographic work, as usual.
      accuracy_retention: >-
        Relative error ||y - y_rho|| / ||y||, worst case across all five models, over 10^5 random
        inputs: 5.2e-3 at rho=15, 3.7e-5 at rho=30, 2.0e-6 at rho=45, 9.4e-7 at rho=60. Note what
        this says: four orders of magnitude of accuracy bought for ZERO extra constraints, because
        the b-bit decomposition is over the field element either way. See notes.
    notes: >-
      Three ideas, and the second and third both matter well beyond this paper.

      (1) CIRCUIT-EMBEDDED WEIGHTS. Because the model is public, the weights are compiled into the
      R1CS as CONSTANTS rather than passed in as signals. R1CS charges nothing for
      multiplication-by-constant, so every linear layer -- every matmul, every convolution, and
      BatchNorm folded into it -- costs LITERALLY ZERO CONSTRAINTS. Proving cost is then a
      function of one thing only: the number of non-linearity calls. This is the same conclusion
      the sum-check line reaches (matmuls are nearly free; the money is at the non-linear seams)
      arrived at from a completely different direction, and it is worth having both. Measured
      effect (Table 5): ResNet18 drops from 37.85M constraints to 1.16M (~32x) and from 270 s to
      14 s. The catch is that it is only available because the weights are public -- this
      optimization is structurally unavailable to every MLaaS system in this table.

      (2) ULTRAGROTH. Lookup arguments inside Groth16, which is supposed to be impossible: LogUp
      (Haboeck) needs a verifier challenge sampled AFTER the witness is committed, and Groth16 has
      no rounds. UltraGroth adds them -- the witness is split into d+1 "rounds", each round's
      commitment is hashed to derive the next round's challenge (Fiat-Shamir with an in-circuit
      random oracle), and the extra commitments ride along in the proof. Cost: one extra pairing
      (4 instead of 3), one extra hash, and d+1 extra G1 elements. Proven complete, sound and
      zero-knowledge in GGM+ROM (Appendix A). This is the interesting cryptographic contribution
      and it is buried in a vendor tech report. The payoff: a ReLU's range check drops from b
      constraints to b/w, with w the limb size; prover complexity O(2^(w+1) + bL/w + 4L) for L
      range checks, i.e. O(N / log N).

      (3) THE RESCALE SEAM IS FREE, WHEN IT RIDES ON A ReLU. This is the fact the numerics page
      should carry. ReLU already bit-decomposes its input to determine the sign -- that IS the
      range check. Once you have the bits, dropping the low `l*rho` of them is a right shift that
      costs NOTHING: "Computing ReLU(x) >> rho*l for some fixed l costs b+1 constraints" -- the
      same b+1 as a bare ReLU. The rescale after a matmul, which every other system in this corpus
      pays for at every seam, is here fused into a decomposition it was already buying. It is the
      strongest form of the "round less often / fuse the seam" result that zkGPT (constraint
      fusion), DeepProve (delayed requantization) and Jolt Atlas (i64 rebase) each found
      independently -- and Bionetta found it a fourth time, citing none of them for it.

      AND THE COROLLARY IT DRAWS, WHICH CONTRADICTS SAFETYNETS. Bionetta explicitly rejects
      polynomial activations (pi-nets), and its reason is the seam: a degree-d polynomial costs
      only d constraints per value, but it RAISES the precision of the result by rho*d bits, which
      forces a precision cut, which costs ~b constraints. "The benefit of d constraints per value
      is lost in the overhead of precision cuts." Read that against SafetyNets, whose whole cost
      advantage comes from quadratic activations having no rescale seam at all: Bionetta is saying
      the seam does not disappear under a polynomial activation, it just moves to where the
      precision blew up. Nobody has reconciled these two claims and they are both in this corpus.

      WHAT IT CANNOT DO. No softmax, no attention, no LayerNorm, no transformer, no general ONNX.
      The supported non-linearities are exactly ReLU, LeakyReLU (alpha a power of two only),
      ReLU6, HardSigmoid and HardSwish -- the ReLU family, chosen because they are the ones whose
      cost the sign-bit decomposition already pays for. `ActivationOps.from_keras` in the SDK maps
      Softmax to `NOT_SUPPORTED`. Do NOT put this system on the tokens-per-minute axis; it is not
      an LLM prover and does not claim to be.
    conflict_flag: >-
      Bionetta re-measures ezkl, ddkang/zkml and zkCNN on its own hardware (Table 4) and those are
      the only primary-source numbers we have for ezkl anywhere in this corpus. They are recorded
      on those systems' entries and flagged there as third-party measurements by a competitor.
      Treat with the usual care: Bionetta chose the models, chose the hardware, and is the party
      being flattered.
    audit_flag: >-
      UNVERIFIED, AND THE ONE THING WE MOST WANT SOMEBODY TO CHECK. Section 4.3's own reasoning
      for the ReLU cost is: decompose x into b bits, boolean-constrain each x_i via x_i(1-x_i)=0
      (b constraints), then one more constraint for the output -- b+1. The shipped SDK prices
      `ActivationOps.RELU` at exactly 255 under Groth16 ("costs below are specified manually based
      on the current Circom implementation"), and 255 = 254 + 1 with b = 254 for BN254. That count
      leaves NO ROOM for a canonicity check. But 2^254 > p for BN254, so a b-bit boolean
      decomposition does not uniquely determine a field element: for any x < 2^254 - p (~0.32p,
      which is every activation any real network produces), the bit string of x + p ALSO satisfies
      every booleanity constraint and ALSO recomposes to x mod p -- and its bit 253 is SET, so the
      sign test reads a positive activation as negative and ReLU returns 0. This is the textbook
      Circom `Num2Bits` vs `Num2Bits_strict` distinction; the strict version costs roughly double,
      which is consistent with 255 being the unstrict one. It is made worse, not better, by the
      paper's deliberate choice to put the negativity threshold at 2^(b-1) rather than (p-1)/2.
      If this is what the circuit does, a malicious prover can zero out any ReLU it likes and
      still produce a verifying proof -- which, in the biometric application, is a forged
      authentication. WE CANNOT CONFIRM IT: `bionetta-circom` is not public. This is where we
      would look, not what we have found.
    benchmarks:
      - model: MNIST MLP
        params: 2000000  # "two million parameters and 6K activations", Sec 6.1
        proving_time_s: 3.05
        proof_size_mb: 0.00088
        verification_time_s: 0.010
        constraints: 250000
        peak_ram_gb: 0.27
        proving_key_gb: 0.20
        verification_key_mb: 0.004
      - model: LeNet5
        params: null  # not stated in the paper; the standard LeNet5 is ~60k but we do not guess
        proving_time_s: 3.75
        proof_size_mb: 0.00088
        verification_time_s: 0.010
        constraints: 260000
        peak_ram_gb: 0.28
        proving_key_gb: 0.22
        verification_key_mb: 0.004
      - model: VGG11-mini
        params: null
        params_note: >-
          "We reduced VGG11 for benchmarking since zkml and EZKL frameworks ran out of RAM memory
          for original architecture." The reduced architecture is not specified. This row is not
          comparable to anyone else's VGG11.
        proving_time_s: 7.70
        proof_size_mb: 0.00088
        verification_time_s: 0.020
        constraints: 730000
        peak_ram_gb: 0.48
        proving_key_gb: 0.63
        verification_key_mb: 0.004
      - model: ResNet18
        params: null  # not stated. Standard ResNet18 is ~11.7M; the paper does not say so.
        proving_time_s: 14.10
        proof_size_mb: 0.00088
        verification_time_s: 0.015
        constraints: 1160000
        peak_ram_gb: 0.75
        proving_key_gb: 1.00
        verification_key_mb: 0.004
      - model: MobileNetV2
        params: null
        proving_time_s: 24.50
        proof_size_mb: 0.00088
        verification_time_s: 0.018
        constraints: 2780000
        peak_ram_gb: 1.80
        proving_key_gb: 2.41
        verification_key_mb: 0.004
      # --- Table 6: the same five circuits, proved ON A PHONE. No other system in this corpus
      # --- has this row at all, and it is the whole point of the paper.
      - model: MNIST MLP (iPhone 14 Pro)
        params: 2000000
        proving_time_s: 2.80
        proof_size_mb: 0.00088
        peak_ram_gb: 0.230
      - model: LeNet5 (iPhone 14 Pro)
        params: null
        proving_time_s: 3.55
        proof_size_mb: 0.00088
        peak_ram_gb: 0.145
      - model: VGG11-mini (iPhone 14 Pro)
        params: null
        proving_time_s: 7.65
        proof_size_mb: 0.00088
        peak_ram_gb: 0.465
      - model: ResNet18 (iPhone 14 Pro)
        params: null
        proving_time_s: 13.60
        proof_size_mb: 0.00088
        peak_ram_gb: 0.700
        proving_time_note: >-
          Plain Groth16 cannot do this row at all -- both rapidsnark and imp1 run out of RAM on
          ResNet18 and MobileNetV2 on the phone. UltraGroth's constraint reduction is what makes
          the difference between "proves in 14 seconds" and "does not fit".
      - model: MobileNetV2 (iPhone 14 Pro)
        params: null
        proving_time_s: 22.96
        proof_size_mb: 0.00088
        peak_ram_gb: 1.700
    # Table 5. The two optimizations, separated. "Client" = circuit-embedded weights (weights are
    # R1CS constants); "Server" = weights passed in as signals, i.e. what every MLaaS system must
    # do. "1QAP" = UltraGroth; "QAP" = plain Groth16. Server rows are the paper's own estimates
    # from constraint counts, not measurements -- it says so.
    ablation:
      - mode: UltraGroth + embedded weights (the shipped configuration)
        constraints_m: {mnist: 0.25, lenet5: 0.26, vgg11: 0.73, resnet18: 1.16, mobilenetv2: 2.78}
        proving_time_s: {mnist: 3.05, lenet5: 3.75, vgg11: 7.70, resnet18: 14.10, mobilenetv2: 24.50}
      - mode: UltraGroth, weights as signals (estimated)
        constraints_m: {mnist: 2.19, lenet5: 0.65, vgg11: 4.17, resnet18: 37.85, mobilenetv2: 7.97}
        proving_time_s: {mnist: 15, lenet5: 6, vgg11: 30, resnet18: 270, mobilenetv2: 60}
      - mode: Groth16 + embedded weights
        constraints_m: {mnist: 1.57, lenet5: 1.69, vgg11: 7.67, resnet18: 12.0, mobilenetv2: 31.8}
        proving_time_s: {mnist: 8.30, lenet5: 8.70, vgg11: 56.4, resnet18: 87.5, mobilenetv2: 230.0}
      - mode: Groth16, weights as signals (estimated)
        constraints_m: {mnist: 3.51, lenet5: 2.08, vgg11: 11.1, resnet18: 49.0, mobilenetv2: 37.8}
        proving_time_s: {mnist: 25, lenet5: 15, vgg11: 80, resnet18: 350, mobilenetv2: 270}

  - id: safetynets
    name: SafetyNets
    title: "SafetyNets: Verifiable Execution of Deep Neural Networks on an Untrusted Cloud"
    url: https://arxiv.org/abs/1706.10268
    pdf: https://arxiv.org/pdf/1706.10268
    venue: NeurIPS 2017
    date: 2017-06-30
    year: 2017
    authors: [Zahra Ghodsi, Tianyu Gu, Siddharth Garg]
    authors_verified: true
    proof_system: >-
      Interactive proof. Thaler's (CRYPTO 2013) time-optimal IP for regular arithmetic circuits
      -- itself a refinement of GKR -- for the matmul layers, composed with a NEW specialized
      sum-check for quadratic activation layers. Genuinely interactive: no Fiat-Shamir, no
      polynomial commitment, no ZK.
    uses_zk: false
    hardware: Intel Core i7-4600U @ 2.10 GHz (single machine, both prover and verifier)
    numbers_source: primary
    objectives: [inference]
    quantization:
      bits: null  # not a bit-width scheme; see `scheme`
      scheme: >-
        Scale-and-round to integers in F_p, with separate scaling factors alpha (weights) and
        beta (inputs); alpha = beta = 16 chosen on validation for MNIST-Back-Rand. Bit width is
        set indirectly by the choice of Mersenne prime: p = 2^61 - 1 (MNIST tasks), p = 2^127 - 1
        (TIMIT). Quadratic activations SQUARE the magnitude at every layer, so the field must be
        large enough to hold the growth -- this is what rules out alpha, beta > 64 at p = 2^61 - 1.
      accuracy_retention: >-
        Test error 0.63% (MNIST), 4.67% (MNIST-Back-Rand), 25.7% (TIMIT). The paper's abstract
        quotes 99.4% / 75.22% accuracy for MNIST / TIMIT; the 75.22% does not quite match the
        25.7% error in Section 4.2. Networks with quadratic activations were competitive with
        their ReLU baselines on all three tasks.
    notes: >-
      THE ROOT OF THE GKR-FOR-ML LINEAGE. The oldest system in the survey timeline (2017.6), and
      the direct ancestor of zkcnn -> zkllm / spagkr / zkgpt / zkpytorch / deepprove. Everything
      those systems do is a descendant of the move made here: represent the network as an
      arithmetic circuit and prove it with sum-check rather than a general-purpose SNARK.

      Two properties make it structurally different from all its descendants, and both matter:
      (1) It is INTERACTIVE -- the verifier sends fresh random challenges, so there is no
      Fiat-Shamir transform. See `fiat-shamir-gkr-attack`: SafetyNets is the one system in this
      family the attack cannot touch, because the attack is against FS-compiled GKR and there is
      no FS here. It is deliberately NOT in that paper's `affects:` list.
      (2) It is NOT zero-knowledge. It buys integrity only -- weights and inputs are not hidden.
      The paper is explicit that ZK and privacy are future work.

      The cost of the approach is the model class, and it is severe: activations must be
      polynomials over F_p, so the network is restricted to QUADRATIC activations (x -> x^2)
      everywhere except the final output layer. No ReLU, no sigmoid, no softmax (except at the
      output, which the prover simply sends in the clear and the verifier checks against a
      multilinear extension evaluated at a random point). Sum pooling, not max pooling. No maxout.
      Essentially the whole subsequent literature -- lookup arguments, tlookup/zkAttn,
      result-as-witness -- is the story of removing this restriction.

      Prover overhead is the number worth remembering: only ~5% over unverified baseline
      execution. That is wildly better than any modern zkML system, and it is the price of
      dropping ZK, dropping commitments, and restricting to quadratic activations. It is a useful
      lower bound on what proving *could* cost, not a comparable data point.
    benchmarks:
      - model: FcNN-3-Quad (TIMIT)
        # 1845-dim input -> 3 hidden FC layers x 2000 neurons (quadratic) -> 183 outputs (softmax)
        params: null  # ~12M by our arithmetic, but not stated in the paper -- left null on purpose
        layers: 4
        batch_size: 2048
        proving_time_s: null  # only plotted (Figure 3, log scale), never stated in text
        prover_overhead_pct: 5.0        # additional prover time over baseline unverified execution
        verifier_speedup_vs_local_exec: [8, 82]  # range over batch sizes 256..2048; grows with batch
        proof_size_mb: 0.008            # "< 8 KBytes" at batch 2048; < 2% of input/output bandwidth
        soundness_error: 2^-130
      - model: CNN-2-Quad (MNIST / MNIST-Back-Rand)
        # 2 conv layers, 5x5 filters, stride 1, mapcount 16 then 32; quadratic activations;
        # 2x2 SUM pooling stride 2; FC output layer with softmax.
        params: null
        layers: 3
        batch_size: 4096
        client_time_s: 10.0  # "less than 10 seconds"; vs ~600 s for CryptoNets (HE) at same batch.
        note: >-
          The CryptoNets comparison is the paper's own, and it is apples-to-oranges by its own
          admission: CryptoNets buys PRIVACY via homomorphic encryption, SafetyNets buys
          INTEGRITY. The authors draw the conclusion that integrity is the more practically
          achievable goal -- a claim that reads very differently in 2026, and is worth revisiting
          against the privacy-inference cluster (bolt, ciphergpt, iron, nimbus).

  - id: zkcnn
    name: zkCNN
    title: "zkCNN: Zero Knowledge Proofs for Convolutional Neural Network Predictions and Accuracy"
    url: https://eprint.iacr.org/2021/673
    venue: ACM CCS 2021
    date: 2021-05-25
    year: 2021
    authors: [Tianyi Liu, Xiang Xie, Yupeng Zhang]
    authors_verified: true
    proof_system: GKR + sum-check (with a linear-time sumcheck for FFT/convolution)
    hardware: AMD EPYC 7R32, 128 GB RAM
    numbers_source: primary
    objectives: [inference, testing]
    quantization:
      bits: null
      scheme: "Affine: a = L(q - Z), with scale L and zero-point Z. The scheme zkGPT later inherits."
      accuracy_retention: null
    notes: >-
      Foundational. Linear-prover-time sumcheck for 2D convolution (asymptotically faster
      than computing the convolution directly) and an O(N) sumcheck for FFT. 1264x faster
      than prior schemes. Also proves accuracy over a public dataset (20 images).

      STILL THE FASTEST PROVER ON SMALL MODELS, FIVE YEARS ON. Bionetta (Table 4) re-measures
      zkCNN on a 16-thread Xeon and finds it proving LeNet5 in 1.05 s and VGG11-mini in 4.10 s --
      beating Bionetta's own 3.75 s and 7.70 s. Bionetta only overtakes it above roughly 2M
      parameters (its Fig. 6), and cannot beat it below that. What zkCNN pays for that prover is
      the thing GKR always pays: proofs of 23-43 kB against Bionetta's 0.88 kB, and verification
      of 0.3-1.45 s against 10-20 ms. It also cannot run ResNet18 or MobileNetV2 at all in
      Bionetta's harness (unsupported operators). The trade has not changed since 2021; only the
      models have.
    benchmarks:
      - model: VGG16
        params: 15000000
        layers: 16
        proving_time_s: 88.3
        proof_size_mb: 0.341
        verification_time_s: 0.0593

  - id: spagkr
    name: SpaGKR
    title: "Sparsity-aware protocol for zk-friendly ML models: Shedding lights on practical ZKML"
    url: https://eprint.iacr.org/2024/1018
    venue: IACR ePrint 2024
    date: 2024-06-01
    year: 2024
    authors: [A. Li, Q. Liang, M. Dong]
    authors_verified: false
    proof_system: GKR / sum-check, modular; composes with Lasso
    numbers_source: survey
    quantization:
      bits: 1.58  # ternary {-1, 0, 1} = log2(3) bits
      scheme: "Ternary networks: parameters restricted to {-1, 0, 1}, which ELIMINATES multiplications entirely"
      accuracy_retention: null
      speedup_from_quantization: 5.0
      note: >-
        THE key data point for the quantization question. Ternary quantization alone buys a
        further ~5x proof-time reduction, on top of the 45x that sparsity-aware linear layers
        (SpaGKR-LS) buy over sparsity-oblivious ZKML. This is the strongest published evidence
        that lower bit width => faster proving, and it quantifies the effect.
    notes: >-
      Two orthogonal wins, both worth separating when plotting: (1) SpaGKR-LS makes proof time
      scale with the number of NON-ZERO parameters, giving 45x on sparse linear layers;
      (2) ternary networks give a further ~5x. Relevant to MoE and pruned models.
    benchmarks:
      - model: Sparse linear layers
        speedup_vs_dense_zkml: 45.0
      - model: Ternary network
        speedup_from_ternary: 5.0

  - id: mystique
    name: Mystique
    title: "Mystique: Efficient Conversions for Zero-Knowledge Proofs with Applications to Machine Learning"
    url: https://eprint.iacr.org/2021/730
    venue: USENIX Security 2021
    date: 2021-08-01
    year: 2021
    authors:
      - Chenkai Weng
      - Kang Yang
      - Xiang Xie
      - Jonathan Katz
      - Xiao Wang
    authors_verified: true
    proof_system: Interactive ZK / sVOLE-based (designated verifier), with efficient conversions
      between arithmetic/Boolean, committed/authenticated, and fixed-point/IEEE-754 float
    hardware: two AWS m5.2xlarge instances, 32 GB RAM each; ResNet-101 peaks at 12 GB. Network
      bandwidth is throttled (50 / 200 Mbps) and is a first-order cost, not a detail.
    numbers_source: primary
    uses_zk: true
    notes: >-
      Designated-verifier and INTERACTIVE: it produces a conversation, not a proof object. The
      transcript is bound to one verifier's MAC key, so it cannot be published, posted on-chain,
      cached, or checked by a second party -- and its size is interactive COMMUNICATION, not a
      proof size (hence communication_mb, not proof_size_mb, below). Non-linear layers are
      evaluated as real IEEE-754 float circuits rather than quantized, which is why accuracy holds
      across 101 layers and why no calibration/requantization story appears at all. Batch
      Normalization dominates the prover (~70% of ResNet-101 inference time) because of the
      float/fixed conversions. CNNs on CIFAR-10 only -- no transformer, no attention.
    benchmarks:
      - model: ResNet-101 (public model, private input)
        params: 42500000
        proving_time_s: 262.0
        communication_mb: 990.0
        verification_time_s: null
        model_note: >-
          Table 3, 200 Mbps. This is the PUBLIC-model configuration -- the weights are revealed to
          the verifier. It is the cheapest of the paper's three settings and does not answer the
          motivating threat (a provider hiding its weights while proving it ran the committed
          model). The repo previously recorded only this row, as `proof_size_mb`, from a survey.
      - model: ResNet-101 (private committed model, private input)
        params: 42500000
        proving_time_s: 535.0
        communication_mb: 1980.0
        verification_time_s: null
        model_note: >-
          Table 3, 200 Mbps. The setting the paper actually sells. The abstract's headline
          "28 minutes" is the end-to-end application of Table 4, which additionally includes
          converting the public model commitment into privately authenticated values -- a cost
          that is per-VERIFIER, not one-off, because authenticated values are bound to the
          verifier's key.
      - model: ResNet-50 (private committed model, private input)
        params: 23500000
        proving_time_s: 333.0
        communication_mb: 1270.0
        verification_time_s: null
        accuracy: "0.02% accuracy decrease vs the plaintext model on the full CIFAR-10 test set
          (same delta reported for ResNet-101)"

