        peak_ram_gb: 5.45
        proving_key_gb: 2.10
        verification_key_mb: 1.10
      - model: VGG11-mini
        params: null
        proving_time_s: 2650
        proof_size_mb: 0.478
        verification_time_s: 9.70
        peak_ram_gb: 41.85
        proving_key_gb: 17.00
        verification_key_mb: 8.10
      - model: ResNet18
        params: null
        proving_time_s: 6840
        proof_size_mb: 0.180
        verification_time_s: 25.30
        peak_ram_gb: 103.50
        proving_key_gb: 34.00
        verification_key_mb: 17.00
      - model: MobileNetV2
        params: null
        proving_time_s: 14320
        proof_size_mb: 0.175
        verification_time_s: 40.60
        peak_ram_gb: 203.95
        proving_key_gb: 76.00
        verification_key_mb: 37.00
        proving_time_note: >-
          Four hours to prove one MobileNetV2 forward pass, in 204 GB of RAM, for a proof that
          takes 40 seconds to verify. Bionetta proves the same network in 24.5 seconds on the same
