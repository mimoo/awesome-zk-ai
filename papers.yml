  - id: nimbus
    name: Nimbus
    title: "Nimbus: Secure and Efficient Two-Party Inference for Transformers"
    url: https://eprint.iacr.org/2025/2250
    arxiv: https://arxiv.org/abs/2411.15707
    pdf: https://arxiv.org/pdf/2411.15707  # arxiv mirror; eprint blocked
    venue: NeurIPS 2024
    date: 2024-11
    year: 2024
    authors: [Zhengyi Li, Kang Yang, Jin Tan, Wen-jie Lu, Haoqi Wu, Xiao Wang, Yu Yu, Derun Zhao, Yancheng Zheng, Minyi Guo, Jingwen Leng]
    authors_verified: true
    affiliation: SJTU / Shanghai Qizhi / State Key Lab of Cryptology / Ant Group / Northwestern
    uses_zk: false
    verifiable: false
    security_model: semi-honest 2PC
    approach: >-
      Linear layer: a new 2PC matmul paradigm + encoding from an OUTER-PRODUCT insight
      (2.9-12.5x over SOTA). Non-linear: low-degree polynomial approximation for GELU/Softmax
      that exploits the observed INPUT DISTRIBUTION (2.9-4.0x over SOTA polynomial approx).
    numbers_source: primary  # read the arxiv PDF
    pdf_available: true
    benchmarks:
      - models: [BERT-base]
        vs_sota_2pc: "2.7-4.7x (abstract, corroborated by Sec 5.2) / 2.7-5.9x (introduction) end-to-end vs BumbleBee"
        vs_sota_note: >-
          CONFLICTING SOURCES INSIDE THE PAPER, both recorded per this file's contract.
          Abstract: "Nimbus improves the end-to-end performance of BERTbase inference by
          2.7x ~ 4.7x across different network settings." Introduction, contributions bullet 3:
          "Compared with the SOTA work BumbleBee [26] ... we improve the end-to-end performance of
          secure two-party inference by 2.7x ~ 5.9x." The evaluation (Sec 5.2) prints both
          baselines separately and shows where the intro's 5.9x came from: "the overall runtime is
          4.8x ~ 5.9x faster than Iron and 2.7x ~ 4.7x faster than BumbleBee." The introduction
          appears to splice BumbleBee's LOWER bound with Iron's UPPER bound. Sec 5.2 corroborates
          the ABSTRACT; the introduction's figure is recorded, not silently dropped.
        vs_iron: "4.8-5.9x faster (Sec 5.2)"
        scope_note: >-
          Sec 5.2's "end-to-end" is the latency of ONE TRANSFORMER BLOCK, not the full 12-layer
          BERT-base: "we present the end-to-end latency of one Transformer block under LAN and WAN
          network settings in Figure 6." Appendix F.1, across hidden sizes 768/1024/2048 and
          sequence lengths 1/32/128, gives a wider range again: "our method outperforms
          [BumbleBee] by a magnitude of 1.9x to 7.6x on sequence lengths 32 and 128. The speedup
          is minor on sequence 1 with 1.2x to 2.1x."
        communication: "60% reduction vs BumbleBee (introduction); NO absolute GB total is stated anywhere in the PDF"
        accuracy: "0.08% average accuracy loss vs non-2PC inference"
        network: "LAN (3 Gbps, 1 ms ping) and WAN (400 Mbps, 10 ms ping), simulated with Linux tc; two nodes, 64 vCPUs, 128 GB"
    notes: >-
      The freshest 2PC result. Its input-distribution-aware polynomial approximation is the
      MPC-world mirror of the quantization/table-sizing tricks zkML uses for the same
