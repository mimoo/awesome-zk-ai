  - id: bootstrapping-fhe
    name: "Bootstrapping is All You Need"
    title: "Bootstrapping is All You Need: Secure Transformer Inference via Improved CKKS Functional Bootstrapping"
    url: https://eprint.iacr.org/2026/1255
    pdf: https://eprint.iacr.org/2026/1255.pdf
    venue: IACR ePrint 2026/1255
    date: 2026-06-14
    year: 2026
    authors: [Pan Xiao, Rending Ouyang, Heng Zhang, Jiawen Zhang, Jian Liu]
    authors_verified: true  # read from the PDF (user-provided), 2026-07-11
    affiliation: State Key Laboratory of Blockchain and Data Security, Zhejiang University
    uses_zk: false
    verifiable: false
    security_model: FHE (CKKS), single-party, NON-interactive -- NOT 2PC. They call the setting NISTI.
    terminology: "NISTI = Non-Interactive Secure Transformer Inference (client encrypts input under FHE, server evaluates on ciphertext, returns ciphertext)."
    approach: >-
      DIFFERENT sub-approach from the 2PC ones above: pure FHE over CKKS. Bootstrapping is the
      main NISTI bottleneck (66.8% of runtime in the SOTA). Their Functional Bootstrapping (FBS)
      FUSES as many operations as possible into each bootstrap step, cutting the prescribed
      multiplicative depth (which is what drives ciphertext size / cost). Three pieces:
      (1) a TRIGONOMETRIC minimax approximation for FBS (a trigonometric Remez algorithm; better
      worst-case L-infinity precision on non-linear layers than the Fourier/L2 SOTA);
      (2) FUNCTIONAL S2C -- fuse linear layers (y=xW and y=xW+b) into the slot-to-coefficient
      transform inside FBS, so linear layers cost nothing separately;
      (3) batch-S2C + interleaved packing / lazy key switching / hoisting.
    numbers_source: primary  # read the PDF
    pdf_available: true  # user provided /Users/david/Downloads/2026-1255.pdf
    benchmarks:
      # THIS SYSTEM EMITS NO PROOF (uses_zk: false / verifiable: false). The 349.5 s is an
      # ENCRYPTED-INFERENCE LATENCY. It lived under `proving_time_s` until 2026-07-13, which made
      # site/build.py render the headline "349.5 s to prove" for a system that proves nothing --
      # exactly the conflation the private-inference section exists to prevent.
      # Do not resurrect proving_time_s here.
      - models: [BERT-base (BERT-DyT -- LayerNorm replaced by Dynamic Tanh, distilled from BERT)]
        inference_latency_s: 349.5
        inference_latency_note: >-
          End-to-end FHE inference latency. Sec 6: "Our framework takes 349.5s to complete the
          entire inference, which is 1.9x faster than MOAI." Table 4 ("Runtime breakdown amortized
          over 256 inputs") sums to exactly 349.5 s across homomorphic evaluation steps only --
          there is no commit, no prove and no verify anywhere in the paper. Seq len 128; 12
          layers, 12 heads, hidden 768, FFN 3072; "each query is processed with a batch size of
          256 sequences". Intel Xeon Platinum 8358 @ 2.60 GHz, 64 cores; OpenFHE v1.5.1 + OpenMP.
        communication_mb: 16.1
        communication_note: "per query, amortized over 256 inputs (Sec 6 / Fig 5)"
        accuracy: "-1.73 / -0.57 / -0.98 points vs plaintext BERT on RTE / SST-2 / MRPC"
        accuracy_note: >-
          MEASURED, Table 3, and previously unrecorded. Plaintext BERT and BERT-DyT are identical
          (71.12 / 93.00 / 86.76); encrypted BERT-DyT gives 69.39 / 92.43 / 85.78. The paper's
          gloss: "our framework introduces virtually no additional accuracy loss." Both error
          sources (the DyT substitution AND the CKKS approximation) are folded into that column.
        network: "n/a -- non-interactive FHE. The 16.1 MB is a one-shot ciphertext upload/download, not an interactive transcript."
        vs_sota: "1.9x faster (349.5s vs 662.3s), 3x less communication (16.1MB vs 48.3MB) -- vs MOAI"
    notes: >-
      It is FHE (non-interactive, single-party on ciphertext), not 2PC like the others. Its tiny
      communication -- 16.1 MB against BOLT's 25.74 GB (with word elimination) or 59.61 GB
      (without), BOLT Table 3 -- is roughly a 1,600x gap, and that is the whole point of FHE: it
      trades interaction and communication for heavy homomorphic compute.
      CAUTION on the shorthand "the 2PC systems' hundreds of GB", which this note used to assert:
      in this cell that is true of exactly ONE figure, Iron's 280.99 GB -- and that figure is
      BOLT's RE-IMPLEMENTATION of Iron under a WAN, not Iron's own self-report (Iron's paper
      prints no numeric end-to-end communication total at all; its Fig 4 is a log-scale bar chart
      with ratio annotations only). BOLT itself is at tens of GB, and CipherGPT reports ~15 GB per
      generated token. The true comparison is stronger than the false one, so there is no reason
      to keep the false one.
      Note the transformer it benchmarks uses DyT (Dynamic Tanh) in place of LayerNorm. Same goal
      as the 2PC systems (private inference), different cryptographic route.

# Adjacent secure-inference work seen while surveying (NOT read; do not cite numbers):
secure_inference_3pc:
  # THREE-PARTY, HONEST-MAJORITY private inference. This category did not exist until 2026-07-13,
  # and its absence was the single largest hole in this SoK. Every private-inference paper we held
  # was 2PC and BERT-class, so we concluded the privacy column tops out at BERT. It does not. It
  # tops out at BERT *in dishonest-majority 2PC*. Add a third non-colluding party and the same
  # literature reaches LLaMA-7B (puma) and gets MALICIOUS security on BERT and GPT-2 (mosformer).
  # The extra party is a real and substantial trust assumption -- it is not a free lunch, and the
  # 2PC ceiling is a true statement about 2PC. But "privacy caps at BERT" was a statement about
  # our reading list, not about the field.

  - id: puma
    name: PUMA
    title: "PUMA: Secure Inference of LLaMA-7B in Five Minutes"
    url: https://arxiv.org/abs/2307.12533
    pdf: https://arxiv.org/pdf/2307.12533
    venue: "arXiv:2307.12533v3 (preprint, Sep 2023); later published in Security and Safety, 2025"
    venue_note: >-
      The PDF we hold is the arXiv preprint and its header says only "A Preprint". A web search
      confidently told us this was NDSS 2024. It is not -- Crossref resolves the published version
      to the journal *Security and Safety* (2025). Recorded because the wrong venue was one search
      away and we nearly took it.
    date: 2023-09-26
    year: 2023
    authors:
      - Ye Dong
      - Wen-jie Lu
      - Yancheng Zheng
      - Haoqi Wu
      - Derun Zhao
      - Jin Tan
      - Zhicong Huang
      - Cheng Hong
      - Tao Wei
      - Wenguang Chen
    authors_verified: true
    affiliation: Ant Group
    approach: 3PC secret sharing (2-out-of-3 replicated), semi-honest, honest majority
    threat_model: >-
      3PC, SEMI-HONEST, HONEST MAJORITY -- at most one of three non-colluding computing parties is
      corrupted. Model owner and client secret-share the weights and the input to P0/P1/P2; the
      result is reconstructed to the client. This is a materially stronger trust assumption than
      the 2PC systems in this SoK (iron, ciphergpt, bolt, nimbus, cheetah), which tolerate a
      dishonest majority, and PUMA picks it explicitly because it "has the highest concrete
      efficiency". Do not put a 3PC latency next to a 2PC latency without saying so.
      Out of scope by the paper's own statement: "PUMA cannot defend against attacks based on
      inference results".
    open_source: true
    repo: https://github.com/secretflow/spu
    numbers_source: primary
    hardware: >-
      BERT/GPT-2 rows: 3x Alibaba Cloud ecs.g7.8xlarge, 32 vCPU, 128 GB RAM, ~5 Gbps, ~1 ms RTT.
      LLaMA-7B row: 3x ecs.r7.32xlarge, 128 threads, 1 TB RAM, 20 GB bandwidth, 0.1 ms RTT.
      THE HEADLINE ROW IS ON DIFFERENT, FAR BEEFIER HARDWARE THAN EVERYTHING ELSE IN THE PAPER.
    notes: >-
      THE PAPER THAT SHOWS THE BERT CEILING IS A 2PC CEILING. Iron needs 280.99 GB and 216 minutes
      for one BERT-base inference; PUMA does LLaMA-7B, sixty times the parameters, in 200 seconds
      and 1.79 GB. Nothing about privacy forbids scale. What forbids scale is dishonest-majority
      two-party computation.

      Technique: piecewise low-degree polynomial approximations fitted with numpy.polyfit for GeLU
      (4 pieces, split at -4/-1.95/3) and SiLU; a clipped Taylor "negExp" for softmax that shifts
      every exponent input negative and replaces n divisions with one reciprocal and n multiplies;
      a secure Embedding protocol that builds the one-hot vector inside MPC (so unmodified
      HuggingFace checkpoints load); and a LayerNorm that computes sigma^-1/2 once and broadcasts.
      Accuracy is genuinely preserved on the models where it is measured -- GLUE accuracy within
      0.011 of plaintext, GPT-2 perplexity within 0.02.

      WHAT TO DISTRUST, and there is a lot.
      (1) THE TITLE'S NUMBER IS IN NO TABLE. Abstract says "around 5 minutes to generate 1 token".
      Table 6 says 200.473 s (3.3 min) for 8 input tokens and 1 output token, and 364.527 s (6.1
      min) for 2 output tokens. Three framings of one measurement, and the one on the cover is
      not the one in the table.
      (2) The LLaMA-7B prompts are FOUR AND EIGHT TOKENS. No realistic prompt length is ever run
      on LLaMA-7B, and softmax cost is superlinear in sequence length.
      (3) No numeric accuracy or perplexity is reported for LLaMA-7B at all. The evidence is one
      prompt in an appendix, "with fixed randomness".
      (4) No KV cache is described anywhere. Going from 1 to 2 output tokens costs 1.82x, which is
      close to a full re-run of the forward pass.
      (5) Efficiency gains SHRINK with sequence length: at GPT-2 with 256 inputs, PUMA's
      communication is 0.936x MPCFormer's, i.e. WORSE than the baseline it beats everywhere else.
      (6) No WAN numbers. The LLaMA row assumes a 20 GB/s datacenter link.
    quantization:
      bits: null
      scheme: "Fixed-point over the ring Z_{2^64}, 18-bit fractional part."
      accuracy_retention: >-
        GLUE (Bert-Base/RoBERTa-Base/Bert-Large): accuracy difference vs plaintext does not exceed
        0.011 on any dataset. Perplexity (Wikitext-103, GPT2-Base/Medium/Large): within 0.02.
        LLaMA-7B: NOT REPORTED. That is the row the title is about.
    benchmarks:
      - model: LLaMA-7B
        params: 7000000000
        context_window: 8   # eight input tokens. Yes, really.
        proving_time_s: 200.473   # (8 input, 1 output). NOT the "five minutes" of the title.
        communication_mb: 1794    # 1.794 GB
        accuracy: null
        note: >-
          The headline row. (4 in, 1 out) = 122.004 s / 0.907 GB; (8 in, 1 out) = 200.473 s /
          1.794 GB; (8 in, 2 out) = 364.527 s / 3.857 GB. Measured on 3x 128-thread / 1 TB RAM
          machines over a 20 GB/s link.
      - model: Bert-Base
        params: 110000000
        context_window: 128
        proving_time_s: 33.913
        communication_mb: 10773   # 10.773 GB
      - model: Bert-Large
        params: 340000000
        context_window: 128
        proving_time_s: 73.720
        communication_mb: 27246
      - model: GPT2-Base
        params: 117000000
        context_window: 32
        proving_time_s: 15.506
        communication_mb: 3774
      - model: GPT2-Large
        params: 774000000
        context_window: 32
        proving_time_s: 54.154
        communication_mb: 11952

  - id: mosformer
    name: Mosformer
    title: "Mosformer: Maliciously Secure Three-Party Inference Framework for Large Transformers"
    url: https://eprint.iacr.org/2025/1510
    pdf: https://eprint.iacr.org/2025/1510.pdf
    venue: ACM CCS 2025
    date: 2025-10-13
    year: 2025
    authors:
      - Ke Cheng
      - Yuheng Xia
      - Anxiao Song
      - Jiaxuan Fu
      - Wenjie Qu
      - Yulong Shen
      - Jiaheng Zhang
    authors_verified: true
    affiliation: Xidian University / National University of Singapore
    approach: 3PC replicated secret sharing, MALICIOUS security with abort, honest majority
    threat_model: >-
      3PC, MALICIOUS, SECURITY WITH ABORT, HONEST MAJORITY -- at most one of three non-colluding
      servers is corrupted, and a corrupted server may deviate arbitrarily. NOT robust / not
      guaranteed output delivery: a detected cheat aborts the protocol. NOT dishonest-majority
      2PC. Every one of those qualifiers is load-bearing before you cite this against anyone.
      Malicious security is obtained in three layers: verifiable DPF key checks in the offline
      phase, redundant three-party execution of the online comparison (so RSS consistency detects
      tampering), and MAC-based consistency checks deferred to the end of each encoder/decoder
      block (16 rounds, ~5% of runtime).
    open_source: true
    repo: https://github.com/XidianNSS/Mosformer
    numbers_source: primary
    hardware: >-
      3 servers, AMD Ryzen 9 9950X (16 cores), 128 GB RAM. 16 threads for matmul, single-threaded
      elsewhere. Table 8 network: LAN 1 Gbps / 0.5 ms, WAN 400 Mbps / 4 ms. Table 9 network is
      DIFFERENT (5 Gbps / 0.4 ms LAN, 400 Mbps / 40 ms WAN, borrowed from Ditto). Do not merge the
      two tables.
    notes: >-
      THE PAPER THAT CLOSES THE "NOBODY HAS MALICIOUS SECURITY AT TRANSFORMER SCALE" GAP -- and it
      closes it by adding a party, exactly as this SoK predicted it would have to. Read the
      threat_model field before quoting anything here.

      Its real claim to the record is narrower and more interesting than "first maliciously secure
      transformer inference": NO PRIOR MALICIOUS PROTOCOL COULD RUN BERT OR GPT-2 AT ALL. Privformer
      is limited to the vanilla transformer of Vaswani et al.; Falcon is a CNN framework. So the
      malicious-vs-malicious comparison (5.3x over Privformer, 3.4x over a Falcon the authors
      extended themselves) is run on a 45M-parameter vanilla transformer, NOT on BERT or GPT-2. The
      BERT/GPT-2 rows have no malicious baseline to beat because there was none.

      THE RESULT THAT SHOULD EMBARRASS THE SEMI-HONEST LINE. Mosformer's MALICIOUS online phase
      beats the SEMI-HONEST 2PC state of the art on its own benchmark: BERT-base LAN online 59.47 s
      / 4.60 GB against BOLT's 533.4 s / 59.61 GB, BumbleBee's 184.86 s / 6.40 GB and SHAFT's
      171.31 s / 10.46 GB. Stronger security, faster online phase.

      THE CATCH, and it is the whole catch: THAT IS AN ONLINE NUMBER AND THE OFFLINE PHASE IS
      ENORMOUS. Malicious BERT-base costs a further 547.66 s and 67.35 GB of preprocessing on LAN
      (1339.14 s / WAN), because the VDPF correlated randomness has to come from somewhere. BOLT,
      BumbleBee, PUMA and Ditto report ZERO offline. SHAFT reports 39.36 s / 4.92 GB. Comparing
      Mosformer's online column against a system with no offline column is not a comparison. The
      honest total for malicious BERT-base on LAN is ~607 s and ~72 GB.

      The cost of malicious security over its own semi-honest variant is the clean number, and the
      paper lets you compute it: BERT-base LAN online 59.47 s vs 20.09 s (~3.0x) and 4.60 GB vs
      1.15 GB (4.0x). Three to four times, not the order of magnitude folklore assumes.

      Accuracy: with modulus conversion on, up to 2.4% degradation (WikiText-103 perplexity 37.5 ->
      38.4; QNLI -1.7 points). Without it, under 0.4%. The paper's own conclusion is worth the
      price of admission: "running modern large language models under cryptographic settings
      remains impractical at present."
    quantization:
      bits: null
      scheme: >-
        Operation-aware modulus conversion -- different rings for different operators. Linear layers
        in Z_{2^64} (16-bit precision), softmax and reciprocal-sqrt in Z_{2^32} (12-bit), ReLU/GELU
        in Z_{2^16} (6-bit). Claimed 30% runtime and 25% communication saving over a single ring.
        This is the MPC analogue of mixed-precision quantization, and it costs accuracy: see below.
      accuracy_retention: >-
        WITH modulus conversion: QNLI -1.7%, RTE -1.6%, STS-B -1.0%, WikiText-103 perplexity +2.4%.
        WITHOUT it: QNLI -0.4%, RTE -0.6%, STS-B -0.9%, perplexity +0.3%. The efficiency win is
        bought with accuracy, and the paper reports both, which is more than most.
    benchmarks:
      - model: BERT-base (malicious)
        params: 110000000
        context_window: 128
        proving_time_s: 59.47     # LAN, ONLINE ONLY. Offline is a further 547.66 s.
        communication_mb: 4600    # online only; offline is a further 67.35 GB
        note: >-
          Malicious, 3PC, LAN, ONLINE phase. The offline phase adds 547.66 s and 67.35 GB. Its
          semi-honest variant is 20.09 s / 1.15 GB online. There is no prior maliciously-secure
          system that can run this model at all.
      - model: GPT2-base (malicious)
        params: 124000000
        context_window: 64
        proving_time_s: 39.26
        communication_mb: 3070
        note: "Online only; offline adds 273.83 s / 33.67 GB. Semi-honest variant: 9.70 s / 0.45 GB."
      - model: Vanilla Transformer (malicious)
        params: 45000000
        context_window: null
        proving_time_s: null
        communication_mb: null
        note: >-
          The ONLY model on which a malicious-vs-malicious comparison exists (5.3x over Privformer,
          4.3x less communication). Privformer cannot run BERT; Falcon is a CNN framework. Absolute
          latency for this row is reported only in Figure 2, not in a table -- so it is null here.

