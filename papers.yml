  - id: hao-et-al
    name: Hao et al.
    title: "Scalable Zero-Knowledge Proofs for Non-Linear Functions in Machine Learning"
    url: https://www.usenix.org/conference/usenixsecurity24/presentation/hao
    venue: USENIX Security 2024
    date: 2024-08-01
    year: 2024
    authors:
      - Meng Hao
      - Hanxiao Chen
      - Hongwei Li
      - Chenkai Weng
      - Yuan Zhang
      - Haomiao Yang
      - Tianwei Zhang
    authors_verified: true
    proof_system: Interactive ZK / sVOLE-based (designated verifier), same substrate as Mystique.
      Non-linear functions by digit decomposition + table lookup, instantiated from ZK proofs of
      read-only memory (ZK-ROM) rather than a polynomial lookup argument
    hardware: AWS c5.9xlarge, Intel Xeon 8000 @ 3.6 GHz, single thread. Bandwidth simulated at
      200 / 500 / 1000 Mbps and is a first-order cost.
    numbers_source: primary
    uses_zk: true
    open_source: true
    repo: https://github.com/CryptMatrix/ZKMath
    notes: >-
      CORRECTION: the previous note here read "Not open-sourced (per zkGPT)". That was secondhand
      from zkGPT's related-work section and is WRONG -- §7.1 of the paper states "The source code is
      available at https://github.com/CryptMatrix/ZKMath".
      Proves individual non-linear OPERATORS, never an end-to-end model: there is no CNN or
      transformer benchmark, and consequently NO accuracy number for any model at any precision.
      This matters because the paper replaces Mystique's IEEE-754 float circuits (chosen precisely to
      protect accuracy through depth) with fixed-point digit tables at scale 12, running division with
      zero refinement iterations -- and never measures the cost of that swap.
      Inherits Mystique's proof object: interactive, designated-verifier, so the reported megabytes are
      COMMUNICATION, not a proof size.
    benchmarks:
      - model: ReLU (operator)
        proving_time_s: 2.107
        communication_mb: 30.137
        model_note: >-
          Table 5, 200 Mbps, AMORTISED OVER A BATCH of 10^5 evaluations at fixed-point scale 12 --
          this is not the cost of one ReLU. The batch is load-bearing: the paper's O(1)-multiplication
          claim holds only for N >> T, where T is the lookup-table size (2^12 by default).
      - model: Softmax (operator, dim 10)
        proving_time_s: 87.131
        communication_mb: 816.330
        model_note: >-
          Table 5, 200 Mbps, batch of 10^5 evaluations, vector dimension 10 -- a CIFAR-class shape,
          not an LLM's sequence-length softmax. Softmax is where the improvement over Mystique is
          largest, because it is what most punished Mystique's arithmetic-to-Boolean round trip
          (exponentiation AND division inside a Boolean circuit).
      - model: GELU (operator)
        proving_time_s: 37.628
        communication_mb: 338.182
        model_note: >-
          Table 5, 200 Mbps, batch of 10^5. The one operator explicitly aimed at LLMs. GELU reduces to
          Tanh, Tanh to Sigmoid, Sigmoid to digit-decomposed exponential and division.
      - model: Normalization (operator, dim 16)
        proving_time_s: 192.826
        communication_mb: null
        model_note: >-
          Table 5, 200 Mbps, batch of 10^5, dimension 16. Built on the reciprocal-square-root building
          block -- exactly the "standard approach" DeepProve rejects on accuracy grounds. Whether the
          rejection is right is untested here, because no accuracy is reported.

  - id: zktorch
    name: ZKTorch
    claim_kind: pass  # EVERY row: a single forward pass over a 1- or 2-token input (Table 3)
    title: "ZKTorch: Compiling ML Inference to Zero-Knowledge Proofs via Parallel Proof Accumulation"
    url: https://arxiv.org/abs/2507.07031
    pdf: https://arxiv.org/pdf/2507.07031
    venue: arXiv:2507.07031
    date: 2025-07-09
    year: 2025
    authors: [Bing-Jyue Chen, Lilia Tang, Daniel Kang]
    authors_verified: true
    proof_system: Basic blocks + parallel extension of the Mira accumulation scheme
    hardware: "Intel Xeon Platinum 8358 @ 2.6 GHz; BN254"
    # PROMOTED survey -> primary, 2026-07-11: we obtained the PDF and read Tables 3, 4 and
    # Sec. 6.3 directly. Every row below used to be secondhand -- from DeepProve's comparison
    # table and from a partisan blog, which DISAGREED with each other. Both are now superseded.
    numbers_source: primary
    quantization:
      bits: 10
      bits_note: >-
        "For all models we use 10 bits of quantization except for GPT-j, where we used 12 bits"
        (Sec. 6.1). ZKTorch is one of the few systems in this corpus that states a bit width at all.
      accuracy_retention:
        metric: [ROUGE, F1, WER, mAP]
        note: >-
          Table 5 compares ROUGE (GPT-J), F1 (BERT), WER (RNN-T) and mAP (RetinaNet) under
          ZKTorch's scaling against MLPerf reference values. This is a PLAINTEXT quantization
          study, NOT a proven claim -- a one-token BERT input cannot produce a SQuAD F1 score.
          The paper labels it honestly, but it must not be read as ZKTorch proving a benchmark
          result: that would be the testing objective, and no proof of it exists here.
    notes: >-
      Successor to ZKML from the same group, and NOT an improved ZKML -- it discards the single
      halo2-circuit architecture for a DAG of ~20 "basic blocks", each proved by a specialized
      protocol and then accumulated (a parallel extension of Mira). First ZK system to prove
      every model in MLPerf Inference: Edge v4.1. That breadth is the real contribution, and the
      headline speedup buries it.

      CRITICAL, and invisible from the abstract: every LLM benchmark here is a SINGLE FORWARD
      PASS over a 1- or 2-token input (Table 3 lists the input dimensions explicitly). DeepProve's
      comparison table converts the GPT-J result into 0.09 tokens/minute, which is arithmetically
      right -- 2 tokens / (1397.52 s / 60) = 0.086 -- but is a category error: those two tokens are
      one prompt processed in a single pass, not two decode steps. The paper never discusses
      autoregression or KV caching anywhere. We previously carried that derived throughput figure
      and tagged the row `claim_kind: token`; both were wrong and are now removed.

      Structurally, the decode step is precisely what does NOT fold: ArgMax and TopK are built from
      OneToOne, Ordered and CopyConstraint -- three of the seven basic blocks with no accumulation
      support. The compiler is written to avoid the non-foldable set, and it can, because none of
      its benchmarks ever sample a token.

      The proof-size claim (">=3x smaller than specialized protocols") rests on a single ResNet-50
      row whose own caption concedes that zkCNN and pvCNN never implemented ResNet-50 -- so their
      cells hold those systems' proof sizes for SMALLER models (VGG-16 and LeNet-5). The
      substitution is conservative, but the claim is an inference from three cells, two of which
      are for different models. The proving-time claim against ZKML, by contrast, IS like-for-like:
      same model, same hardware, and the paper says so.
    benchmarks:
      - model: GPT-J
        params: 6000000000
        context_window: 2  # "2 tokens" -- Table 3, Input dimensions
        claim_kind: pass   # a forward pass over a 2-token prompt. NOT a per-token decode cost.
        proving_time_s: 1397.52  # Table 4
        verification_time_s: 62.64
        proof_size_mb: 6.54
        tokens_per_minute: null  # deliberately null: the paper reports no throughput. See notes.
        proving_time_note: >-
          Table 4, end-to-end. Supersedes the two secondhand figures we used to carry (DeepProve's
          0.09 TPM => 667 s, and the ICME blog's "20 minutes"). DeepProve's number is derived from
          exactly this row, by dividing it by the two prompt tokens.
      - model: BERT
        params: 340000000
        context_window: 1  # Table 3
        claim_kind: pass
        proving_time_s: 880.42
        verification_time_s: 26.67
        proof_size_mb: 4.88
      - model: LLaMA-2-7B
        params: 7000000000
        context_window: 1  # Table 3
        claim_kind: pass
        proving_time_s: 2645.50
        verification_time_s: 100.14
        proof_size_mb: 22.85
      - model: GPT-2
        params: 124000000
        claim_kind: pass
        proving_time_s: 599.0  # Sec. 6.3, head-to-head against ZKML on identical hardware
        verification_time_s: 12.0
        tokens_per_minute: null  # the paper reports no throughput; do not re-derive one
        proving_time_note: >-
          Sec. 6.3, the one like-for-like comparison in the paper: ZKTorch 599 s prove / 12 s verify
          vs ZKML 3601 s / 19 s, same model, same hardware. NOTE: our `zkml-kang` entry carries
          3652 s for that same ZKML GPT-2 run, taken from the survey -- a new survey-vs-primary
          conflict; both values are recorded here in papers.yml.

