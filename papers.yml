  - id: zip
    name: ZIP
    title: "Zero-Knowledge AI Inference with High Precision"
    url: https://eprint.iacr.org/2025/1732
    pdf: https://eprint.iacr.org/2025/1732.pdf
    venue: ACM CCS 2025
    date: 2025
    year: 2025
    authors: [Arman Riasi, Haodi Wang, Rouzbeh Behnia, Viet Vo, Thang Hoang]
    authors_verified: true
    affiliation: Virginia Tech / CityU Hong Kong / South Florida / Swinburne
    proof_system: Commit-and-prove zk-SNARK (model-private, zero-knowledge)
    numbers_source: primary
    quantization:
      bits: null  # deliberately NONE
      scheme: >-
        NO quantization. The distinguishing contribution: native IEEE-754 double-precision
        floating-point inference. Non-linear activations are proven by piecewise-polynomial
        approximations stored in a lookup table, with a relative-error-driven technique and
        extra arithmetic constraints hardening the lookup/range proofs against a malicious
        prover. GeLU needs ~70 table entries; claims 1-3 orders of magnitude smaller activation
        circuits than prior work, at full precision.
      accuracy_retention: >-
        The HONEST PROVER computes in full IEEE-754 double precision, so there is no fixed-point
        precision loss in an honest execution. But see soundness_caveat: this is a property of
        what the honest server computes, NOT of what the proof enforces.
    mechanism: >-
      PRIMARY, Sec 4.2-4.3. Three-part trick. (1) OFFLINE: approximate the activation by a
      piecewise polynomial (GeLU: m=8 pieces of degree k=10) and store the coefficients in a
      lookup table of just 70 entries. (2) ONLINE: the prover evaluates the activation EXACTLY
      in IEEE-754 double and feeds that exact value y downstream -- the polynomial approximation
      is never used for subsequent layers, which is what stops approximation error compounding
      across depth. (3) PROVE: an extended Caulk lookup (forcing an ordered, contiguous block of
      coefficients) + a private-interval range proof (the correct piece was selected without
      revealing which), plus an "approximation-soundness" relation binding y to the polynomial:
      |y - f(y')| <= delta * |f(y')|. That inequality is enforced division-free via witnesses
      l1 = y - f(y'), l2 = delta*f(y'), z3 = (l1+l2)(l2-l1), proving z3 >= 0 (i.e. l1^2 <= l2^2);
      float non-negativity is just "sign bit 0 OR mantissa 0". Horner's method keeps the
      polynomial to k float mults + k float adds.
    soundness_caveat: >-
      IMPORTANT, and not stated as a limitation by the paper. ZIP does NOT prove that y is the
      correct IEEE-754 activation of y'. y is a WITNESS, and the only constraint binding it is
      the relative-error inequality above. So the proof establishes that y lies within a
      DELTA-RELATIVE BALL around a certified piecewise-polynomial approximation -- not that y is
      the true activation. An honest prover puts the exact double in that ball; a malicious
      prover may put anything in it.
      The ball is not tight. ZIP's own experimental parameters (Sec 5.2): delta = 9e-4 for SeLU
      and ELU, but delta = 9e-2 for GeLU -- a 9% per-activation relative-error budget available
      to an adversary. For scale: bfloat16's machine epsilon is ~7.8e-3, an order of magnitude
      TIGHTER than the slack ZIP's flagship GeLU proof permits. A paper headlined
      "double precision" has, on its flagship activation, a soundness guarantee looser than bf16.
      AND IT IS NOT ONLY THE ACTIVATIONS. ZIP's LINEAR layers are not exactly bound either in the
      configuration whose timings it advertises: Sec 5.4 checks them with a randomized
      (Freivalds-style) linear combination "with a small relative tolerance to handle IEEE-754
      rounding". The paper states that "without RLC and thus preserving full numerical precision"
      end-to-end proving takes 40/42/47 min versus the advertised 20.67/15.91/13.94 -- i.e. the
      headline numbers are for the TOLERANCE-BOUNDED configuration, roughly 2-3x faster than the
      exact one. So the advertised system is approximate end to end: approximate activations AND
      approximate linear layers.
      To be fair: this is not a bug and is not hidden. ZIP's soundness theorem is stated w.r.t.
      F-hat (the APPROXIMATED network) and is honestly proved. The gap is between what the paper
      claims colloquially ("IEEE-754-compliant inference") and what the constraint system
      enforces. Whether the delta-slack is EXPLOITABLE -- whether an adversary can steer a
      classification by nudging each activation within its ball, and whether the error compounds
      or cancels across layers -- is NOT analyzed in the paper. Open question.
    ieee754_baseline_costs: >-
      PRIMARY, Sec 4.1. The price of naive IEEE-754 in a circuit, which ZIP compiles from prior
      work and which is the best published costing of "why not just use floats":
      per-operation Boolean gate counts -- single precision 2,456 gates/add and 8,854 gates/mul
      (from Mystique, USENIX Sec '21); double precision 15,637 gates/add and 44,899 gates/mul
      (from Archer-Atapoor-Smart, "The cost of IEEE arithmetic in secure computation",
      LATINCRYPT '21). Composed up with gadgets for sqrt and tanh, ZIP estimates a SINGLE GeLU
      activation costs ~1,302,142 R1CS constraints in single precision and ~6,808,760 in double.
      ZIP itself: 5,830 R1CS constraints per GeLU (a ~1,172x reduction vs the 6.8M baseline),
      falling to 4,599 at 2^14 activations via shared subexpressions; 17,112 PlonK constraints
      per GeLU. SeLU/ELU see 545x-791x reductions. Backend: gnark PlonK over BN254.
    notes: >-
      The counter-philosophy to everyone else here, on the accuracy axis: rather than quantizing
      the model to fit the prover, ZIP makes the prover handle native floating-point. NOT an LLM
      prover and NOT a graph point -- evaluated on small models (MNIST, UTKFace faces, SST-2
      sentiment); SST-2 is text but a tiny classifier, not a generative LLM. Zero-knowledge /
      model-private like zkLLM. Most useful to this collection as the concrete example that
      quantization is a choice, not a necessity -- see the "bend the model vs bend the prover"
      theme (SafetyNets origin; zkGPT relaxations and Jolt teleportation bend the model;
      DeepProve and ZIP bend the prover). But read soundness_caveat before citing it as a clean
      win: its precision is a property of the honest prover, not of the proof.
      See content/zk-inference/numerics.md.
    benchmarks: []  # per-model timings not yet extracted; datasets MNIST / UTKFace / SST-2

