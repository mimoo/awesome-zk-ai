  - id: zator
    name: Zator
    title: "Zator: Verified inference of a 512-layer neural network using recursive SNARKs"
    url: https://github.com/lyronctk/zator
    venue: Open-source project, Hack Lodge (no paper)
    date: 2023-04
    year: 2023
    authors:
      - Lyron Co Ting Keh
      - Varun Shenoy
    authors_verified: false
    authors_note: >-
      No paper and no author list in the repository. The GitHub org is lyronctk; the example
      proofs are hosted in a gist owned by varunshenoy; the README acknowledges Dan Boneh
      (advising), Nalin Bhardwaj (Nova-Scotia), Srinath Setty (Nova) and Cathie So (circuit
      library) as advisors, NOT as authors. Recorded as unverified: attribute the work to the
      project, not to a name, unless you can confirm it.
    proof_system: >-
      Nova (folding / IVC) composed with Spartan. One R1CS step circuit per network layer,
      folded N times into a single relaxed R1CS instance; that one instance is then proven
      succinctly with Spartan. Circuits written in circom, compiled to Nova via Nova-Scotia.
      Recursion overhead is the folding step itself: ~10k constraints per step.
    uses_zk: true
    hardware: AWS instance, no GPU (instance type not stated).
    numbers_source: blog
    numbers_note: >-
      Every figure comes from the project README (there is no paper and no peer review). The
      benchmark table is the BACKBONE ONLY -- 510 folded convolution layers. The head and tail
      layers are proven separately and their proving times are never reported, so no number
      here is an end-to-end cost for the advertised 512-layer network.
    objectives:
      - inference
    quantization:
      bits: null
      scheme: >-
        Scale factors and floor division applied to weights and activations during training.
        Negative numbers handled by splitting the field at floor(p/2). Bit width never stated.
      accuracy_retention: null
      note: >-
        The README calls the quantization error "a significant limitation of the network we
        snarked" and reports no accuracy at all -- not a delta, not an absolute. The model is
        trained on MNIST. Take the correctness claim as "the circuit proves what the quantized
        network computed", with no evidence offered about what that network is worth.
    notes: >-
      THE FIRST FOLDING-FOR-ML SYSTEM, and the ancestor of the accumulation line that zktorch
      now occupies. April 2023, a week-long Hack Lodge project, no paper. It is in this file
      because it is the cleanest natural experiment in the corpus on a question the later
      folding papers assume away: what does it cost to make a neural network HOMOGENEOUS
      enough to fold?

      The answer is: you have to design the network around the prover, and Zator does it
      openly. Nova can only fold a repeated step, so the backbone is 510 IDENTICAL convolution
      layers -- convolutions and not dense layers, because a 784x784 dense weight matrix costs
      ~350M constraints just to HASH it (MiMC, 220 rotations) before you have proven a single
      multiplication. That is the homogeneity tax, quantified, and it is why the backbone of
      the deepest network anyone had snarked was a stack of clones. Even then it does not
      fully close: head and tail cannot be parameterized like the backbone, so the system
      emits THREE proofs and the verifier must chain them through their public outputs.
      SuperNova (heterogeneous steps) was unimplemented at the time; Mira-style accumulation,
      which is what zktorch uses to fold a real model graph, is the descendant that fixes this.

      WHAT THE BENCHMARK ACTUALLY SHOWS, AND IT IS NOT WHAT THE HEADLINE SAYS. The headline is
      depth: 512 layers, "as deep or deeper than the majority of production AI models", 2.5B
      total constraints. The table underneath it is 7.5 hours of proving for MNIST. Read the
      two together and the lesson is that DEPTH WAS NEVER THE BINDING CONSTRAINT -- recursion
      does dissolve it, exactly as advertised, and the field still could not prove a real model
      afterwards, because the cost lives in the WIDTH of each layer and folding does nothing
      about that. A 2023 project proving a deeper network than anything in this file, on a
      dataset nobody has cared about since 2012, is the whole point.

      THE FOLD IS NOT THE COST. Going from 1 layer/step to 3 layers/step -- i.e. cutting the
      number of folds by 3x -- makes proving SLOWER (26,967s -> 30,227s), while verification
      degrades from 24.4s to 62.7s because the final Spartan proof is over a 3x bigger step
      circuit. The ~10k-constraint folding overhead really is negligible against the per-layer
      circuit; there is no win available on that axis. Also worth stating plainly: 24 seconds
      to verify. Nothing here settles on-chain.
    benchmarks:
      - model: 510-layer conv backbone (MNIST), 1 layer/step
        params: null
        layers: 510
        recursive_steps: 510
        constraints: 2500000000
        constraints_note: 2.5B total constraints is the README's figure for the full 512-layer network.
        proving_time_s: 26966.8
        verification_time_s: 24.4
        proof_size_mb: null
      - model: 510-layer conv backbone (MNIST), 2 layers/step
        params: null
        layers: 510
        recursive_steps: 255
        proving_time_s: 29082.0
        verification_time_s: 47.7
        proof_size_mb: null
      - model: 510-layer conv backbone (MNIST), 3 layers/step
        params: null
        layers: 510
        recursive_steps: 170
        proving_time_s: 30226.8
        verification_time_s: 62.7
        proof_size_mb: null
        note: >-
          Fewer folds, more proving time, and 2.6x the verifier time. The folding overhead is
          not what you are paying for.

  - id: range-arithmetic
    name: Range-Arithmetic
    title: "Range-Arithmetic: Verifiable Deep Learning Inference on an Untrusted Party"
    url: https://arxiv.org/abs/2505.17623
    pdf: https://arxiv.org/pdf/2505.17623
    venue: arXiv:2505.17623v2
    date: 2026-06-09  # v2; v1 is 2025-05-23
    year: 2026
    authors: [Ali Rahimi, Babak H. Khalaj]
    authors_verified: true
    affiliation: Sharif University of Technology
    proof_system: Sum-check + concatenated range proofs (Bulletproofs-style), interactive
    uses_zk: false  # "incorporating privacy-preserving features" is listed as FUTURE WORK (Sec 6)
    open_source: true
    repo: https://github.com/trainingzk/Range-Arithmetic
    hardware: null  # not stated
    numbers_source: primary  # we read the PDF; but see benchmarks -- there is almost nothing to source
    quantization:
      bits: null
      bits_note: >-
        Parameterised, not fixed: the scheme is stated over a fixed-point format with 1 sign bit,
        t integer bits and s fractional bits, and Fig. 3 sweeps bit length. No single bit width is
        claimed for a model, and no accuracy delta is reported at any width.
      scheme: >-
        Fixed-point with rounding proven ARITHMETICALLY. The core trick (Theorem A.1): to prove
        a' = R(a), the prover sends a' and a remainder e with a = e + 2^s * a' (mod p), then range
        proofs pin e and a' to their intervals -- which forces a' to be the correctly rounded value.
        Rounding and ReLU therefore need no Boolean encoding, no high-degree polynomial, and no
        lookup table. This is the one genuinely nice idea in the paper.
      accuracy_retention: null
    notes: >-
      Third camp in the numerics debate, alongside relax-the-semantics (garg-fp) and
      keep-IEEE-optimize-the-circuit (zklp): keep FIXED point, but prove the ROUNDING with range
      proofs rather than bit-decomposition. Claims to be the first to get O(n^3) prover, O(n^2)
      verifier, O(log n) communication AND fixed-point rounding AND ReLU together, with no
      preprocessing and no R1CS. Descends from SafetyNets (interactive sum-check, integrity not
      privacy) rather than from the SNARK line.
      NOT zero-knowledge -- see uses_zk. Like SafetyNets, it buys integrity only, and privacy is
      explicitly future work.
    quality_flag: >-
      CAUTION -- the bibliography does not survive checking, and that is a bad sign in a paper we
      cannot otherwise verify. Reference [25] attributes "Jolt Atlas" to Bagad, Domb and Thaler and
      cites it as "Cryptology ePrint Archive, 2026, https://eprint.iacr.org/2026/xxx" -- an
      UNSUBSTITUTED PLACEHOLDER URL, and the wrong authors (Jolt Atlas is Benno, Centelles, Douchet
      and Gibran, arXiv:2602.17452). Reference [24] attributes ZIP to "Y. Zhang et al." (it is
      Riasi, Wang, Behnia, Vo, Hoang). References [23] ("zkReLU", IEEE TIFS vol. 20 pp. 1200-1215)
      and [27] ("ValidCNN", IEEE TIFS vol. 20 pp. 2218-2233) look fabricated: zkReLU is a component
      of zkDL, not a standalone TIFS paper, and [27]'s page range is identical to that of pvCNN
      [15], a different paper in the same list. Several references also carry trailing editorial
      annotations ("achieves >50x speedup for ReLU/sigmoid via table-lookup") that read as
      machine-generated. The MATH (Theorem A.1) checks out and the technique is real; the
      scholarship around it does not. Do not cite this paper's characterisations of other work.
    benchmarks:
      - model: DNN (MNIST)
        params: null
        proving_time_s: null
        proving_time_note: >-
          NOT REPORTED IN TEXT. Sec. 5 reports prover/verifier runtime and communication only as
          log-scale plots (Fig. 3, vs bit length; Fig. 4, vs matrix size) with no absolute figure
          stated anywhere in prose or in a table. Same problem as SafetyNets. There is no number
          here to put in a table, and inventing one off a log axis would be a fabrication.
        proof_size_mb: null
        verification_time_s: null

numerics_primitives:
  # NOT ML systems. These are the arithmetic building blocks underneath zkML: how you represent a
  # real number in a circuit at all. They matter because the entire zkML literature justifies
  # quantization by asserting that native floating point is "infeasible" in a circuit -- and these
  # papers show that it is not.
  # CORRECTED 2026-07-13: this comment used to say these are papers "which NO zkML system in this
  # file cites". That is FALSE, and the exception is the most interesting edge in the corpus: ZIP
  # cites garg-fp (adopting its relative-error model wholesale), cites archer-ieee, and DEPENDS on
  # zklp -- "For linear layers, ZIP directly leverages the existing technique from [20]", with both
  # of its benchmark tables footnoted "All linear operations are proved via [20]." Half of ZIP's
  # circuit IS zklp, so every proving time ZIP reports is partly a zklp number. The correct claim
  # is narrower: the TRANSFORMER-PROVING systems (deepprove, zkgpt, zkllm, zkpytorch, jolt-atlas)
  # do not cite this shelf. ZIP is the sole bridge, and it is a load-bearing one.
  # See content/numerics/ (index.md, bridge.md).
  - id: garg-fp
    name: Garg et al. (FP)
    title: "Succinct Zero Knowledge for Floating Point Computations"
    url: https://dl.acm.org/doi/10.1145/3548606.3560653
    venue: ACM CCS 2022
    date: 2022-11-07
    year: 2022
    authors: [Sanjam Garg, Abhishek Jain, Zhengzhong Jin, Yinuo Zhang]
    authors_verified: true
    numbers_source: primary
    proof_system: Succinct ZK argument over a relative-error model of floating-point arithmetic
    approach: relaxed-semantics
    notes: >-
      CAMP 1 of the two float-in-ZK camps: RELAX THE SEMANTICS. The insight is that you need not
      prove the IEEE rounding *procedure*, only that the result is *accurate*. So instead of
      arithmetising round-to-nearest, prove a per-gate relative-error bound
      |c - g(a,b)| <= delta * |g(a,b)|, where g is the exact sum/product and delta can be set to
      machine epsilon -- "the relative error bound in the IEEE standard". Zeros, infinities and NaN
      are handled as separate corner cases. Inspired by the FHE-for-floats line, which made the
      same move.
      Explicitly a DEVIATION, and the paper says so (Sec 2, Our Model): "our model does not
      guarantee that the value in the output wire of a step of the computation is rounded to the
      nearest number (as is done in the IEEE standard). Instead, our model allows a larger (by a
      factor of 2 in some cases) absolute error."
      Prover speedup vs verifying exact IEEE: ~57x for FP32, ~236x for FP64.
      CRITICAL CONNECTION: this is the technique ZIP uses, one level up -- ZIP applies the same
      relative-error relation to whole ACTIVATIONS rather than to individual float gates. But Garg
      sets delta = machine epsilon (as tight as the model admits); ZIP sets delta = 9e-2 for GeLU.
      Same machinery, wildly different slack. See zip.soundness_caveat.
    benchmarks: []

  - id: archer-ieee
    name: Archer et al. (IEEE cost)
    title: "The Cost of IEEE Arithmetic in Secure Computation"
    url: https://eprint.iacr.org/2021/054
    venue: LATINCRYPT 2021
    date: 2021
    year: 2021
    authors: [David W. Archer, Shahla Atapoor, Nigel P. Smart]
    authors_verified: true
    numbers_source: primary
    proof_system: n/a -- MPC (Scale-Mamba, LSSS + binary circuits), not ZK
    approach: exact-ieee754
    notes: >-
      The origin of the double-precision gate counts that ZIP and ZKLP both quote, and which the
      zkML literature leans on when it calls floats "infeasible". MPC rather than ZK, but it is
      where the numbers come from, so it is worth pinning down.
      PRIMARY TABLE (Sec 3, IEEE-754-compliant FP64 circuits, compiled via CBMC-GC to Bristol
      Fashion, OR gates removed so only AND/XOR/INV remain):
        add: 5,385 AND | 8,190 XOR | 2,062 INV | AND-depth 235
        mul: 19,626 AND | 21,947 XOR | 3,326 INV | AND-depth 129
        div: 82,269 AND | 84,151 XOR | 17,587 INV | AND-depth 3,619
      PROVENANCE NOTE, verified by us: the figures "15,637 add / 44,899 mul" quoted by ZIP and by
      ZKLP are the TOTAL gate counts, i.e. AND+XOR+INV summed from the rows above
      (5385+8190+2062 = 15,637; 19626+21947+3326 = 44,899). Both secondhand quotes are arithmetically
      correct. But the total is a generous way to state the cost: in most MPC/ZK settings the AND
      gates dominate (XOR is often free), so the AND-only cost is 5,385 / 19,626 -- roughly 3x and
      2x smaller. Archer et al. go further and say that for their LSSS-based engine "the dominant
      cost is not the number of AND gates but the DEPTH of the AND gates".
      So when the zkML literature cites ~45k gates for an FP64 multiply as evidence that floats are
      hopeless, it is citing the largest of several defensible numbers, transplanted from MPC into
      a ZK argument. That does not make the conclusion wrong -- 19,626 AND gates is still enormous
      next to a field multiply -- but the figure deserves the asterisk.
    benchmarks: []

  - id: zklp
    name: ZKLP
    title: "Zero-Knowledge Location Privacy via Accurate Floating-Point SNARKs"
    url: https://arxiv.org/abs/2404.14983
    pdf: https://arxiv.org/pdf/2404.14983
    venue: arXiv 2404.14983
    date: 2024-04-23
    year: 2024
    authors: [Jens Ernstberger, Chengru Zhang, Luca Ciprian, Philipp Jovanovic, Sebastian Steinhorst]
    authors_verified: true
    numbers_source: primary
    proof_system: gnark / PlonKish with LogUp lookup arguments over BN254
    approach: exact-ieee754
    notes: >-
      CAMP 2: KEEP THE SEMANTICS, OPTIMIZE THE CIRCUIT. Despite the location-privacy title this is
      the important accurate-floating-point-SNARK paper, and the single strongest refutation of the
      "floats are infeasible in a circuit" premise the whole zkML literature rests on.
      Builds ZKP circuits FULLY COMPLIANT with IEEE 754 -- subnormals and all -- validated against
      the Berkeley TestFloat conformance suite. The trick: push the circuit-hostile parts
      (comparison, shifts, normalization) into LOOKUPS (LogUp, in gnark) instead of gates, so the
      shared tables amortize across operations.
      HEADLINE: 2^1 FP32 multiplications cost 209 constraints each; 2^15 FP32 multiplications cost
      *64 constraints per operation*. Compare the naive IEEE-754 emulation cost the paper itself
      quotes (Sec 5.1, in the prose paragraph headed "Comparison With Other Works" -- it is NOT a
      table, and it is not Sec 6; Sec 6 is Related Works and prints no figures at all):
      FP32 2,456 gates/add and 8,854 gates/mul; FP64 15,637/add and 44,899/mul.
      Those same four figures are independently quoted by ZIP (from Mystique and from
      Archer-Atapoor-Smart, LATINCRYPT'21) -- two primary sources in agreement.
      THE INVERSION: ZKLP's IEEE-754 FLOAT circuits use 15.9x FEWER constraints than an unoptimized
      FIXED-POINT baseline (FP32; 12.2x for FP64), because reaching comparable accuracy in fixed
      point demands so many bits. In an application that genuinely needs dynamic range, floating
      point is the *cheaper* circuit. The core zkML trade -- "give up dynamic range, buy cheap
      arithmetic" -- is a bet, not a law, and it can go the other way.
      It also states the soundness case outright (Sec 1): fixed-point "fails some tests whereas
      floating-point passes all. Even worse, this inconsistency can be exploited by adversaries to
      generate valid proofs for maliciously crafted statements, thereby breaking the soundness".
      CAVEAT, before over-reading this for zkML: 64 constraints/multiply is superb next to 8,854
      and still terrible next to sum-check, which proves an entire matrix product for almost
      nothing. Floats do not threaten integer sum-check for LLM MATMULS. Where they plausibly win
      is the non-linear operators and the precision-critical seams -- which is exactly where zkML's
      cost actually lives. Nobody in zkML has tested this.
    benchmarks: []

  - id: sirnn
    name: SIRNN
    title: "SiRnn: A Math Library for Secure RNN Inference"
    url: https://eprint.iacr.org/2021/459
    pdf: https://arxiv.org/pdf/2105.04236
    venue: IEEE S&P 2021
    date: 2021-05-10
    year: 2021
    authors:
      - Deevashwer Rathee
      - Mayank Rathee
      - Rahul Kranti Kiran Goli
      - Divya Gupta
      - Rahul Sharma
      - Nishanth Chandran
      - Aseem Rastogi
    authors_verified: true
    affiliation: Microsoft Research
    approach: 2PC, semi-honest -- LUT + Goldschmidt iteration for math functions, mixed bit-widths, digit decomposition
    open_source: true
    repo: https://github.com/mpc-msri/EzPC
    numbers_source: primary
    # FILED HERE, NOT IN THE PRIVACY COLUMN, AND THE CHOICE IS DELIBERATE.
    # SIRNN is a MATH LIBRARY -- its title says so -- and numerics_primitives is this file's neutral
    # shelf for the arithmetic substrate that BOTH columns consume. SecFloat, by the same first
    # author, is already here. Filing SIRNN under secure_inference_2pc instead would reclassify the
    # shared substrate as "the privacy column" and mechanically turn every ZK paper that borrows its
    # arithmetic (hao-et-al, zkpot-garg) into a crossing edge -- which is a filing artifact, not a
    # discovery. See validate.py check 10 and the comment in citation-graph.yml.
    notes: >-
      ONE OF THE THREE NODES THIS SOK'S HEADLINE FINDING RESTS ON, AND WE HAD NEVER READ IT. The
      bridge page has been arguing for months that "the only three papers cited by both columns are
      SIRNN, Cheetah and SecFloat, and all three are MPC numerics." We held SecFloat. SIRNN and
      Cheetah were names in a graph. Both are now read.

      What it is: specialized 2PC protocols for the math functions a network actually needs --
      exponential, sigmoid, tanh, reciprocal, and reciprocal square root -- built on a single
      paradigm. Use a LOOKUP TABLE for a good initial approximation, then refine with GOLDSCHMIDT'S
      ITERATIONS. Support that with DIGIT DECOMPOSITION (split an l-bit value into l/d digits so you
      can index several small tables instead of one huge one, ~5x cheaper than garbled circuits) and
      MIXED BIT-WIDTHS (do not force every variable to 64 bits just because one operation needs it).

      Read that paragraph again and then read the zkML papers. Digit decomposition into small
      lookup tables, refined by an iterative approximation, with bit-widths chosen per operator.
      That is hao-et-al's exponential protocol, its reciprocal-square-root protocol, and its
      hyperparameters -- hao-et-al cites SIRNN five times in its BODY and inherits its iteration
      counts and lookup bit-lengths outright. It is also, in different vocabulary, what DeepProve
      and zkGPT rediscovered from first principles four years later.

      AND ITS MOTIVATION IS ZKPYTORCH'S CAUSAL CHAIN, WRITTEN IN 2021 IN MPC VOCABULARY: "the
      requirement of a high bitwidth even in one operation, coupled with the requirement of uniform
      bitwidths, raises the bitwidths of all variables and operations throughout an inference task,
      resulting in a communication blowup." Replace "communication blowup" with "field size" and you
      have the argument the numerics page opens with, four years early.

      THE FACT THAT SETTLES AN ARGUMENT ON THE NUMERICS PAGE: SIRNN'S TRUNCATION IS EXACT. All four
      of its truncation flavours -- logical shift, arithmetic shift, truncate-and-reduce, and
      C-style division by a power of two -- compute the wrap/borrow terms exactly. There is no
      "fails with small probability" anywhere in the paper, and truncate-and-reduce costs
      ~lambda(s+1) bits, ROUGHLY 4.5x LESS than a garbled circuit. So the MPC world did not only
      have the cheap-but-probabilistic truncation that ZK cannot borrow; it also had the exact one,
      and the exact one is the one that is cheap. Our claim that "probabilistic truncation is the
      exception that has been mistaken for the rule" now has its primary source.
    quantization:
      bits: null
      bits_note: >-
        The whole point is that there is no single bit width -- mixed, non-uniform bit-widths are
        the contribution. Formally verified against GNU MPFR at bit-width 16 by exhaustive testing.
      scheme: >-
        Fixed-point, exact truncation (four flavours). Math functions via LUT initial approximation
        + Goldschmidt iterations. Precision is reported as ULP error, not as an accuracy delta:
        exponential 3 ULP, sigmoid 3, tanh 4, reciprocal square root 4. "Intel's SVML also provides
        math implementations with 4 ULP error."
      accuracy_retention: >-
        "SIRNN has no loss in model accuracy." Its foil: SecureML/ABY2.0's 3-piece linear spline
        sigmoid carries 1547 ULPs of error and drops Google-30 keyword-spotting accuracy from 84.4%
        to 60.95%. Cheap approximations of the non-linearities are how you destroy a model, and this
        is the cleanest measurement of it anywhere in the corpus.
    benchmarks:
      - model: Google-30 (keyword spotting RNN)
        params: null
        proving_time_s: 49.6
        communication_mb: 450
        note: >-
          Against a uniform-64-bit ABY baseline: 3337 s and 259 GB. 67x faster, 574x less
          communication. The 423x in the abstract is the per-instance communication ratio for
          reciprocal square root against MP-SPDZ (6 KB vs 2535 KB).
      - model: Heads (SCUT Head, CNN+RNN)
        params: null
        proving_time_s: 409.7
        communication_mb: 85500
        note: >-
          ~3 million sigmoid/tanh calls and 2700 reciprocal-square-roots. The ABY baseline is
          intractable ("hundreds of terabytes"). First secure implementation of this model; no prior
          2PC work supported rsqrt at all.

  - id: secfloat
    name: SecFloat
    title: "SecFloat: Accurate Floating-Point meets Secure 2-Party Computation"
    url: null
    url_note: >-
      The PDF we hold is the self-published "Full Version" and carries no DOI, eprint number or
      canonical URL. Venue is confirmed INDEPENDENTLY from three PDFs in references/ that cite it
      (bolt, zkpot-garg, zklp): IEEE S&P 2022, pp. 576-595. We do not guess the canonical link.
    venue: IEEE S&P 2022
    date: 2022-05-01
    year: 2022
    authors:
      - Deevashwer Rathee
      - Anwesh Bhattacharya
      - Rahul Sharma
      - Divya Gupta
      - Nishanth Chandran
      - Aseem Rastogi
    authors_verified: true
    affiliation: UC Berkeley / Microsoft Research
    proof_system: n/a -- 2PC (secret sharing + OT), not ZK. Same caveat as archer-ieee.
    approach: exact-ieee754
    open_source: true
    repo: https://github.com/mpc-msri/EzPC
    numbers_source: primary
    notes: >-
      The MPC mirror of ZKLP, and the strongest EMPIRICAL statement in this file that fixed point
      is a choice with a failure mode -- not a free lunch. SecFloat builds crypto-friendly but
      PRECISE 2PC functionalities for 32-bit floats (add, mul, div, compare) and math functions
      (exp, log, trig), by decomposing each into integer 2PC building blocks rather than compiling
      an IEEE Boolean circuit. Reports up to six orders of magnitude more precision and up to two
      orders of magnitude more efficiency than prior cryptographic float libraries, and three
      orders of magnitude over a precise 2PC baseline.
      WHY IT MATTERS TO US, and it is one sentence in the abstract: "All prior works on secure
      inference of deep neural networks rely on ad hoc float-to-fixed converters. We evaluate a
      model where the fixed-point approximations used in privacy-preserving machine learning
      completely fail and floating-point is necessary." The case study (Sec. IX-C) is
      privacy-preserving advertising. So the claim "quantize, it is fine" has a published
      counterexample -- from the MPC column, which the zkML column does not cite.
      Note the direction of the argument differs from ZKLP's: ZKLP shows exact floats can be CHEAP
      in a circuit; SecFloat shows fixed point can be WRONG for a real model. Together they are
      the two halves of the case the zkML literature has never answered.
      NOT a ZK system and not a graph point. Filed here because it is where the float-vs-fixed
      evidence lives.
    benchmarks: []  # per-benchmark 2PC comm/runtime not extracted; the corpus-relevant claim is qualitative

  - id: prob-truncation
    name: Probabilistic truncation in PPML
    title: "On Probabilistic Truncation in Privacy-preserving Machine Learning"
    url: null
    url_note: >-
      The PDF carries no DOI, arXiv id or eprint number -- only the AAAI-25 proceedings header and
      page 22955. Venue (AAAI 2025) is taken from the paper's own header. The AAAI OJS article id
      is NOT guessed here; fill it in only after looking it up.
    venue: AAAI 2025
    date: 2025-02-01
    year: 2025
    authors:
      - Lijing Zhou
      - Bingsheng Zhang
      - Ziyu Wang
      - Tianpei Lu
      - Qingrui Song
      - Su Zhang
      - Hongrui Cui
      - Yu Yu
    authors_verified: true
    affiliation: Huawei / Zhejiang University / Shanghai Jiao Tong University
    proof_system: n/a -- MPC / secret sharing (ABY3, ABY2.0, EdaBits, Bicoptor lineage), not ZK
    approach: fixed-point-truncation
    numbers_source: primary
    notes: >-
      The re-quantization problem, studied properly, in the column that studied it. Every fixed-point
      system must TRUNCATE after a multiply to rescale, and the cheap (non-interactive) truncation
      protocols used across PPML -- SecureML, ABY3, EdaBits, Bicoptor -- are PROBABILISTIC: they
      fail with probability 2^-(l - l_x - 1), where l is the ring size and l_x the value's bit
      length. A failure is not a rounding error, it is a large wrong value. The paper's response is
      a non-interactive DETERMINISTIC cut protocol that removes the probabilistic error, which then
      lets the ring be smaller (Bicoptor's DReLU communication drops ~50%). Separately it shrinks
      the DReLU input to a few effective bits, cutting ReLU communication by over 70% at no
      noticeable accuracy cost.
      THE ZKML CONNECTION, which nobody on the zkML side has drawn: zkML's re-quantization step is
      the same operation, and DeepProve, zkGPT and zkTorch all prove it with lookups/range checks.
      In ZK the analogous failure is not silent inaccuracy but an out-of-range value that cannot be
      looked up at all (see deepprove.quantization and content/zk-inference/quantization.md) --
      DIFFERENT failure mode, SAME underlying operation, and this is the only paper in the file that
      quantifies how often the cheap version of it goes wrong. It is the missing prior art for the
      claim that truncation is where fixed-point correctness actually breaks.
      NOT a ZK system, not a graph point. MPC, filed here for the numerics argument.
    benchmarks: []  # communication/round costs are per-protocol (ReLU/DReLU), not per-model

testing:
  # "Verifiable testing": prove a committed model achieves a claimed accuracy on a dataset.
  # Distinct from inference (one input) and training (the whole optimization process).
  - id: zkdt
    name: zkDT
    title: "Zero Knowledge Proofs for Decision Tree Predictions and Accuracy"
    url: https://dl.acm.org/doi/10.1145/3372297.3417278
    venue: ACM CCS 2020
    date: 2020-10-01
    year: 2020
    authors: []  # TODO -- believed Jiaheng Zhang, Zhiyong Fang, Yupeng Zhang, Dawn Song
    authors_verified: false
    proof_system: Aurora backend; circuit of size O(d + h) for tree inference
    hardware: Intel Xeon Platinum 8124M
    numbers_source: survey
    notes: >-
      Validates all inference-path nodes across the whole test set in one step rather than
      per-sample. Later revisited via matrix lookup arguments (cq+, zkcq+, cq++), which
      removes the prover's dependence on tree size.
    benchmarks:
      - model: Decision tree (1029 nodes, 23 levels)
        dataset: 5000 samples x 54 features
        proving_time_s: 250.0
        proof_size_mb: 0.287
        verification_time_s: 15.6

  - id: pvcnn
    name: pvCNN
    title: "pvCNN: Privacy-Preserving and Verifiable Convolutional Neural Network Testing"
    url: https://arxiv.org/abs/2201.09186
    date: 2023-03-01
    year: 2023
    authors: []  # TODO
    authors_verified: false
    proof_system: Homomorphic encryption + collaborative inference + zk-SNARK (Quadratic Matrix Programs)
    hardware: Quad-core i5-7500, 48 GB RAM
    numbers_source: survey
    notes: "Splits the model into private and public components; encrypted partial execution."
    benchmarks:
      - model: LeNet-5
        dataset: MNIST
        proving_time_s: 1448.83
        proving_time_note: "ReLU matrix"
        proof_size_mb: 351.0
        verification_time_s: 54.0

  # zkCNN, ZEN and Artemis also target verifiable testing -- see the `inference` section,
  # where they are recorded with `objectives: [inference, testing]`.

training:
  # -----------------------------------------------------------------------------------------
  # READ THE FIRST THREE ENTRIES BEFORE THE REST. They are why this category exists.
  #
  # Proof-of-Learning (Jia et al., S&P '21) is the NON-cryptographic proof of training: log your
  # checkpoints, let a verifier replay the most expensive segments. Every zkPoT below positions
  # against it, and until 2026-07-13 this SoK did not contain it.
  #
  # It was then broken twice. And BOTH attack papers conclude, independently, that the fix is
  # cryptography -- one naming SNARKs explicitly and pricing them as "overwhelming overhead".
  # That is the origin story of this cell, and it was missing from the file.
  # -----------------------------------------------------------------------------------------

  - id: pol
    name: Proof-of-Learning
    title: "Proof-of-Learning: Definitions and Practice"
    url: https://arxiv.org/abs/2103.05633
    pdf: https://arxiv.org/pdf/2103.05633
    venue: IEEE S&P 2021
    date: 2021-03-09
    year: 2021
    authors:
      - Hengrui Jia
      - Mohammad Yaghini
      - Christopher A. Choquette-Choo
      - Natalie Dullerud
      - Anvith Thudi
      - Varun Chandrasekaran
      - Nicolas Papernot
    authors_verified: true
    affiliation: University of Toronto / Vector Institute / University of Wisconsin-Madison
    approach: Non-cryptographic. Log training checkpoints + batch indices; verifier replays the largest updates.
    uses_zk: false
    open_source: true
    repo: https://github.com/cleverhans-lab/Proof-of-Learning
    numbers_source: primary
    notes: >-
      The founding paper of proof-of-training, and the one every zkPoT in this category is
      implicitly arguing with. The prover logs a tuple (W, I, H, A): model weights every k-th step,
      the indices of the batch used at each step, signatures of those data points, and the
      hyperparameters. The verifier checks the initialization was drawn from the claimed
      distribution (a Kolmogorov-Smirnov test), then re-executes the Q LARGEST weight updates per
      epoch and fails if the replayed weights differ from the logged ones by more than a slack
      parameter delta.

      Why only the largest updates? Because valid gradient-descent updates are small, so an
      adversary faking a cheaper run must introduce estimation error, and error shows up most
      visibly in the big steps. It is a genuinely elegant heuristic.

      THE SECURITY OF THE WHOLE SCHEME IS A CONJECTURE, AND THE PAPER SAYS SO. Property 2 -- that no
      adversary can produce a valid proof more cheaply than honestly training -- is never proved.
      What is offered instead is Conjecture 1: "Inverting a training sequence using numerical root
      finding methods will always be at least as computationally expensive as training, given the
      same model." The authors are explicit that they are "not aware of a mechanism to prove those
      formally". Two papers then went and broke it: see pol-adversarial and pol-broken.

      The other limitations are candid and worth carrying: verification requires handing the
      training DATA to the verifier; storage is the whole checkpoint history; and the success
      probability "degrades multiplicatively with each usage", which bounds how long a chain of
      PoLs can get.

  - id: pol-adversarial
    name: PoL Adversarial Examples
    title: "\"Adversarial Examples\" for Proof-of-Learning"
    url: https://arxiv.org/abs/2108.09454
    pdf: https://arxiv.org/pdf/2108.09454
    venue: IEEE S&P 2022
    date: 2022-04-05
    year: 2022
    authors: [Rui Zhang, Jian Liu, Yuan Ding, Zhibo Wang, Qingbiao Wu, Kui Ren]
    authors_verified: true
    affiliation: Zhejiang University
    approach: Attack. Spoofs a PoL by crafting adversarial data batches that "generate" the stolen weights.
    uses_zk: false
    numbers_source: primary
    notes: >-
      THE FIRST BREAK, and the idea is lovely. To fake a training step you need a data batch whose
      gradient carries you from one logged checkpoint to the next. So OPTIMIZE THE DATA. Exactly as
      you would craft an adversarial example -- gradient descent on the input rather than on the
      weights -- the attacker synthesizes a batch that makes an update land on the stolen final
      model. The attack explicitly exploits an assumption from the original paper: that the
      adversary "has full access to the training dataset and can modify it".

      Cost: honest training of their ResNet-20/CIFAR-10 target is 78,000 gradient computations.
      Attack II needs 31 gradient computations per faked step, so it wins whenever the faked run is
      shorter than ~2,516 steps; Attack III amortizes over the checkpoint interval and wins below
      ~251,600. Empirically the spoof passes verification, reproduces with LOWER error than the real
      proof, is SMALLER than the real proof, and works from a non-overlapping dataset on strictly
      weaker hardware than the victim's.

      What it kills: Property 2. The paper is blunt that Jia et al. "did not provide a proof to back
      their claim."

      AND ITS PROPOSED FIX IS THIS ENTIRE SOK. Section V lists verifiable computation -- citing
      SNARKs and STARKs by name -- as the sound alternative, and then prices it in one sentence:
      "This mechanism is valid, but it will introduce an overwhelming overhead." That is the zkPoT
      cell, named and costed by an attack paper in 2022.

  - id: pol-broken
    name: PoL is More Broken Than You Think
    title: "Proof-of-Learning is Currently More Broken Than You Think"
    url: https://arxiv.org/abs/2208.03567
    pdf: https://arxiv.org/pdf/2208.03567
    venue: IEEE EuroS&P 2023
    date: 2023-04-17
    year: 2023
    authors:
      - Congyu Fang
      - Hengrui Jia
      - Anvith Thudi
      - Mohammad Yaghini
      - Christopher A. Choquette-Choo
      - Natalie Dullerud
      - Varun Chandrasekaran
      - Nicolas Papernot
    authors_verified: true
    affiliation: University of Toronto / Vector Institute / Microsoft Research / Google Research
    approach: Attack. Two structurally-correct spoofs that defeat the threshold and the top-Q heuristic.
    uses_zk: false
    open_source: true
    repo: https://github.com/cleverhans-lab/practical-attacks-against-pol
    numbers_source: primary
    notes: >-
      THE SECOND BREAK, and note the author list -- this is largely the ORIGINAL PoL TEAM breaking
      their own scheme, which is the most honest thing in this file.

      Two attacks, both cheaper and more robust than the first break. The INFINITESIMAL UPDATE
      ATTACK simply linearly interpolates the checkpoints between the initialization and the stolen
      final model, then logs a learning rate of ~0 so that every update is smaller than the
      verification threshold delta. Reproduced and logged updates are both negligible, so their
      difference is negligible, so verification passes. Cost: NO TRAINING AT ALL -- one floating-point
      operation per parameter per step, upper-bounded by a single forward pass, against the previous
      break's ~31 gradient computations per step. The BLINDFOLD TOP-Q ATTACK defeats the other half
      of the scheme: make exactly Q genuinely-valid updates per epoch with a large learning rate so
      they have the largest magnitudes, interpolate everything else, and the verifier's "check the Q
      biggest updates" heuristic lands on precisely the Q real ones, every time, and never inspects
      the fakes.

      It is also a correction of pol-adversarial: that paper's Attack 1 is "not reproducible"
      (neither team could make it work), and its Attack 2 assumed the attacker controls k and delta,
      which "should be set by the verifier and is thus out of the attacker's control". So the first
      break was real but weaker than advertised, and the scheme is worse than either paper thought.

      THE CONCLUSION IS WHY THIS PAPER IS IN THE SOK: "We conclude that one cannot develop a provably
      robust PoL verification mechanism without further understanding of optimization in deep
      learning." And the way out, in their words: "One possible solution to circumvent these
      fundamental limits in ML theory and our understanding of optimization, is to rely more on
      cryptography." Both attack papers arrive at the same door. Everything else in this category is
      what is behind it.

  - id: kaizen
    name: Kaizen
    title: "Zero-Knowledge Proofs of Training for Deep Neural Networks"
    url: https://eprint.iacr.org/2024/162
    pdf: https://eprint.iacr.org/2024/162.pdf
    venue: ACM CCS 2024
    date: 2024-02-02
    year: 2024
    authors: [Kasra Abbaszadeh, Christodoulos Pappas, Jonathan Katz, Dimitrios Papadopoulos]
    authors_verified: false
    affiliation: University of Maryland / HKUST
    proof_system: Recursive composition of GKR-style proofs + aggregatable polynomial commitments
    hardware: 8x Xeon Platinum 8370, 512 GB RAM
    numbers_source: primary
    notes: >-
      The reference zkPoT for DNNs. Prover trains via mini-batch gradient descent and emits a
      commitment plus succinct proof each iteration; iteration count need not be fixed in
      advance. Proof size and verifier time are independent of iteration count and dataset
