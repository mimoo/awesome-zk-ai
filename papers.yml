alternatives_to_zk:
  - id: opml
    name: opML
    title: "opML: Optimistic Machine Learning on Blockchain"
    url: https://arxiv.org/abs/2401.17555
    venue: arXiv:2401.17555
    date: 2024-01-31
    year: 2024
    authors: [KD Conway, Cathie So, Xiaohang Yu, Kartin Wong]
    authors_verified: true
    affiliation: Hyper Oracle
    approach: Interactive fraud proofs, optimistic-rollup style
    trust_assumption: "AnyTrust -- any ONE honest validator can force correct behavior. Economic + game-theoretic, not cryptographic."
    numbers_source: primary
    notes: >-
      The strongest argument against zkML as a default. Runs 7B-LLaMA on a standard PC with no
      GPU, because it never generates a proof unless challenged. Cites zkML at >1000x overhead
      vs plain computation. The tradeoff is latency-to-finality (a challenge period must
      elapse) and a weaker, economic security model. Note the inversion: when the model is
      large enough that zk proving exceeds the challenge period, opML reaches finality FIRST.
    tradeoff_vs_zk: >-
      Loses: public verifiability without watching the chain, privacy of model/inputs,
      non-interactivity. Wins: ~1000x cost, no trusted setup, runs on commodity hardware.

  - id: opp-ai
    name: opp/ai
    title: "opp/ai: Optimistic Privacy-Preserving AI on Blockchain"
    url: https://arxiv.org/abs/2402.15006
    date: 2024-02-22
    year: 2024
    authors: [Cathie So]  # TODO: full list
    authors_verified: false
    approach: Hybrid -- zkML for the privacy-sensitive submodel, opML for the rest
    notes: "Explicitly splits the model: prove the parts that need privacy in ZK, run the rest optimistically."

  - id: zk-opml
    name: zk-OPML
    title: "zk-OPML: Using zero-knowledge proofs to optimize OPML"
    url: https://link.springer.com/article/10.1007/s44443-026-00573-1
    venue: Journal of King Saud University CIS
    date: 2026
    year: 2026
    authors: []  # TODO
    authors_verified: false
    approach: Optimistic verification + selective ZKPs for isolated ONNX operators
    notes: "Decomposes inference to operator level and generates ZKPs only where needed."

  - id: optimistic-tee-rollups
    name: Optimistic TEE-Rollups (OTR)
    title: "Optimistic TEE-Rollups: A Hybrid Architecture for Scalable and Verifiable Generative AI Inference on Blockchain"
    url: https://arxiv.org/abs/2512.20176
    date: 2025-12
    year: 2025
    authors: []  # TODO
    authors_verified: false
    approach: NVIDIA H100 confidential-computing TEEs + optimistic fraud proofs + stochastic ZK spot-checks
    trust_assumption: "Hardware (NVIDIA attestation) + economic, with ZK used only to sample-check against side-channel/hardware compromise."
    notes: >-
      The most interesting synthesis: use ZK where it is cheap (random spot checks), TEEs where
      throughput matters. Sub-second provisional finality. Argues zkML's super-linear proving
      overhead is infeasible for billion-parameter models.

  - id: tee-confidential-llm
    name: TEE confidential LLM inference
    title: "Confidential LLM Inference: Performance and Cost Across CPU and GPU TEEs"
    url: https://arxiv.org/abs/2509.18886
    pdf: https://arxiv.org/pdf/2509.18886
    venue: "arXiv:2509.18886 [cs.PF]"
    date: 2025-09-23
    year: 2025
    numbers_source: primary  # read the PDF 2026-07-11. The 4-8% figure SURVIVES: it is stated in
                             # the abstract and again in the summary table (Sec. V / Table "Single
                             # resource"). But it is heavily conditioned -- see benchmarks below.
    authors: [Marcin Chrapek, Marcin Copik, Etienne Mettaz, Torsten Hoefler]
    authors_verified: true
    affiliation: ETH Zurich
    approach: Hardware TEE (NVIDIA H100 confidential computing; Intel TDX and SGX CPU TEEs)
    trust_assumption: "Trust the hardware vendor and the attestation chain. Vulnerable to side channels; no public verifiability of the computation itself."
    mentions_zk: false  # VERIFIED: the strings "zero-knowledge", "zkML", "SNARK" and "proof of"
                        # appear ZERO times in this paper. The TEE-vs-ZK comparison is OURS, not
                        # the authors'. They measure CONFIDENTIALITY overhead; we reuse the figure
                        # to reason about verifiability. The overhead transfers (it is just the
                        # cost of running the model inside the enclave), but the paper makes no
                        # claim about verifiable computation and must not be cited as if it did.
    hardware: >-
      GPU: H100 NVL, 94 GB, rented from Azure -- confidential NCCads_H100_v5 vs non-confidential
      NCads_H100_v5, on a 40-vCPU AMD EPYC 9V84 host with 320 GiB. Ubuntu 24.04, vLLM 0.8.5.
      CPU: Intel TDX and SGX with AMX, Llama2 7B/13B/70B.
    baseline_note: >-
      NOT bare metal, and the paper says so: "As our machine is rented, we do not have access to
      bare metal and present the results for raw and Confidential GPUs (cGPU)." The GPU baseline
      is a NON-CONFIDENTIAL AZURE VM. That is arguably the right comparison for a deployment
      decision, but it is not "overhead versus raw hardware".
    benchmarks:
      - platform: H100 cGPU (GPU TEE)
        model: Llama2 7B
        overhead_percent: [4, 8]
        overhead_metric: throughput
        gpus: 1  # SINGLE GPU. This is the condition that matters most -- see scale_up_note.
        note: >-
          "throughput penalties of 4-8% that diminish as batch and input sizes grow" (Abstract);
          reproduced as the "Single resource" row of the summary table. Insight 10: "GPU TEEs
          achieve less than 10% overheads, which decreases with larger batch and input sizes."
      - platform: Intel TDX (VM TEE)
        model: Llama2 7B/13B/70B
        overhead_percent: [5, 10]
        overhead_metric: throughput
        latency_overhead_percent: 20  # abstract: "under 10% throughput and 20% latency overheads"
        note: "Summary table: ~5-10% single-resource. Latency overhead is 2x the throughput overhead and is never quoted downstream."
      - platform: Intel SGX (process TEE)
        overhead_percent: [4, 5]
        overhead_metric: throughput
      - platform: Intel TDX (VM TEE)
        workload: RAG pipeline (BM25 / reranked BM25 / SBERT, Elasticsearch, BEIR)
        overhead_percent: [6, 7]
        note: "Insight 12 -- entire RAG pipeline inside TDX lands at the same overhead as plain inference."
    scale_up_note: >-
      THE CAVEAT THAT REFRAMES THE HEADLINE, and it is the paper's own. The 4-8% is a SINGLE-GPU
      number on a model that fits on one H100. Multi-GPU confidential inference is not 4-8%:
      "As the cGPU instances do not support RDMA and GPUdirect, all data is transferred through
      the CPU, capping throughput at 3GB/s (considerably lower than the non-confidential 40GB/s)."
      That is a >13x interconnect penalty, and it hits exactly the tensor- and pipeline-parallel
      patterns any production-scale serving stack uses. The summary table grades the H100 cGPU
      "D (NVLINK unprotected)" on scale-up.
    security_gap_note: >-
      AND THE 4-8% BUYS AN INCOMPLETE TEE. "H100s do not encrypt their HBM memory [31], compared
      to CPUs that do." The summary table grades the H100 cGPU "B (HBM unencrypted)" on memory --
      WEAKER than the CPU TEEs it is being compared against. The authors expect closing that gap
      to cost more: "While B100s address these issues, we expect that they will add a
      non-negligible overhead to H100s' results, since we identified memory encryption as a
      significant cost in CPUs." Separately, network protection (IPsec) is "required on top of
      both CPUs and GPUs, which also introduces an overhead of up to 90%".
    notes: >-
      The number that frames the alternatives argument, now read from the source and standing up --
      with conditions. 4-8% is real, primary, and stated in the abstract. It is also: ONE H100,
      ONE model that fits on it (Llama2 7B), measured against a non-confidential CLOUD VM rather
      than bare metal, with GPU memory LEFT UNENCRYPTED, and excluding network protection that the
      paper says is required and costs up to 90%. Multi-GPU serving falls off a cliff (3GB/s vs
      40GB/s interconnect).
      So the honest form of the claim is narrower than "TEEs cost 4-8%": it is "a single-GPU,
      7B-class confidential deployment with unencrypted HBM costs 4-8%". That is still three
      orders of magnitude cheaper than ZK, so the strategic conclusion survives intact -- if the
      verifier will trust NVIDIA's attestation, ZK is a very expensive way to buy similar
      confidence. But the headline figure is not a general constant, it is the best corner of a
      cost surface, and the paper's own authors expect it to rise as the hardware gets more secure.
    external_context: >-
      NOT FROM THIS PAPER. The strings "Phala" and "OpenRouter" occur ZERO times in the PDF.
      MOVED OUT OF `notes` 2026-07-13: the claim that Phala's GPU TEEs are offered for inference on
      OpenRouter was sitting at the end of an otherwise entirely primary-sourced notes block, which
      is precisely how a vendor claim gets laundered into a citation -- and it duly ended up
      asserted in content/alternatives/tees.md as though this paper said it. The claim may well be
      TRUE; it is simply not this paper's. Attribute it to phala.network / openrouter.ai directly,
      or drop it.

  - id: proof-of-sampling
    name: Proof of Sampling
    title: "Proof of Sampling: A Nash Equilibrium-Based Verification Protocol for Decentralized Systems"
    url: https://arxiv.org/abs/2405.00295
    date: 2024-05-01
    year: 2024
    authors: []  # TODO
    authors_verified: false
    approach: Randomized re-execution with game-theoretic incentives
    trust_assumption: "Nash equilibrium -- rational validators. Neither cryptographic nor hardware."
    notes: "Replication-based verification. Cheapest of all, weakest guarantee."

  - id: proof-of-quality
    name: Proof of Quality
    title: "Proof of Quality: A Costless Paradigm for Trustless Generative AI Model Inference on Blockchains"
    url: https://arxiv.org/abs/2405.17934
    pdf: https://arxiv.org/pdf/2405.17934
    date: 2024-05-28
    year: 2024
    authors: [Zhenjie Zhang, Yuyang Rao, Hao Xiao, Xiaokui Xiao, Yin Yang]
    authors_verified: true
    numbers_source: primary
    approach: >-
      Outcome-based verification. Does NOT verify the computation at all. An inference node runs
      the generative model off-chain; k independent "quality assessors" each score the
      (query, response) pair with a lightweight BERT cross-encoder (nli-deberta-v3, 0.5-1.7 GB),
      commit-then-reveal their scores, and consensus aggregates them and pays out. The protocol is
      called PQML.
    trust_assumption: >-
      RATIONAL ADVERSARY + A JUDGE MODEL. Two game-theoretic theorems: Thm 1 tunes a reward
      parameter so no rational inference node profits by substituting a cheaper model; Thm 2 tunes
      another so a lazy assessor who guesses rather than computing earns less than epsilon. Neither
      is a cryptographic soundness statement. Explicitly does NOT handle assessor collusion,
      non-rational adversaries, or attacks on the cross-encoder itself.
    notes: >-
      A DIFFERENT CLAIM, not a cheaper proof of the same claim -- and the paper's framing invites
      the confusion. zkML proves "THIS committed model produced THIS output on THIS input". PoQ
      establishes "SOME model produced an output that a BERT cross-encoder scored highly". Model
      substitution -- precisely the attack zkML exists to prevent -- is not prevented here, only
      made unprofitable for a RATIONAL node by parameter tuning.
      CORRECTED 2026-07-13 -- the previous note said "The authors concede that a cheaper model
      whose output is good enough is rewarded equally." They concede no such thing; they claim the
      OPPOSITE, and it is their central design goal. Sec 3.3: the reward function is built so that
      "the node owner would not make more earnings by replacing F with a less powerful F'", and
      Theorem 1 gives a threshold on alpha above which "there is no motivation for inference nodes
      to deploy less accurate models from an economical perspective." The guarantee is ECONOMIC
      and it rests on Hypothesis 1 (all adversaries are rational) and Hypothesis 2 ("There is no
      domination in the model market") -- which ASSUMES the gap away rather than conceding it. It
      is not soundness, but it is not a concession either. (Note also that Theorem 1's printed
      statement -- "the inference node would always choose the most affordable model in the list"
      -- contradicts its own proof and Sec 3.3; that looks like a typo in the paper.)
      THE NUMBER THAT MATTERS, and it is theirs: Table 3 gives the Pearson correlation between the
      cross-encoder score and GPT-4 ground-truth quality across five models as -0.06 to 0.35
      (GPT3.5 0.12, GPT4 0.13, Mistral-7B 0.28, Mixtral-8x7b 0.35, Llama3-70b -0.06). On
      Llama3-70b the judge is ANTI-CORRELATED with the thing it is judging. The previously recorded
      range "0.12-0.35" silently dropped the negative value. The authors' own reading, verbatim
      (Sec 6.1) -- the cross-encoder "is capable of capturing the missing of information in the
      generative AI output. It is unable to identify the subtle difference on the accuracy of the
      information itself." (The earlier paraphrase "subtle differences on accuracy" was quoted as
      if verbatim and is not.) A verification scheme is only as sound as its verifier.
      Note the name: despite "Proof of", nothing is proven. No proof object, no soundness error,
      no extractor -- it is mechanism design plus a statistical judge. Filed under alternatives
      rather than inference for exactly that reason.
      Cost is the genuine contribution, and it is near-zero -- but READ TABLE 2 CAREFULLY. Its
      latencies (0.12-0.61 s on A100, 3.7-20.5 s on CPU) are BATCH latencies for 1,000
      query-response pairs, not per-assessment costs: "The latency is the average waiting time in
      seconds when processing a batch containing 1,000 query-response pairs because batch
      processing is way more efficient than processing one pair at a time." PER ASSESSMENT that is
      ~0.12-0.6 MILLISECONDS on an A100 and ~4-21 ms on CPU (throughput 1,666-8,256/s GPU,
      48-241/s CPU) -- the figures previously recorded here were off by ~1000x as per-assessment
      costs. Consensus settles at ~50 ms regardless of k = 1..30 assessors (Fig 5). Evaluated on
      100 SQuAD questions against GPT-3.5/4-turbo, Mistral-7B, Mixtral-8x7B and Llama3-70B.
      Admitted limits: a single inference node only, NLP only (no image generation), and the
      cross-encoders are off-the-shelf document-search models not trained for this task.
      Useful to this SoK as the far endpoint of the trust spectrum: the point where you stop
      verifying the computation entirely and start verifying the OUTPUT. Everything else on the
      alternatives page still checks, samples, or re-executes the actual inference.

# ============================================================================
# SAMPLING-BASED / STATISTICAL VERIFICATION
#
# A distinct line of work that sits BETWEEN full zkML and the no-proof alternatives. It does
# use cryptographic commitments, but instead of proving the whole computation it commits to the
# execution trace and OPENS ONLY A RANDOM SAMPLE. That deliberately TRADES SOUNDNESS FOR SPEED:
# security is statistical + game-theoretic (a cheating prover is caught with some probability
# and penalized), not the ~2^-100 cryptographic soundness of the zkML sections.
#
# DO NOT plot these next to zkML proving times as if they were the same guarantee. A
# millisecond "proof" that catches a cheater 90% of the time is not comparable to a 22-second
# proof that catches one with overwhelming probability. The right comparison axis is
# (cost) x (detection probability x penalty), not cost alone.
#
# This line has ancestry already in this file: VeriML (training) challenges random iterations;
# Proof of Sampling (alternatives_to_zk) re-executes under a Nash-equilibrium incentive. The
# 2026 entry below is the first to apply trace-sampling to LLM/DNN INFERENCE.
# ============================================================================

sampling_based_verification:
  - id: lightweight-sampling-inference
    name: Lightweight Sampling Proofs of Inference
    title: "Towards Verifiable AI with Lightweight Cryptographic Proofs of Inference"
    url: https://eprint.iacr.org/2026/541
    pdf: https://eprint.iacr.org/2026/541.pdf
    arxiv: https://arxiv.org/abs/2603.19025
    venue: IACR ePrint 2026/541
    date: 2026-03-17
    year: 2026
    authors: [Pranay Anchuri, Matteo Campanelli, Paul Cesaretti, Rosario Gennaro, Tushar M. Jois, Hasan S. Kayman, Tugce Ozdemir]
    authors_verified: true
    objectives: [inference]
    approach: >-
      Prover commits to the inference execution trace via Merkle-tree vector commitments, then
      reveals only sampled entries along random paths from output back to input. No full proof
      is generated.
    trust_assumption: >-
      Statistical + game-theoretic. Explicitly "trades soundness for efficiency." Security rests
      on trace separation between functionally dissimilar models plus a RATIONAL prover who
      faces penalties on detection. Detection probability amplifies under repeated queries.
      This is NOT cryptographic soundness.
    security_model_flag: >-
      IMPORTANT: not comparable to the zkML sections' soundness. A dishonest prover can pass
      with non-negligible probability on any single query; the guarantee is amortized over
      many queries plus economic penalty. Right fit for auditing / large-scale MLaaS, wrong
      fit for a one-shot on-chain settlement.
    numbers_source: primary
    performance:
      claim: "Proving time from the order of MINUTES (zkML) to the order of MILLISECONDS."
      concrete_numbers: null  # abstract gives the orders-of-magnitude claim; exact ms not extracted from accessible text
    benchmarks:
      - model: ResNet-18
        note: "Adversarial evasion (gradient-descent reconstruction, inverse transforms, logit swapping) failed to escape detection."
      - model: Llama-2 7B
        params: 7000000000
        note: "Same adversarial strategies tested; detection held."
    adversaries_tested: [gradient-descent reconstruction, inverse transforms, logit swapping]
    notes: >-
      The first trace-sampling scheme aimed at LLM/DNN inference. Positions itself against
      zkML's >1000x prover overhead. Because the security model is statistical, the interesting
      audit question is the concrete detection probability as a function of how many trace
      paths are opened, and how a rational prover optimizes against it -- neither of which is a
      cryptographic-soundness argument. Authors overlap the SNARK world (Campanelli, Gennaro),
      so the cryptographic framing is deliberate, not naive.
    related:
      - veriml            # training-side ancestor: challenge random iterations
      - proof-of-sampling # game-theoretic re-execution
      - zkml-survey       # its Table VII lists VeriML/zkMLaaS as "sampling" verifiable training

# ============================================================================
# PROVING PROPERTIES, NOT COMPUTATION
#
# A fourth verification objective the ZKP-VML survey's taxonomy misses. Inference/testing/
# training all prove that a COMPUTATION was performed correctly. These prove that a MODEL (or
# its training data) has some PROPERTY -- fairness, provenance, absence of censorship --
# while keeping the model confidential. Increasingly the compliance-driven use case (EU AI Act).
# ============================================================================

proving_properties:
  - id: fairproof
    name: FairProof
    title: "FairProof: Confidential and Certifiable Fairness for Neural Networks"
    url: https://arxiv.org/abs/2402.12572
    venue: ICML 2024
    date: 2024-02-19
    year: 2024
    authors: [Chhavi Yadav, Amrita Roy Chowdhury, Dan Boneh, Kamalika Chaudhuri]
    authors_verified: true
    property_proven: Local fairness certificate for fully-connected neural networks
    proof_system: Gnark
    open_source: true
    numbers_source: primary
    notes: >-
      Publicly verify a model is fair while keeping weights confidential. Author web worth
      noting: Roy Chowdhury also wrote EIFFeL, and Boneh co-authored Prio -- the same people
      keep appearing across the verifiable-FL and property-proving clusters.

  - id: fairzk
    name: FairZK
    title: "FairZK: A Scalable System to Prove Machine Learning Fairness in Zero-Knowledge"
    url: https://arxiv.org/abs/2505.07997
    venue: IEEE S&P 2025
    date: 2025-05-12
    year: 2025
    authors: [Tianyu Zhang, Shen Dong, O. Deniz Kose, Yanning Shen, Yupeng Zhang]
    authors_verified: true
    affiliation: UIUC / UC Irvine / Shanghai Jiao Tong
    property_proven: Group fairness of logistic regression and DNNs
    numbers_source: primary
    notes: >-
      The scalability unlock: derives fairness bounds from MODEL PARAMETERS plus aggregated
      input statistics, rather than by proving inference over a specific dataset. That is why
      it reaches 47M params where inference-based fairness proofs cannot. Yupeng Zhang also
      co-authored zkCNN and DeepProve.
    benchmarks:
      - model: DNN
        params: 47000000
        proving_time_s: 343.0
        speedup_vs_prior: [3.1, 1789]
        note: "First system to prove fairness at 47M parameters."

  - id: oath
    name: OATH
    title: "Secure and Confidential Certificates of Online Fairness (OATH)"
    url: https://arxiv.org/abs/2410.02777
    date: 2024-10-03
    year: 2024
    authors: [Olive Franzese]  # TODO: full list
    authors_verified: false
    property_proven: Online group fairness w.r.t. demographic variables (sex, race, location), under distribution shift and provider malfeasance
    approach: Cut-and-choose protocol exploiting statistical properties of group fairness; uses a ZK proof of correct inference as a subroutine
    notes: >-
      Sometimes cited under the title "OATH: Efficient and Flexible Zero-Knowledge Proofs of
      End-to-End ML Fairness". Composes with the inference systems in this repo rather than
      replacing them.

  - id: zkaudit
    name: zkAudit
    title: "Trustless Audits without Revealing Data or Models"
    url: https://arxiv.org/abs/2404.04500
    venue: ICML 2024
    date: 2024-04-06
    year: 2024
    authors: [Suppakit Waiwitlikhit, Ion Stoica, Yi Sun, Tatsunori Hashimoto, Daniel Kang]
    authors_verified: true
    property_proven: Arbitrary user-defined properties of hidden weights and hidden training data
    objectives: [training, properties]
    numbers_source: primary
    notes: >-
      Two phases. ZKAudit-T proves the model was trained by SGD on a committed dataset -- that
      is a zkPoT, and cross-lists into the `training:` section. ZKAudit-I then audits arbitrary
      properties over the hidden data and weights. Supports copyright, censorship-detection and
      counterfactual audits with little to no accuracy loss. Weights stay secret but the
      ARCHITECTURE is public -- relevant to the Fiat-Shamir open question above, since pinning
      the architecture is exactly the mitigation.
    benchmarks:
      - models: [recommender systems, ImageNet-scale image classifiers]
        note: "Specific per-model timings not extracted."

  - id: zk-software-auditing
    name: "Show Me You Comply"
    title: "\"Show Me You Comply...Without Showing Me Anything\": Zero-Knowledge Software Auditing for AI-Enabled Systems"
    url: https://arxiv.org/abs/2510.26576
    date: 2025-10-30
    year: 2025
    authors: []  # TODO
    authors_verified: false
    property_proven: Regulatory compliance of AI-enabled systems (EU AI Act framing)
    notes: "Audits the SYSTEM, not just the model. Not yet read."

  - id: e2e-ai-pipeline-verifiability
    name: Cryptographic Verifiability of E2E AI Pipelines
    title: "A Framework for Cryptographic Verifiability of End-to-End AI Pipelines"
    url: https://arxiv.org/abs/2503.22573
    date: 2025-03-28
    year: 2025
    authors: []  # TODO
    authors_verified: false
    notes: "Frames data ingestion -> training -> inference as one verifiable pipeline. Not yet read."

  # See also, in other sections: ZKPROV and Verifiable Fine-Tuning (dataset provenance),
  # and zkDT / zkCNN / ZEN accuracy proofs (the `testing:` objective).

# Cross-cutting / not a system paper
surveys:
  - id: zkml-survey
    name: ZKP-VML Survey
    title: "A Survey of Zero-Knowledge Proof Based Verifiable Machine Learning"
    url: https://arxiv.org/abs/2502.18535
    pdf: https://arxiv.org/pdf/2502.18535
    venue: arXiv:2502.18535 / Artificial Intelligence Review
    date: 2025-02-25
    year: 2025
    authors: [Zhizhi Peng, Chonghe Zhao, Taotao Wang, Guofu Liao, Zibin Lin, Yifeng Liu, Bin Cao, Long Shi, Qing Yang, Shengli Zhang]
    authors_verified: true
    covers: [inference, testing, training]
    notes: >-
      Survey, not a system. No original benchmarks -- do not plot. Its Table VII
      ("Classification of representative ZKML systems by verification objective") CLASSIFIES 30
      systems (2017.6 SafetyNets -> 2025.08 VeriLoRA) by Training / Testing / Inference, with Date
      and Model columns. The TIMELINE is Figure 6, not Table VII -- CORRECTED 2026-07-13; the two
      were fused, and content/surveys/index.md and content/papers/zkml-survey.md inherit the
      error. Tables IV, V and VI give proving time / verification time / proof size for training,
      testing and inference systems respectively, each with the hardware used. This file's
      `numbers_source: survey` entries are drawn from those tables.

  - id: zkp-decentralized-ml-survey
    name: Decentralized ZKML Survey
    title: "Zero-Knowledge Proof-based Verifiable Decentralized Machine Learning in Communication Network: A Comprehensive Survey"
    url: https://arxiv.org/abs/2310.14848
    date: 2023-10-23
    year: 2023
    authors: []
    authors_verified: false
    notes: "Complementary survey, focused on decentralized/federated settings."

  - id: icme-definitive-guide
    name: "The Definitive Guide to ZKML (2025)"
    title: "The Definitive Guide to ZKML (2025)"
    url: https://blog.icme.io/the-definitive-guide-to-zkml-2025/
    venue: ICME Labs blog
    date: 2025-11-05
    year: 2025
    authors: [Wyatt Benno]
    authors_verified: true
    partisan: true  # Benno is a Jolt Atlas co-author; treat comparative claims as interested
    notes: >-
      Landscape blog, NOT a peer-reviewed source, and written by a Jolt Atlas author -- so its
      head-to-head claims favour Jolt Atlas and should be attributed, not stated as fact. Useful
      for: (1) the overhead-progression framing "1,000,000x -> 100,000x -> 10,000x"; (2)
      secondhand ZKTorch LLM numbers (GPT-J 20 min, GPT-2 10 min on 64 threads); (3) its own
      characterisations -- Jolt Atlas "4x-7x faster than anything prior (all before using GPU)",
      DeepProve "54-158x faster than EZKL" and "not likely privacy preserving", EZKL "65x faster
      than RISC Zero". Numbers taken from here are tagged provenance: "ICME blog (partisan)".

  - id: modulus-cost-of-intelligence
    name: "The Cost of Intelligence"
    title: "The Cost of Intelligence: Proving Machine Learning Inference with Zero-Knowledge"
    url: https://eprint.iacr.org/2026/1063
    pdf: https://eprint.iacr.org/2026/1063.pdf
    venue: "Modulus Labs whitepaper v1.2 (eprint 2026/1063)"
    date: 2023-01-31  # written Jan 2023; eprint number assigned 2026
    year: 2023
    authors: [Ryan Cao, Nick Cosby, Vishruti Ganesh, Ende Shen, Daniel Shorr, Benjamin Wilson]
    authors_verified: true
    kind: benchmark  # a proof-SYSTEM comparison, not an ML-proving framework and not an LLM prover
    covers: [inference]
    notes: >-
      NOT an LLM prover and NOT plottable on the LLM throughput graph -- excluded on purpose.
      Two reasons: (1) it benchmarks MLPs (500k-18M params, 275M-22B mult-adds, 10-500 layers),
      no transformers, no tokens; (2) it compares proof BACKENDS (Groth16, Gemini, Winterfell
      via Cairo, Halo2, Plonky2, zkCNN), a different axis from this file's ML-proving frameworks
      (DeepProve/zkLLM/...). Hardware: AMD EPYC 7R32 (c4ad.16xlarge), 128 GB RAM. Findings:
      Plonky2 is the fastest prover (~5x Halo2 on the largest MLP) via FRI + Goldilocks, but
      ~2x the peak memory; GKR-based zkCNN scales best on both time and memory even unoptimized;
      Plonky2 recursive proofs ~70 kB at ~100-bit security. Motivates Modulus's "Remainder"
      system. Useful as a proof-backend scaling reference and for the zkCNN cross-check, not as
      a data point in the LLM comparison. Written 2023-01; the 2026 eprint number is recent.
to_review:
