# ============================================================================
# ADJACENT TRUST MODELS -- verifiable/private training WITHOUT zk-SNARK-style proofs.
#
# These are NOT zkPoT systems and their numbers must never be plotted on the same axes as
# the `training:` section above. A zkPoT proving time answers "how long to produce a succinct
# proof a stranger can check"; the runtimes here answer "how long does one round of encrypted
# aggregation take". Different quantity, different threat model, different verifier.
#
# Two clusters, separated because their guarantees differ sharply:
#   verifiable_federated_learning -- prove PROPERTIES of client updates (norm bounds,
#     well-formedness), or prove the aggregator aggregated honestly. Nobody proves that
#     gradient descent was executed correctly. Several DO use real ZK proofs.
#   private_training_no_proofs -- hide the data during training (MPC/HE). No verifiability
#     at all: a malicious party can still compute the wrong thing, silently.
# ============================================================================

verifiable_federated_learning:
  - id: rofl
    name: RoFL
    title: "RoFL: Attestable Robustness for Secure Federated Learning"
    url: https://arxiv.org/abs/2107.03311
    venue: IEEE S&P 2023
    date: 2021-07-07
    year: 2023
    authors: [Lukas Burkhalter, Hidde Lycklama, Alexander Viand, Nicolas Küchler, Anwar Hithnawi]
    authors_verified: true
    uses_zk: true
    primitive: Zero-knowledge proofs (norm bounds, e.g. L2/Linf) over commitments to encrypted updates
    repo: https://github.com/pps-lab/rofl-project-code
    what_is_proven: "Each client's update satisfies declared constraints -- NOT that the update came from correct training."
    notes: >-
      Same group as Artemis (Lycklama, Viand, Küchler, Hithnawi). Requires a commitment per
      vector entry, so communication overhead is substantial -- the recurring cost of
      ZK-over-secure-aggregation.

  - id: acorn
    name: ACORN
    title: "ACORN: Input Validation for Secure Aggregation"
    url: https://eprint.iacr.org/2022/1461
    pdf: https://www.usenix.org/system/files/usenixsecurity23-bell.pdf  # eprint PDF is Cloudflare-blocked
    venue: USENIX Security 2023
    numbers_source: primary  # read the USENIX PDF 2026-07-11. The 2-8x figure IS in the paper --
                             # but it was attached to the WRONG contribution here. See below.
    date: 2022-10-24
    year: 2023
    authors: [James Bell, Adrià Gascón, Tancrède Lepoint, Baiyu Li, Sarah Meiklejohn, Mariana Raykova, Cathie Yun]
    authors_verified: true
    uses_zk: true
    primitive: Zero-knowledge input validation over a secure-aggregation protocol
    what_is_proven: "Client inputs satisfy L0 / L2 / Linf bounds."
    architecture: >-
      THREE protocols, and keeping them apart is the whole point of this entry.
      (1) RLWE-SecAgg -- a new secure-aggregation protocol using a lattice-based input encoding
      instead of Bell et al.'s PRG-based one. Cuts client work from O(l log n) to O(l + log n).
      NO ZERO-KNOWLEDGE IS INVOLVED.
      (2) ACORN-detect -- RLWE-SecAgg plus ZK input validation; malformed inputs are detected.
      (3) ACORN-robust -- additionally removes malformed inputs and completes the aggregation.
      The ZK contribution is a new logarithmic-proof-size argument for an L-infinity bound on a
      vector held in a constant-size commitment.
    benchmarks:
      # PROVENANCE CORRECTION (2026-07-11). The 2-8x was previously recorded here as if it were a
      # cost of the zero-knowledge input validation. IT IS NOT. It is the speedup of the
      # NON-ZK base protocol (RLWE-SecAgg) over Bell et al.'s PRG-SecAgg, from swapping the input
      # encoding. It says nothing about what the ZK validation costs.
      - component: RLWE-SecAgg (base protocol, NO input validation)
        speedup_vs_bell_ccs20: [2, 8]
        speedup_metric: client computation
        note: >-
          Abstract: "it results in 2-8X speedups in client computation in practical scenarios."
          Sec. 6: "roughly up to 5x speedup in the FA setting for l >= 2^15, and up to more than
          8x speedup in the FL setting." The range spans the two settings, not a spread within one.
      # These are the numbers that actually describe the ZERO-KNOWLEDGE contribution:
      - component: ACORN-detect (ZK input validation)
        client_proving_time_s: 80
        client_proving_time_note: >-
          "in under 80 seconds, a client running ACORN-detect on a standard laptop can (1) show
          k-hotness of a binary input of length 1M, or (2) show that a dense vector of length 250K
          has its L-infinity norm bounded by 2^16" (Sec. 1.1). Upper bound, standard laptop.
        communication_overhead_vs_unvalidated: 0.1  # i.e. +10% over non-validated secure aggregation
        communication_improvement_vs_prior_zk: 30   # ">30X in terms of client communication"
        note: "Abstract: input validation 'improves on prior work by more than 30X in terms of client communication (with comparable computation costs)'."
      - component: end-to-end (four real-world FL/FA tasks)
        bandwidth_overhead_factor: 1.05  # "a bandwidth overhead of at most 1.05X"
    notes: >-
      The cheapest ZK input validation in this cell, and the reason is worth internalising: the
      ZK proof is bolted onto a secure-aggregation protocol whose encoding was ALREADY chosen to
      make the proof cheap. The ~10% communication overhead for validation is what everyone else
      in this section pays double digits for (see the Table 1 comparison against RoFL and EIFFeL).
      Author overlap with Optimum Vicinity (Gascón, Meiklejohn, Raykova) -- the same Google group
      works both the zkPoT and secure-aggregation sides.

  - id: eiffel
    name: EIFFeL
    title: "EIFFeL: Ensuring Integrity for Federated Learning"
    url: https://arxiv.org/abs/2112.12727
    pdf: https://arxiv.org/pdf/2112.12727
    venue: ACM CCS 2022
    numbers_source: primary  # read the arXiv PDF 2026-07-11. The 2.4s figure IS in the paper --
                             # abstract, Sec. 1, and Table 2 (2,367 ms). But it was mislabelled as
                             # a proving time and was missing the one condition that decides
                             # whether it means anything: d = 1000. See below.
    date: 2021-12-23
    year: 2022
    authors: [Amrita Roy Chowdhury, Chuan Guo, Somesh Jha, Laurens van der Maaten]
    authors_verified: true
    affiliation: UW-Madison / Meta AI
    uses_zk: true
    primitive: Secret-shared non-interactive proofs (SNIP-style) + Shamir secret sharing; clients act as verifiers
    what_is_proven: "An arbitrary public validation predicate holds on each update; malformed updates are removed from the aggregate."
    complexity: "O(m*n*d) client AND server computation -- QUADRATIC in the client count n (since the malicious count m is a fixed fraction of n) and LINEAR in the update dimension d."
    benchmarks:
      # PROVENANCE CORRECTION (2026-07-11). Two problems with the previous record:
      #   (1) 2.4s was tagged `proving_time_s`. It is NOT a proving time -- it is the END-TO-END
      #       per-iteration wall clock, including client compute, server compute AND network
      #       latency (Sec. 6, Table 2). The client's own runtime at this configuration is 1.3s.
      #   (2) `d` was missing entirely. d is the update dimensionality, cost is LINEAR in it, and
      #       the benchmarked value is 1000 -- a thousand-parameter "MNIST classifier". Without d,
      #       the 2.4s is not interpretable.
      - model: MNIST classifier
        update_dimension: 1000       # d = 1K. THE missing condition. Cost is linear in d.
        clients: 100                 # n = 100. Cost is QUADRATIC in n.
        poisoning_rate: 0.10         # m = 10%
        end_to_end_time_s: 2.4       # Table 2: 2,367 ms. Client + server + communication latency.
        client_time_s: 1.3           # Sec. 6, Computation Costs -- the client's own share.
        server_time_s: 1.0
        accuracy_note: "matches the accuracy of a non-poisoned federated learner"
        note: >-
          Abstract: "with 100 clients and 10% poisoning, EIFFeL can train an MNIST classification
          model to the same accuracy as that of a non-poisoned federated learner in just 2.4s per
          iteration." Confirmed in Table 2 (n=100, d=1K, m=10%: 2,367 ms).
    scaling_note: >-
      THE HEADLINE DOES NOT SURVIVE SCALE, and Table 2 says so. End-to-end time per iteration at
      d=1000, m=10%, by client count: n=50 -> 1,072 ms; n=100 -> 2,367 ms; n=150 -> 4,326 ms;
      n=200 -> 6,996 ms; n=250 -> 10,389 ms. That is quadratic, and it stops at 250 clients.
      In d it is linear and the paper states the slope directly: a client takes ~1.3s at d=1K but
      "around 11s when d = 10K".
      So "2.4s per iteration" describes n=100 clients and a 1,000-parameter model. Real federated
      learning runs thousands to millions of clients over models with 10^5 to 10^9 parameters --
      several orders of magnitude beyond the benchmark on BOTH axes, with cost quadratic in one
      and linear in the other. The number is true, primary, and should never be quoted without d.
    notes: >-
      Solves the core tension: secure aggregation masks updates, which is exactly what stops you
      checking they are well-formed. Its distinguishing move against Prio is that it needs no
      honest-server assumption -- "This is different from Prio [28] (the original SNIP deployment
      setting) that rely on multiple honest servers to perform verification" -- the CLIENTS act as
      the verifiers, on secret shares of each other's proofs.
      Soundness error is dominated by SNIP's 2M-2/|F| with M < 4d < 40K in the evaluation, giving
      a rejection probability on the order of 10^-12.

