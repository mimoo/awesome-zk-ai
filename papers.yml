# ============================================================================
# SOUNDNESS & ATTACKS
#
# The systems above are only as good as the arguments underneath them. This section tracks
# what is known to break, and what has not been checked. Nothing here is a demonstrated break
# of a deployed zkML system -- but the gap between "no known break" and "analyzed" is where
# audit work lives. Entries carry `status:` to keep that distinction sharp:
#   proven_attack        -- a working attack exists against the stated protocol class
#   implementation_bug   -- a real bug found in real code, now fixed
#   open_question        -- plausible attack surface, NOT demonstrated. Do not cite as a break.
# ============================================================================

soundness_and_attacks:
  - id: fiat-shamir-gkr-attack
    name: Fiat-Shamir attacks on GKR
    title: "How to Prove False Statements: Practical Attacks on Fiat-Shamir"
    url: https://eprint.iacr.org/2025/118
    venue: CRYPTO 2025
    date: 2025-01-24
    year: 2025
    authors: [Dmitry Khovratovich, Ron Rothblum, Lev Soukhanov]
    authors_verified: true
    status: proven_attack
    target: "The GKR protocol compiled to a non-interactive succinct argument via Fiat-Shamir, for non-deterministic bounded-depth computation."
    what_breaks: >-
      Two attacks. (1) Adaptive: for a specific circuit, produce accepting proofs of FALSE
      statements. (2) Functional equivalence: given any circuit C and any output y, construct a
      functionally equivalent circuit C* for which an accepting proof that C* outputs y can be
      produced -- regardless of whether it is true.
    caveats: >-
      CRITICAL, do not overclaim. The attack requires the ATTACKER to choose or modify the
      circuit. The paper explicitly states security depends on "the specific implementation of
      the circuit C, rather than just its functionality", and that the attack does NOT apply to
      fixed, honestly-chosen circuits in standard deployments. Non-adaptive variants need either
      very large depth or additional assumptions on the underlying primitives. This is a
      theoretical vulnerability, not a demonstrated break of any deployed zkML system.
    affects_in_this_repo:
      # Every one of these uses GKR / sum-check made non-interactive with Fiat-Shamir.
      - zkgpt        # GKR + sumcheck + Fiat-Shamir, Hyrax/BN254
      - deepprove    # sum-check + lookups
      - zkpytorch    # Expander (GKR)
      - zkcnn        # GKR + sumcheck
      - zkllm        # sum-check + tlookup
      - spagkr       # GKR / sumcheck
      - kaizen       # recursive GKR-style proofs (training)
    open_question: >-
      In MLaaS the prover IS the model owner, and the model IS the circuit. If a deployment
      commits to WEIGHTS but does not independently pin the ARCHITECTURE, the
      functional-equivalence attack is structurally close to the model-substitution threat that
      NANOZK and DeepProve exist to prevent. Whether any specific system here is inside or
      outside the attack's precondition has NOT been analyzed. That analysis is the single
      highest-value open item in this repo.

  - id: halo2-query-collision
    name: Halo2 query collision
    title: "Uncovering the Query Collision Bug in Halo2: How a Single Extra Query Breaks Soundness"
    url: https://blog.zksecurity.xyz/posts/halo2-query-collision/
    venue: zkSecurity blog
    date: 2025-07-09
    year: 2025
    authors: [Suneal Gong]
    authors_verified: true
    status: implementation_bug
    target: "Halo2's multipoint opening argument"
    what_breaks: >-
      When the same polynomial is queried at the same evaluation point more than once, one of
      the evaluations is silently ignored during multi-opening. A malicious prover can adjust
      witness values to forge evaluations and pass verification. Root cause is domain wrapping:
      with 2^k rows, Rotation(0) and Rotation(2^k) denote the same point but are not
      deduplicated by the frontend, so the collision goes undetected.
    affected: [Zcash halo2, PSE fork, Axiom, ezkl]
    affects_in_this_repo:
      - ezkl         # halo2 backend -- the baseline Jolt Atlas and NANOZK benchmark against
      - zkml-kang    # halo2 (Plonkish)
    resolution: "Disclosed to Zcash, PSE, Axiom and ezkl. Zcash's fix detects query collisions and rejects proofs with conflicting values at the same point. No production deployments reported compromised."
    notes: >-
      The concrete reminder that zkML inherits every soundness bug of its backend. Two systems
      in this repo's inference tables sit on halo2.

  - id: snark-vuln-sok
    name: "SoK: SNARK vulnerabilities"
    title: "SoK: What don't we know? Understanding Security Vulnerabilities in SNARKs"
    url: https://arxiv.org/abs/2402.15293
    venue: arXiv:2402.15293
    date: 2024-02-23
    year: 2024
    authors: [Stefanos Chaliasos, Jens Ernstberger, David Theodore, David Wong, Mohammad Jahanara, Benjamin Livshits]
    authors_verified: true
    status: taxonomy
    notes: >-
      Taxonomy built from 141 real SNARK vulnerabilities. The headline lesson for this repo:
      what is "proven correct" on paper routinely fails in implementation, and
      under-constrained circuits are the most common and most severe class. Any zkML system
      here is a circuit, and therefore in scope.

  - id: zkp-vuln-auditing
    name: ZKP Vulnerability Analysis and Security Auditing
    title: "Zero-Knowledge Proof Vulnerability Analysis and Security Auditing"
    url: https://eprint.iacr.org/2024/514
    venue: IACR ePrint 2024/514
    date: 2024-04-01
    year: 2024
    authors: []  # TODO
    authors_verified: false
    status: taxonomy
    notes: "Companion taxonomy. Not yet read."

  - id: zkboost-prior-vuln
    name: ZKBoost's fix to prior zkPoT
    title: "ZKBoost: Zero-Knowledge Verifiable Training for XGBoost"
    url: https://eprint.iacr.org/2026/202
    date: 2026-02-08
    year: 2026
    status: proven_attack
    what_breaks: "The paper states its VOLE-based instantiation 'resolves security vulnerabilities in prior zero-knowledge training proofs'. The specific prior protocol and the nature of the vulnerability have NOT been extracted -- read the paper."
    cross_reference: zkboost
    notes: "Evidence that the zkPoT literature already has at least one real soundness break in it. Worth chasing down: which protocol, and is it in our training table?"

  - id: quantization-soundness-surface
    name: Quantization as an audit surface
    title: "(no paper -- our own observation)"
    status: open_question
    authors: []
    notes: >-
      NOT A PAPER AND NOT A KNOWN BUG. Flagged as an audit surface only. Quantized zkML shifts
      correctness onto range checks and lookup arguments: zkGPT's "result-as-witness" paradigm
      has the prover supply the result of Softmax/LayerNorm/GeLU as a witness and then prove it
      lies in range. Soundness therefore rests entirely on those range constraints being
      complete. An under-constrained range check in a result-as-witness design would let a
      prover assert an arbitrary non-linear output. Combined with the SoK finding that
      under-constrained circuits are the most common SNARK bug class, this is where we would
      look first in an audit. No such bug is known in any system listed here.

# ============================================================================
# ALTERNATIVES TO ZERO KNOWLEDGE
#
# zkML carries >1000x overhead vs plain inference. These are the competing answers to
# "how do I trust a model I did not run". Recording them keeps the repo honest: ZK buys
# public verifiability with no hardware trust, and for many deployments that is not worth
# 1000x. Compare on the `trust_assumption` field, not on speed.
# ============================================================================

alternatives_to_zk:
  - id: opml
    name: opML
    title: "opML: Optimistic Machine Learning on Blockchain"
    url: https://arxiv.org/abs/2401.17555
    venue: arXiv:2401.17555
    date: 2024-01-31
    year: 2024
    authors: [KD Conway, Cathie So, Xiaohang Yu, Kartin Wong]
    authors_verified: true
    affiliation: Hyper Oracle
    approach: Interactive fraud proofs, optimistic-rollup style
    trust_assumption: "AnyTrust -- any ONE honest validator can force correct behavior. Economic + game-theoretic, not cryptographic."
    numbers_source: primary
    notes: >-
      The strongest argument against zkML as a default. Runs 7B-LLaMA on a standard PC with no
      GPU, because it never generates a proof unless challenged. Cites zkML at >1000x overhead
      vs plain computation. The tradeoff is latency-to-finality (a challenge period must
      elapse) and a weaker, economic security model. Note the inversion: when the model is
      large enough that zk proving exceeds the challenge period, opML reaches finality FIRST.
    tradeoff_vs_zk: >-
      Loses: public verifiability without watching the chain, privacy of model/inputs,
      non-interactivity. Wins: ~1000x cost, no trusted setup, runs on commodity hardware.

  - id: opp-ai
