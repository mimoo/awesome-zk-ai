# Citation/dependency graph, built by scanning the PDFs in references/ with pdftotext.
# edge A -> B  means: paper A's text mentions/cites B.
# Proxy: a mention anywhere in A (body or reference list). Not hand-verified.
# Regenerate: python3 site/citegraph.py --write
citations:
  # Hand-verified against the bibliographies, 2026-07-11. All three edges stay inside the
  # federated (verify-train) column -- ACORN and EIFFeL cite each other, RoFL and Prio, and
  # nothing in the privacy column. No crossing edge introduced.
  acorn:
    - eiffel   # "[14] ... EIFFeL: Ensuring Integrity for Federated Learning"
    - prio     # "[15] H. Corrigan-Gibbs and D. Boneh. 'Prio: Private, Robust, and Scalable...'"
    - rofl     # "[33] ... 'RoFL: Attestable Robustness for Secure Federated Learning'"
  eiffel:
    - prio     # "[28] Henry Corrigan-Gibbs and Dan Boneh. Prio: Private, robust, and scalable..."
    - rofl     # "[23] ... Table 3 compares EIFFeL with prior work ... RoFL"
  # tee-confidential-llm cites NOTHING in this corpus. Verified: the strings "zero-knowledge",
  # "zkML", "SNARK" and "proof of" appear zero times in it. (A grep hit on "Prio" was the word
  # "Prior".) Deliberately absent from this graph rather than silently omitted.
  # Bionetta, hand-verified against its bibliography and a full-text scan of the PDF, 2026-07-11.
  # It cites the six zkML systems it benchmarks against, plus GKR and Lasso as building blocks.
  # It cites NOTHING from the privacy column and NOTHING from the numerics shelf -- confirmed by
  # counting occurrences in `pdftotext` output: "MPC" 0, "homomorphic" 0, "SIRNN" 0, "Cheetah" 0,
  # "SecFloat" 0, "ZKLP" 0, "Mystique" 0. It nonetheless derives a fixed-point quantization error
  # bound from first principles in its Appendix C, which is precisely the subject matter of the
  # papers it does not cite. Another node at the centre of the verifiability column that reaches
  # into none of the arithmetic literature. No crossing edge introduced.
  bionetta:
    - deepprove   # "[Lab25a] Lagrange Labs. deep-prove"; benchmarked in Fig. 6
    - ezkl        # "[Sou+24] Tobin South et al."; benchmarked in Table 4
    - gkr         # "[GKR15] Goldwasser, Kalai, Rothblum"
    - lasso       # "[STW24] Setty, Thaler, Wahby. Unlocking the Lookup Singularity with Lasso"
    - zkcnn       # "[LXZ21]"; benchmarked in Table 4
    - zkgpt       # "[Qu+] zkGPT ... USENIX Security 2025"; complexity comparison, Table 2
    - zkml-kang   # "[Che+24] ZKML: An Optimizing System..."; benchmarked in Table 4
    - zkpytorch   # "[Xie+25]"; "look forward to testing it in the future, yet currently it is
                  # not available for public use (as of December 2025)"
  # ---------------------------------------------------------------------------------------
  # THE TWO CROSSING EDGES. Read this before you believe the headline.
  #
  # Adding cheetah and delphi as first-class papers (2026-07-13) creates the first edges in
  # this corpus that cross between the verifiability and privacy columns. validate.py's
  # tripwire will fire. It is SUPPOSED to fire. Here is the human look it demands.
  #
  # Neither edge is a cryptographic citation. Both are about NUMERICS, which is exactly what
  # the bridge page predicts, and the second one is a better piece of evidence for the thesis
  # than the absence it replaces.
  #
  #   1. hao-et-al -> cheetah  (verify -> privacy)
  #      BIBLIOGRAPHY ONLY. Cheetah is reference [30] and appears ZERO times in hao-et-al's
  #      body. Contrast SIRNN, reference [47], which appears FIVE times in the body and is
  #      load-bearing (digit decomposition, the exponential protocol, and the Goldschmidt
  #      initial approximation). hao-et-al is also the one verifiability paper that proves
  #      OPERATORS rather than models -- already flagged on the bridge page as an edge case.
  #
  #   2. delphi -> safetynets  (privacy -> verify)  <-- the interesting one
  #      A privacy paper citing a verifiability paper, which the bridge page says never
  #      happens. It happens. But look at WHAT FOR: Delphi cites SafetyNets TWICE in the body,
  #      both times as prior work on whether QUADRATIC ACTIVATIONS train well. Not once for
  #      verifiability. Delphi's body contains ZERO occurrences of "verifiable", "integrity",
  #      "zero-knowledge", "proof of correctness" or "malicious server".
  #      Delphi does not know it is citing a verifiability paper. It is citing an ML result.
  #
  # So the finding does not die -- it sharpens. The two columns still do not read each other
  # AS CRYPTOGRAPHY. Where they touch, they touch at the numerics, and they touch without
  # noticing. See content/numerics/bridge.md.
  # ---------------------------------------------------------------------------------------
  bolt:
    - cheetah
    - iron
    - secfloat
    - sirnn
    - the-x
  # Cheetah (USENIX Sec '22). Promoted from an `external:` node to a real paper. It is a 2PC
  # inference SYSTEM, not a numerics library, so it belongs in the privacy column -- filing it
  # anywhere else to protect the headline would be the exact artifact the tripwire exists to catch.
  cheetah:
    - sirnn
    - delphi
  # Delphi (USENIX Sec '20). Cited by NINE of our PDFs -- the largest bibliography hole we had.
  delphi:
    - safetynets   # "[Gho+17] ... SafetyNets" -- cited in the BODY, twice, about quadratic activations
  # PUMA (NDSS '24). 3PC. The paper that shows the BERT ceiling is a 2PC ceiling, not a privacy one.
  puma:
    - cheetah
    - delphi
    - iron
  # Sigma (PoPETs '24). Function secret sharing on GPU. Reaches deepest into the MPC canon of anything
  # in this corpus -- and, like every privacy paper, cites nothing from the verifiability column.
  sigma:
    - cheetah
    - delphi
    - iron
    - secfloat
    - sirnn
    - the-x
  # Mosformer (CCS '25). Maliciously secure 3PC. Cites the entire semi-honest privacy column and
  # not one verifiability paper.
  mosformer:
    - bolt
    - bumblebee
    - ciphergpt
    - iron
    - nimbus
    - puma
    - sigma
    - the-x
  # Proof-of-Learning (S&P '21) and its two breaks. The training cell's missing ancestor.
  # Note pol -> safetynets is verify -> verify (both are verifiability): NOT a crossing edge.
  pol:
    - safetynets
  pol-adversarial:
    - pol
  pol-broken:
    - pol
  bootstrapping-fhe:
    - bolt
    - bumblebee
    - cheetah
    - ciphergpt
    - iron
    - nimbus
    - the-x
  ciphergpt:
