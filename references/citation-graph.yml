# Citation/dependency graph, built by scanning the PDFs in references/ with pdftotext.
# edge A -> B  means: paper A's text mentions/cites B.
# Proxy: a mention anywhere in A (body or reference list). Not hand-verified.
# Regenerate: python3 site/citegraph.py --write
citations:
  # Hand-verified against the bibliographies, 2026-07-11. All three edges stay inside the
  # federated (verify-train) column -- ACORN and EIFFeL cite each other, RoFL and Prio, and
  # nothing in the privacy column. No crossing edge introduced.
  acorn:
    - eiffel   # "[14] ... EIFFeL: Ensuring Integrity for Federated Learning"
    - prio     # "[15] H. Corrigan-Gibbs and D. Boneh. 'Prio: Private, Robust, and Scalable...'"
    - rofl     # "[33] ... 'RoFL: Attestable Robustness for Secure Federated Learning'"
  eiffel:
    - prio     # "[28] Henry Corrigan-Gibbs and Dan Boneh. Prio: Private, robust, and scalable..."
    - rofl     # "[23] ... Table 3 compares EIFFeL with prior work ... RoFL"
