  # zip: hand-verified against its bibliography and a full-text scan, 2026-07-13. The three edges
  # into the numerics shelf below were MISSING, and they are the whole of the contact between the
  # transformer-proving cluster and the float-in-ZK line. zip -> zklp is not a citation, it is a
  # DEPENDENCY: ZIP's linear layers ARE ZKLP's circuits.
  zip:
    - archer-ieee  # "[3] Archer, Atapoor, Smart. The cost of IEEE arithmetic in secure
                   # computation." Cited twice in the body: Sec 4.1 for the FP64 gate counts
                   # ("15637 and 44899 Boolean gates for double precision [3]"), and Sec 5 as the
                   # gadget source for the "Baseline (w/AG)" it benchmarks against.
    - garg-fp      # "[27] Garg, Jain, Jin, Zhang. Succinct zero knowledge for floating point
                   # computations." "we adopt the relative error model from [27]" -- ZIP's
                   # approximation-soundness relation IS Garg's model, lifted from a float gate to
                   # a whole activation.
    - mystique
    - safetynets
    - vcnn
    - zkcnn
    - zkllm
    - zklp         # "[20] Ernstberger et al. Zero-Knowledge Location Privacy via Accurate
                   # Floating-Point SNARKs." LOAD-BEARING: "For linear layers, ZIP directly
                   # leverages the existing technique from [20]", and BOTH of ZIP's benchmark
                   # tables carry the footnote "All linear operations are proved via [20]."
                   # Every proving time ZIP reports is partly a ZKLP number.
  zkgpt:
    - gkr
    - jolt
    - lasso
    - mystique
    - vcnn
    - zkcnn
    - zkllm
  zkllm:
    - gkr
    - mystique
    - safetynets
    - vcnn
    - zkcnn
  zklp:
    - archer-ieee  # "[21] Archer, Atapoor, Smart, 'The cost of ieee arithmetic in secure
                   # computation', LATINCRYPT 2021." Cited in Sec 1, Sec 5.1 ("FP64 addition and
                   # multiplication require 15637 and 44899 boolean gates respectively [21]") and
                   # Sec 6.
    - garg-fp      # "[23] Garg, Jain, Jin, Zhang, 'Succinct zero knowledge for floating point
                   # computations', CCS 2022." Sec 5.1: "Garg et. al [23] provide the
                   # state-of-the-art succinct ZKP for floating-point operations".
    - mystique
    - secfloat
  zkml-kang:
    - vcnn
    - zkcnn
  zkml-survey:
    - artemis
    - ezkl
    - gkr
    - lasso
    - mystique
    - safetynets
    - spagkr
    - vcnn
    - zkcnn
    - zkgpt
    - zkllm
  zkpot-garg:
    - mystique
    - secfloat
    - sirnn
    - vcnn
    - zkcnn
  zkpytorch:
    - expander
    - gkr
    - mystique
    - zkcnn
    - zkllm
  zktorch:
    - ezkl
    - mystique
    - vcnn
    - zkcnn
    - zkllm

  # Zator has no PDF and no bibliography -- these edges are hand-read out of the project
  # README (github.com/lyronctk/zator), which cites both by name in its opening paragraph as
  # the prior art it is reacting to: "notable projects such as EZKL and work by D. Kang et al
  # have been able to snark models as complex as a 50-layer MobileNetv2". Recorded as citations
  # because they are exactly that; flagged here because the SOURCE is a README, not a paper,
  # and `citegraph.py` (which scans PDFs) can neither find nor re-derive them.
  #
  # Note what is NOT here: nothing cites Zator. It is a leaf. zktorch, the paper that made
  # folding-for-ML respectable, does not cite it -- unsurprising for an unpublished hackathon
  # project, but it means the accumulation line's own prior art is invisible to the graph.
  zator:
    - ezkl        # "notable projects such as [EZKL]"
    - zkml-kang   # "work by [D. Kang et al]", linked to arXiv 2210.08674

# External building blocks: cited BY our corpus but not part of it.
external:
  gkr: GKR
  jolt: Jolt (zkVM)
  lasso: Lasso
  twist-shout: Twist & Shout
  expander: Expander
  the-x: THE-X
  bumblebee: BumbleBee
  # cheetah and sirnn were HERE until 2026-07-13, and that is the whole story of this commit.
  # They are two of the three nodes the bridge page's headline finding rests on ("exactly three
  # nodes are cited by both columns, and all three are MPC numerics") -- and we had never read
  # either of them. They were `external:` stubs, which is also what kept them from ever counting
  # as a crossing edge. They are now real papers: sirnn under numerics_primitives (it is a math
  # library, like secfloat, and the neutral shelf is where it belongs), cheetah under
  # secure_inference_2pc (it is an inference system, and the privacy column is where it belongs).
